const EVOLUTION_DOCUMENT_HTML = "<p>Table of Contents</p>\n<h1\nid=\"evolusjonsnotat-v2.3-parallell-analyse-av-norsk-og-britisk-mecfs-retningslinjetradisjon-20062026\">Evolusjonsnotat\nv2.3 — parallell analyse av norsk og britisk\nME/CFS-retningslinjetradisjon 2006–2026</h1>\n<h2\nid=\"diakron-kvalitativ-sammenligning-av-fem-nasjonale-dokumenter-i-to-land\">Diakron\nkvalitativ sammenligning av fem nasjonale dokumenter i to land</h2>\n<p><strong>Formål:</strong> Tilleggsnotat til hovedanalysen (AGREE\nII-basert synkron sammenligning av NICE NG206 og Hdir-høringsutkast\n2026). Dette notatet gir historisk kontekst gjennom en kvalitativ\nparallellanalyse av hvordan Norge og Storbritannia har utviklet sin\nME/CFS-retningslinjepraksis over en 20-års periode.</p>\n<p><strong>Versjon:</strong> 2.2 (21. april 2026)\n<strong>Metode:</strong> Kvalitativ tematisk parallellanalyse basert på\nprimærkildene. Ikke AGREE II-skåring.</p>\n<p><strong>Versjonsinformasjon:</strong> Komplett versjonshistorikk for\nalle prosjektdokumenter er samlet i separat dokument <em>Versjonslogg\nv1.0 (21. april 2026)</em>.</p>\n<h2 id=\"metodologiske-forbehold\">1. Metodologiske forbehold</h2>\n<h3 id=\"hvorfor-parallell-ikke-sekvensiell\">1.1 Hvorfor parallell, ikke\nsekvensiell?</h3>\n<p>Dette notatet er strukturert som parallellanalyse — norsk og britisk\nutvikling behandles ved siden av hverandre, ikke land for land\nsekvensielt. Begrunnelsen er at sammenligningen mellom to samtidige\nutviklingslinjer er hovedanalysen; hvert enkelt lands utvikling er\nbygget inn i den parallelle strukturen.</p>\n<p>Dette gir tre analytiske fordeler:</p>\n<ul>\n<li><p><strong>Kontrollgruppe-logikk.</strong> Når to sammenlignbare\nhelsesystemer møter samme fagfelt over samme tid, tydeliggjør\nsammenligningen hva som er strukturelt (til stede i begge land) og hva\nsom er idiosynkratisk (bare i ett land).</p></li>\n<li><p><strong>Tempo-observasjon.</strong> Hvor raskt eller langsomt et\nland endrer standpunkt, får mening først i sammenligning med et annet\nland som stilles overfor samme evidens.</p></li>\n<li><p><strong>Divergens-identifikasjon.</strong> Punkter der landene\nbryter med hverandre får særlig analytisk vekt — de peker mot\nbeslutninger som ikke er tvunget av evidens alene, men av\ninstitusjonelle, kulturelle eller strukturelle valg.</p></li>\n</ul>\n<h3 id=\"asymmetri-i-dokumentgenerasjoner\">1.2 Asymmetri i\ndokumentgenerasjoner</h3>\n<p>Norge har tre dokumenter i perioden (2006, 2014, 2026). UK har to\n(2007, 2021). Dette er en asymmetri som må håndteres:</p>\n<ul>\n<li><p>2006-rapporten (Norge) og CG53 (UK) er nært samtidige — begge fra\n2006–2007 — og sammenlignes direkte på utgangspunktet.</p></li>\n<li><p>2014-veilederen (Norge) er en mellomgenerasjon uten UK-parallell;\nUK hadde ingen revisjon i denne perioden. Dette behandles som egen norsk\nutvikling i seksjon 3.</p></li>\n<li><p>NG206 (UK, 2021) og Hdir-utkastet (Norge, 2026) er nåværende\ngenerasjon — fem års forsinkelse i Norge, men begge representerer\nlandenes nåværende standpunkt.</p></li>\n</ul>\n<p>Fraværet av UK-mellomgenerasjon er i seg selv en substansiell\nobservasjon: UK gikk fra 2007 til 2021 uten revisjon, mens Norge hadde\nén i mellom. Dette kan peke mot ulike institusjonelle tempo eller\nprioriteringer.</p>\n<h3 id=\"kategoriforskjeller-som-må-tas-med-i-vurderingen\">1.3\nKategoriforskjeller som må tas med i vurderingen</h3>\n<p>Dokumentene er ikke av samme type:</p>\n<table>\n<colgroup>\n<col style=\"width: 25%\" />\n<col style=\"width: 25%\" />\n<col style=\"width: 25%\" />\n<col style=\"width: 25%\" />\n</colgroup>\n<thead>\n<tr class=\"header\">\n<th>År</th>\n<th>Land</th>\n<th>Dokument</th>\n<th>Kategori</th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>2006</td>\n<td>Norge</td>\n<td>Kunnskapssenter-rapport nr 9</td>\n<td>Health Technology Assessment (kunnskapsoppsummering)</td>\n</tr>\n<tr class=\"even\">\n<td>2007</td>\n<td>UK</td>\n<td>NICE CG53</td>\n<td>Klinisk retningslinje</td>\n</tr>\n<tr class=\"odd\">\n<td>2014</td>\n<td>Norge</td>\n<td>Nasjonal veileder IS-1944</td>\n<td>Veileder</td>\n</tr>\n<tr class=\"even\">\n<td>2021</td>\n<td>UK</td>\n<td>NICE NG206</td>\n<td>Klinisk retningslinje</td>\n</tr>\n<tr class=\"odd\">\n<td>2026</td>\n<td>Norge</td>\n<td>Hdir høringsutkast</td>\n<td>Nasjonal faglig retningslinje (utkast)</td>\n</tr>\n</tbody>\n</table>\n<p>2006-rapporten er ikke en retningslinje, men rapportens anbefalinger\ndannet likevel grunnlag for faktisk klinisk praksis i Norge og ble\ntolket som normative av både forvaltning og domstoler. CG53 er en\nfullverdig klinisk retningslinje fra begynnelsen. Denne\nkategoriforskjellen gjør at sammenligningen på 2006–2007-stadiet må være\nforsiktig — norsk side hadde ikke en “retningslinje” per se i denne\nperioden, mens UK hadde det.</p>\n<p>I praksis fungerte 2006-rapporten som de facto retningslinje for\nnorsk klinisk praksis frem til 2014-veilederen kom. Analysen behandler\nderfor rapporten som en funksjonell ekvivalent til retningslinje, med\nden formelle kategoriforskjellen som eksplisitt forbehold.</p>\n<h3 id=\"primærkilder-brukt-i-dette-notatet\">1.4 Primærkilder brukt i\ndette notatet</h3>\n<p><strong>Norske dokumenter:</strong> - Nasjonalt kunnskapssenter for\nhelsetjenesten (2006). <em>Diagnostisering og behandling av kronisk\nutmattelsessyndrom/myalgisk encefalopati (CFS/ME).</em> Rapport nr\n9-2006. ISBN 82-8121-097-4. 137 sider. Oppdragsgiver: Sosial- og\nhelsedirektoratet (mandat 23.8.2004). - Helsedirektoratet (2014,\noppdatert 2015). <em>Nasjonal veileder. Pasienter med CFS/ME: Utredning,\ndiagnostikk, behandling, rehabilitering, pleie og omsorg.</em> IS-1944.\nISBN 978-82-8081-239-1. Oppdragsgiver: Helse- og omsorgsdepartementet\n(mandat 1.11.2011). - Helsedirektoratet (2026). <em>Nasjonal faglig\nretningslinje for langvarig utmattelse, inkl. ME/CFS —\nhøringsutkast.</em> Publisert 4. februar 2026. Høringsfrist 4. mai\n2026.</p>\n<p><strong>Britiske dokumenter:</strong> - NICE (2007). <em>Chronic\nfatigue syndrome/myalgic encephalomyelitis (or encephalopathy):\ndiagnosis and management.</em> Clinical guideline CG53. Published 22\nAugust 2007. 54 pages. Utgitt av National Collaborating Centre for\nPrimary Care på vegne av NICE. - NICE (2021). <em>Myalgic\nencephalomyelitis (or encephalopathy)/chronic fatigue syndrome:\ndiagnosis and management.</em> NG206. Published 29 October 2021. 96\npages. ISBN 978-1-4731-4221-3. Erstatter CG53.</p>\n<h3 id=\"metodiske-begrensninger\">1.5 Metodiske begrensninger</h3>\n<p><strong>Enkeltanalytiker.</strong> Én strukturert lesning, ikke flere\nuavhengige vurderere. Observasjoner skal leses som veiledende.</p>\n<p><strong>Ikke alle CG53-detaljer er lest i detalj.</strong> Analysen\nbygger på sentrale kjerneelementer verifisert i primærkilden. Detaljer\nom enkeltsider og spesifikke drøftinger i CG53 er ikke uttømmende\ngjennomgått.</p>\n<p><strong>Asymmetrisk kildebasis.</strong> For enkelte prosessuelle\nspørsmål (f.eks. interessentkonsultasjon, habilitetsregistre) har jeg\nbedre dokumentasjon for norsk side (via offentlige publikasjoner og\ninnsynsdokumentasjon) enn for UK-side.</p>\n<p><strong>Utkaststatus for 2026.</strong> Norsk 2026-dokument kan\nendres før endelig publisering.</p>\n<h2 id=\"landenes-utgangspunkt-ca.-20062007\">2. Landenes utgangspunkt ca.\n2006–2007</h2>\n<h3 id=\"norge-2006-kunnskapssenter-rapport-nr-9\">2.1 Norge 2006 —\nKunnskapssenter-rapport nr 9</h3>\n<p><strong>Mandat og oppdrag.</strong> Sosial- og helsedirektoratet ba\n23. august 2004 Nasjonalt kunnskapssenter om å “foreta en\nkunnskapsgjennomgang (oppsummering) av det vitenskapelige grunnlaget for\ndiagnostikk og behandling av postviralt/kronisk utmattelsessyndrom.”\nOppdraget ble orientert om i Stortingets spørretime 13. desember 2004 —\npolitisk forankret og offentlig annonsert.</p>\n<p><strong>Organisering.</strong> Utredningsgruppe på 10 medlemmer ledet\nav Vegard Bruun Wyller (Rikshospitalet-Radiumhospitalet), solid\nforankret i akademisk klinisk medisin. Separat brukergruppe med\nrepresentanter fra Norges ME-forening og MENiN.</p>\n<p><strong>Hovedkonklusjoner:</strong> - Kognitiv atferdsterapi “syntes\nå gi bedre fysisk funksjon og livskvalitet, men det var usikkert om\nbehandlingen påvirket mental helse” - Gradert treningsterapi “syntes å\nredusere utmattelse, men hadde ingen dokumentert effekt på depresjon\neller livskvalitet. Frafallet var stort” - <strong>Utmattelse var ikke\nbrukt som utfallsmål i CBT-studiene</strong> — dokumentert i rapportens\negne GRADE-tabeller - Ingen studier undersøkte de aller sykeste - Norsk\nhelsetilbud beskrevet som utilstrekkelig</p>\n<p><strong>Brukerdissens.</strong> Norges ME-forening trakk seg fra\nbrukergruppen i sluttfasen. MENiN leverte et 15-siders kritisk vedlegg\nsom ble integrert i rapporten 26. september 2006. Vedlegget kritiserte\nprimært CBT og GET som egnede behandlingsformer, og påpekte at\nrapportens tolkning var problematisk. Dette ble illustrert ved en\nTrygderetts-dom 26. juni 2006 — 17 dager etter lansering — som brukte\nrapporten til å avslå en søknad om ung ufør.</p>\n<h3 id=\"uk-2007-nice-cg53\">2.2 UK 2007 — NICE CG53</h3>\n<p><strong>Mandat og oppdrag.</strong> NICE (National Institute for\nHealth and Clinical Excellence) utviklet CG53 gjennom sitt\nstandardiserte Guideline Development Group-format. Retningslinjen ble\nutviklet ved National Collaborating Centre for Primary Care og publisert\n22. august 2007.</p>\n<p><strong>Organisering.</strong> Guideline Development Group med\ntverrfaglig sammensetning, inkludert dedikerte helseøkonomer (Richard\nNorman frem til juli 2006, Stefanie Kuntze fra desember 2006). Dette\nviser at NICE hadde helseøkonomisk analyse som standard del av\nprosessen. Omfattende interessentkonsultasjon.</p>\n<p><strong>Hovedkonklusjoner — behandling:</strong></p>\n<p>CG53s sentrale behandlingsanbefaling (1.6.2.4) er bemerkelsesverdig\ntydelig formulert: <strong>“****Cognitive behavioural therapy (CBT)\nand/or graded exercise therapy (GET) should be offered to people with\nmild or moderate CFS/ME and provided to those who choose these\napproaches, because currently these are the interventions for which\nthere is the clearest research evidence of benefit.****”</strong></p>\n<p>Dette er en “should be offered”-anbefaling, som i NICE-terminologi\nsignaliserer en sterk anbefaling. Dette skiller CG53 fra 2006-rapporten:\nmens den norske kunnskapsoppsummeringen var mer varsom (“syntes å gi”,\n“usikkert om”), var NICE-retningslinjen mer normativ (“should be\noffered”). Det er en substansiell forskjell i hvordan samme\nevidensgrunnlag ble tolket.</p>\n<p>CG53 hadde også egne detaljerte seksjoner for CBT (1.6.2.8–1.6.2.10)\nog GET (1.6.2.11–1.6.2.21), med spesifikke\nimplementeringsanbefalinger.</p>\n<p><strong>Alvorlig syke.</strong> CG53 hadde egen seksjon 1.9 “Key\nprinciples of care for people with severe CFS/ME”. Sentralt og\nkontroversielt: anbefaling 1.9.3.1 sier at aktivitetsprogram for\nalvorlig syke “may incorporate the elements of recommendation 1.6.2.22\nand <strong>draw on the principles of CBT and GET</strong>”. CG53\nanbefalte altså CBT/GET-prinsipper også for alvorlig syke.</p>\n<p><strong>Research recommendations.</strong> CG53 erkjente eksplisitt\nkunnskapshull i seksjon 4.1: “Are intervention strategies that have been\nshown to be effective in mildly to moderately affected adults also\neffective in children and in people (adults and children) with severe\nCFS/ME? […] Some patient experience suggests that some of these\ninterventions may be harmful and/or not effective.”</p>\n<p>Dette er en interessant selverkjennelse: CG53 anbefalte\nbehandlingsformer for grupper der den samtidig erkjente at evidensen var\nmanglende. Formuleringen “patient experience suggests that some of these\ninterventions may be harmful” er særlig bemerkelsesverdig — den er et\nforvarsel om den kritikken som skulle vokse frem, og som til slutt førte\ntil NG206s brudd i 2021.</p>\n<h3 id=\"komparativ-observasjon-utgangspunktet\">2.3 Komparativ\nobservasjon — utgangspunktet</h3>\n<p><strong>Konvergens ved utgangspunktet:</strong> - Begge land hvilte\npå omtrent samme evidensbase (RCT-er primært fra UK og Australia) -\nBegge identifiserte CBT og GET som de mest studerte intervensjonene -\nBegge erkjente kunnskapshull om alvorlig syke - Begge behandlet CFS/ME\nsom spesifikk tilstand, ikke “langvarig utmattelse” bredt</p>\n<p><strong>Divergens ved utgangspunktet — tre viktige:</strong></p>\n<ul>\n<li><p><strong>Grad av normativ styrke.</strong> CG53 “should be\noffered” mot 2006-rapportens “syntes å gi” — samme evidens, ulik\ninstitusjonell oversettelse.</p></li>\n<li><p><strong>Formalisering av prosessen.</strong> NICE hadde etablert\nmetodeapparat (Guideline Development Group, egen helseøkonom,\nstandardisert interessentkonsultasjon). Kunnskapssenter-rapporten var et\nenkeltprosjekt uten tilsvarende infrastruktur.</p></li>\n<li><p><strong>Håndtering av brukerdissens.</strong> 2006-rapporten\nintegrerte MENiN-vedlegget fysisk i dokumentet. CG53s prosess — slik den\ner kjent fra offentlig tilgjengelige kilder — hadde\ninteressentkonsultasjon, men ingen eksplisitt brukerdissens-vedlegg av\ntilsvarende type.</p></li>\n</ul>\n<p><strong>En observasjon om konsekvenser:</strong> CG53s sterkere\nanbefaling fikk større implementeringskonsekvenser i UK — CBT og GET ble\nstandardbehandling gjennom NHS. Dette skapte et større kontroversfelt\nenn i Norge, og dermed også et større trykk for revisjon frem mot\n2021.</p>\n<h2 id=\"norsk-mellomfase-2014-veilederen\">3. Norsk mellomfase —\n2014-veilederen</h2>\n<p><strong>Fraværet av UK-parallell:</strong> UK hadde ingen\nretningslinjerevisjon mellom 2007 og 2021. Dette er en 14-års periode\nuten oppdatert offentlig anbefaling. Norge hadde én i mellom.</p>\n<h3 id=\"hva-2014-videreførte-fra-2006\">3.1 Hva 2014 videreførte fra\n2006</h3>\n<ul>\n<li><p>Inkluderte ingen ny kunnskapsoppsummering, men pekte til\n2011-sammenfatningen fra Kunnskapssenteret</p></li>\n<li><p>Beholdt pluralistisk tilnærming til diagnosekriterier (Fukuda,\nCanada, Jason pediatriske)</p></li>\n<li><p>Fortsatte å identifisere “Pasienter med CFS/ME” som målgruppe\n(altså ME/CFS-spesifikk, ikke bredere utmattelse)</p></li>\n</ul>\n<h3 id=\"hva-2014-brøt-med\">3.2 Hva 2014 brøt med</h3>\n<ul>\n<li><p><strong>CBT-språket moderert.</strong> Fra “best dokumentert\neffekt” (2006) til “nyttig supplement for noen pasienter” (2014). Dette\ner en forsiktig omformulering.</p></li>\n<li><p><strong>Pacing gitt mer plass.</strong>\nAktivitetsavpasning/energiøkonomisering beskrevet som egen tilnærming,\nikke bare som del av CBT/GET.</p></li>\n<li><p><strong>De 10 eksemplene for alvorlig syke.</strong> Kapittel 3.9\nmed spesifikke anbefalinger om skjerming for lyd, lys, berøring —\nomstridt da det kom, modifisert i 2015.</p></li>\n</ul>\n<h3 id=\"revisjonen\">3.3 2015-revisjonen</h3>\n<p>Innspillsrunden høsten 2014 førte til revisjon publisert mai 2015.\nEndringer ble markert i kursiv. Dette er <strong>et dokumentert eksempel\npå at Hdir har fulgt opp kritikk med faktisk revisjon</strong>, med ca.\nett års syklus fra innspill til oppdatert dokument. Det er en responstid\nsom er relevant å ta i betraktning når vi senere vurderer\n2026-prosessen.</p>\n<h3 id=\"hvorfor-norge-hadde-mellomgenerasjon-uk-ikke\">3.4 Hvorfor Norge\nhadde mellomgenerasjon, UK ikke</h3>\n<p>Dette er et interessant spørsmål i seg selv. Mulige faktorer: -\nEtablering av Nasjonal kompetansetjeneste for CFS/ME på OUS (2012)\nskapte behov for klinisk veiledning - SINTEFs statusgjennomgang (2010)\ndokumenterte utilstrekkelig tilbud - 2011-sammenfatningen fra\nKunnskapssenteret ga nytt kunnskapsgrunnlag - UK hadde allerede CG53 som\netablert rammeverk; endring ville krevd substansiell revisjon</p>\n<p>Dette kan tolkes som at Norge var mer responsiv overfor\nkontekstendringer gjennom perioden, eller som at Norge hadde et mindre\nmodent retningslinjeapparat som gjorde det enklere å revidere. Begge\ntolkninger er støttet av materialet.</p>\n<h2 id=\"landenes-nåværende-generasjon-20212026\">4. Landenes nåværende\ngenerasjon — 2021/2026</h2>\n<h3 id=\"uk-2021-nice-ng206\">4.1 UK 2021 — NICE NG206</h3>\n<p><strong>Bruddet som gjorde 2021 historisk.</strong> NG206\nrepresenterer det mest substansielle bruddet mellom en retningslinje og\ndens forgjenger på dette fagfeltet i Europa. Tre elementer utgjør\nbruddet:</p>\n<ul>\n<li><p><strong>GET fjernet som anbefaling.</strong> Boks 4 i NG206\ndefinerer graded exercise therapy eksplisitt og sier: “physical activity\nor exercise programmes that are based on deconditioning and exercise\navoidance theories as perpetuating ME/CFS” — <em>should not be\nundertaken</em>. Dette er et direkte brudd med CG53 1.6.2.4.</p></li>\n<li><p><strong>CBT rekonseptualisert.</strong> NG206 anbefaler CBT ikke\nsom behandling for ME/CFS som sykdom, men som supportive intervention\nfor håndtering av symptombyrde. Dette er en rekonseptualisering, ikke\nbare moderering.</p></li>\n<li><p><strong>Alvorlig syke får dedikert seksjon 1.17.</strong> NG206\nskiller eksplisitt mellom severe og very severe, med egen oppdragsnote:\n“with every recommendation the committee considered whether different or\nadditional recommendations were needed for this group. […] These\nadditional considerations for people with severe or very severe ME/CFS\nwere placed in a separate section to make sure they could be easily\nfound.”</p></li>\n</ul>\n<p><strong>Prosess som var kontroversiell.</strong> Fire medlemmer trakk\nseg fra komiteen i juli 2021 før publisering. Publiseringen ble utsatt.\nDa retningslinjen endelig kom ut i oktober 2021, fikk den bred faglig\naksept, men et anti-NICE-nettverk etablerte seg.</p>\n<p><strong>Populasjonsavgrensning.</strong> NG206 holder fast ved ME/CFS\nsom spesifikk tilstand. Ingen bredere utvidelse.</p>\n<h3 id=\"norge-2026-hdir-høringsutkast\">4.2 Norge 2026 — Hdir\nhøringsutkast</h3>\n<p><strong>Hvordan det videreførte fra 2014:</strong> - Pluralistisk\ndiagnosekriteriebruk (Canadakriteriene for voksne, Jason for barn) -\nPacing/aktivitetsavpasning som sentral tilnærming - Brukererfaring som\nformelt kunnskapsgrunnlag</p>\n<p><strong>Hvordan det brøt med 2014:</strong> -\n<strong>Populasjonsutvidelse:</strong> Fra “Pasienter med CFS/ME” til\n“langvarig utmattelse, inkl. ME/CFS” - <strong>Fukuda faller ut</strong>\nsom aktivt anbefalt alternativ for voksne - <strong>Standardisert\nretningslinjeformat</strong> med eksplisitt styrkemarkering\n(skal/bør/kan) - <strong>GRADE-vurderinger eksplisitt\nrapportert</strong> — metodologisk forbedring - <strong>PEM eksplisitt\nadressert</strong> via Canadakriteriene og WHO-definisjon - <strong>De\n10 eksemplene for alvorlig syke</strong> (fra 2014) er ikke videreført i\nsamme form - <strong>Uformell prosessannonsering</strong> —\nrevisjonsarbeidet ikke formelt skriftlig kunngjort</p>\n<p><strong>Dissensmønster:</strong> 7 arbeidsgruppemedlemmer har tatt\nformell dissens. 4 fagpersoner før publisering (integrert i kap. 1). 3\nbrukerrepresentanter etter publisering (ikke integrert i\nretningslinjen).</p>\n<h3 id=\"komparativ-observasjon-bruddet\">4.3 Komparativ observasjon —\nbruddet</h3>\n<p>Begge land har gjort substansielle brudd med forgjenger i sin\nnåværende generasjon, men bruddene går i forskjellige retninger:</p>\n<p><strong>UK (2007 → 2021):</strong> Bruddet er substansielt-faglig.\nGET fjernet, CBT rekonseptualisert, alvorlig syke løftet frem.\n<em>Populasjonsavgrensningen er stabil</em> — ME/CFS som spesifikk\ntilstand i begge generasjoner.</p>\n<p><strong>Norge (2014 → 2026):</strong> Bruddet er\nstrukturelt-organisatorisk. Standardisert retningslinjeformat,\neksplisitt GRADE, utvidet populasjon. <em>Behandlingsanbefalingene er\nmer gradvis endret</em> — 2026 er nærmere NG206 enn 2014, men ikke\nidentisk.</p>\n<p>Den norske bevegelsen er substansielt-faglig mer forsiktig enn den\nbritiske, men strukturelt-organisatorisk mer omfattende. Norge har gjort\nen fundamental populasjonsutvidelse som UK ikke har gjort. UK har gjort\net fundamentalt substansielt brudd på behandlingssiden som Norge bare\nhar delvis fulgt.</p>\n<p><strong>Divergens-observasjon:</strong> Det er tre typer brudd som er\ntydelige: 1. <strong>GET-status:</strong> UK har brutt totalt; Norge har\nikke. 2. <strong>Populasjonsavgrensning:</strong> Norge har brutt totalt\n(utvidet); UK har ikke. 3. <strong>Formalisering av metodikk:</strong>\nNorge har tatt et steg nærmere NICE-modell; avstanden har minket.</p>\n<h2 id=\"tverrgående-temaer-parallell-sammenligning\">5. Tverrgående\ntemaer — parallell sammenligning</h2>\n<h3 id=\"diagnostisk-utvikling\">5.1 Diagnostisk utvikling</h3>\n<p><strong>Norsk utvikling:</strong> - 2006: Primært CDC-1994 (Fukuda)\nsom basis for evidensgjennomgangen - 2014: Fukuda og Canada som gyldige\nalternativer, pragmatisk pluralisme - 2026: Canadakriteriene anbefalt\nsom førstevalg for voksne</p>\n<p><strong>Britisk utvikling:</strong> - 2007 (CG53): Egne\nNICE-kriterier basert på fatigue + post-exertional malaise + én eller\nflere av tilleggssymptomer (muskelsmerte, leddsmerte, hodepine, ømme\nlymfeknuter, sår hals, kognitiv dysfunksjon, fysisk/mental anstrengelse\nforverrer symptomer, general malaise, dizziness/nausea, palpitations) -\n2021 (NG206): Adapterte Institute of Medicine 2015-kriterier, med fire\nobligatoriske nøkkelsymptomer</p>\n<p><strong>Komparativ observasjon:</strong> Begge land har beveget seg\nmot strengere og mer PEM-sentrert definisjon. UK gjorde et rent valg\n(IoM 2015 adaptert); Norge holder pluralistisk tilnærming (Canada +\nJason + WHO for PEM). Dette reflekterer ulik regulatorisk kultur: UK\nstandardiserer, Norge gir rom for pragmatisk klinisk vurdering.</p>\n<p>Tidsmessig gjør begge land tilsvarende bevegelse i sin nåværende\ngenerasjon (2021/2026), med en naturlig forsinkelse på norsk side.</p>\n<h3 id=\"cbt-og-get-over-tid\">5.2 CBT og GET over tid</h3>\n<p>Dette er det tydeligste parallelle utviklingsbildet:</p>\n<table>\n<colgroup>\n<col style=\"width: 33%\" />\n<col style=\"width: 33%\" />\n<col style=\"width: 33%\" />\n</colgroup>\n<thead>\n<tr class=\"header\">\n<th></th>\n<th>Norge</th>\n<th>UK</th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>2006–2007</td>\n<td>CBT og GET “best dokumenterte” (2006-rapport); CBT/GET “should be\noffered” (CG53)</td>\n<td>Sammenfallende posisjon i begge land</td>\n</tr>\n<tr class=\"even\">\n<td>2014</td>\n<td>CBT “nyttig supplement for noen”; pacing gitt egen plass</td>\n<td><em>Ingen revisjon — CG53 sto fortsatt</em></td>\n</tr>\n<tr class=\"odd\">\n<td>2021–2026</td>\n<td>Aktivitetsregulering (pacing/gradert) med eksplisitt GRADE (2026);\nCBT ikke “behandling” men støtte ved PEM</td>\n<td>GET fjernet; CBT som supportive intervention (NG206)</td>\n</tr>\n</tbody>\n</table>\n<p><strong>Komparativ observasjon — tempo:</strong> UK satt på CG53 fra\n2007 til 2021 og gjorde så et dramatisk brudd. Norge gjorde gradvise\njusteringer i 2014 og deretter ytterligere justering i 2026. Den norske\nutviklingen har dermed vært mer kontinuerlig, men endepunktet ligger\nnærmere NG206 enn 2014 gjorde.</p>\n<p><strong>Komparativ observasjon — terminologi:</strong> UK bruker\neksplisitt boks 4 i NG206 for å definere hva GET er og er ikke. Norge\nhar ikke tilsvarende eksplisitt definisjon — “aktivitetsregulering”\ndekker både pacing og gradert aktivitet, og differansen mellom dem er\nikke like skarp markert. Dette er en strukturell forskjell som kan ha\nklinisk betydning.</p>\n<p><strong>Komparativ observasjon — konsekvens:</strong> UK-bruddet i\n2021 har vært mer politisk og institusjonelt kostbart (medlemmer trakk\nseg, publisering utsatt, pågående debatt), men har ført til tydelig\nendring i UK klinisk praksis. Norsk gradvishet har vært mindre\nkonfliktfylt i medieoppslag, men har etterlatt mer rom for klinisk\nheterogenitet.</p>\n<h3 id=\"alvorlig-syke-og-pem\">5.3 Alvorlig syke og PEM</h3>\n<p><strong>Norsk utvikling:</strong> - 2006: Eksplisitt at ingen studier\nhadde undersøkt effekt av behandling hos de aller sykeste - 2014: 10\nkonkrete eksempler på tilpasninger (kap. 3.9); omstridt; modifisert i\n2015 - 2026: PEM eksplisitt adressert via Canadakriteriene og WHO;\nerkjennelse av svakt evidensgrunnlag for PEM-populasjonen</p>\n<p><strong>Britisk utvikling:</strong> - 2007 (CG53): Egen seksjon 1.9\n“Key principles of care for people with severe CFS/ME”. Men anbefaling\n1.9.3.1 sier aktivitetsprogram for alvorlig syke skal “draw on the\nprinciples of CBT and GET” — noe som retrospektivt var kontroversielt. -\n2021 (NG206): Dedikert seksjon 1.17 for severe/very severe, med\neksplisitt note om at hver anbefaling ble vurdert separat for denne\ngruppen. Risikovurdering før hver interaksjon. Hjemmebesøk som standard\nfor helhetsvurdering.</p>\n<p><strong>Komparativ observasjon:</strong> Begge land har i 2021/2026\nen mer differensiert tilnærming til alvorlig syke enn i første\ngenerasjon. UK har gått lengst: fra CG53s “principles of CBT and GET”\ntil NG206s egen seksjon med risikovurdering. Norge har også beveget seg,\nmen mindre dramatisk — de 10 eksemplene fra 2014 er endret i form, men\nalvorlig syke er ikke like strukturert fremhevet som i NG206.</p>\n<p><strong>Substansiell ulikhet:</strong> NG206 har en eksplisitt\n“severe vs. very severe”-differensiering som Norge ikke har i samme\nform. Dette kan være et område for høringsinnspill.</p>\n<h3 id=\"brukerinvolvering-og-dissenshåndtering\">5.4 Brukerinvolvering og\ndissenshåndtering</h3>\n<p><strong>Norsk utvikling:</strong> - 2006: Formell brukergruppe.\nNorges ME-forening trakk seg. MENiN leverte 15-siders kritisk vedlegg,\nintegrert i rapporten. - 2014: Eget kapittel om brukermedvirkning.\nInnspillsrunde 2014 med dokumenterte revisjoner i 2015. - 2026: Fem\nbrukerrepresentanter i arbeidsgruppen. Tre av fem har tatt formell\ndissens etter publisering. Dissensene er ikke integrert i\nretningslinjedokumentet.</p>\n<p><strong>Britisk utvikling:</strong> - 2007 (CG53):\nInteressentkonsultasjonsprosess som standard NICE-prosess. Ikke\neksplisitt dokumenterte brukerdissenser av MENiN-type. - 2021 (NG206): 4\nmedlemmer trakk seg fra komiteen i juli 2021 før publisering.\nPublisering utsatt. NICE valgte å dokumentere tilbaketrekkingen i\nMinutes, men ikke som formelle dissenser i retningslinjen.</p>\n<p><strong>Komparativ observasjon — type uenighet:</strong>\nUK-uenigheten i 2021 var primært fra fagpersoner (leger, fysioterapeut,\npsykolog) som ikke kunne akseptere NG206s brudd med CBT/GET.\nNorsk-uenigheten i 2026 har to typer: (a) fire fagpersoner som tok\ndissens før publisering (ligner UK-mønsteret), og (b) tre\nbrukerrepresentanter som tok dissens etter publisering (uten\nUK-parallell).</p>\n<p><strong>Komparativ observasjon — håndtering:</strong> Begge land har\nvalgt å <em>ikke</em> integrere sine substansielt argumenterende\ndissenser i selve retningslinjedokumentet. UK dokumenterte\ntilbaketrekkingene fra 2021 i Minutes; Norge har fire fagdissenser\nlistet og lenket i kap. 1, mens brukerdissensene er publisert av Hdir i\nen separat ZIP-fil under innkomne høringsinnspill og ikke omtalt i\nretningslinjedokumentet. Dette er strukturelt beslektet mønster:\nsubstansielle dissenser holdes utenfor det formelle\nretningslinjedokumentet selv når de er publisert tilgjengelig andre\nsteder. Den substansielle forskjellen er at Norge har <em>navngitte\ndissenser</em> i kap. 1 (de fire fagdissensene) som UK ikke har.</p>\n<p><strong>Historisk observasjon:</strong> 2006-rapporten integrerte\nMENiN-vedlegget fysisk i dokumentet. Dette er den mest transparente\nhåndteringen av brukerdissens i noen av de fem dokumentene.\n2026-utkastet fører brukerdissensene tilbake til en mer perifer\nplassering i dokumentinfrastrukturen — publisert av Hdir, men i en egen\nZIP-fil for innkomne høringsinnspill, ikke i retningslinjen selv. Den\nsamlede utviklingen — over 20 år og to land — viser en tendens mot at\nsubstansielle brukerdissenser holdes utenfor det formelle\nretningslinjedokumentet, ikke integreres i det. Dette kan være en\ninstitusjonell utvikling som begrenser dokumentarisk transparens i\nretningslinjen selv, selv om tilgangen til dokumentene for den som\naktivt søker er opprettholdt.</p>\n<h3 id=\"evidensgrunnlaget\">5.5 Evidensgrunnlaget</h3>\n<p><strong>Norsk utvikling:</strong> - 2006: “Hypotesene peker i mange\nulike retninger, studiegruppene er heterogent sammensatte og ikke\ndirekte sammenlignbare, og mange av studiene har begrenset vitenskapelig\nkvalitet” - 2014: Ingen ny kunnskapsoppsummering i selve veilederen;\npekte til 2011-sammenfatningen - 2026: “Forskningsgrunnlaget for\neffekten hos pasienter med PEM definert etter Canadakriteriene eller\nWHO, er svakt. Det er få identifiserte studier” — eksplisitt GRADE med\nkonkrete effektestimater og tillit-nivåer</p>\n<p><strong>Britisk utvikling:</strong> - 2007 (CG53): Anbefalte CBT og\nGET som “interventions for which there is the clearest research evidence\nof benefit” — men egne research recommendations erkjente kunnskapshull\nfor alvorlig syke og barn, og “patient experience suggests that some of\nthese interventions may be harmful” - 2021 (NG206): Åtte Evidence\nReviews (A–H) med systematiske søkestrategier. GRADE. Eksplisitt\nrapportering av at evidensen er “heterogenous and inconclusive, with\nlimited evidence for any single intervention”</p>\n<p><strong>Komparativ observasjon:</strong> Begge land har gjennom\nperioden beveget seg mot mer formalisert evidensvurdering. UK hadde\nallerede i 2007 en mer formalisert evidensprosess (NICE-modell); Norge\nhar nå i 2026 nådd tilsvarende formaliseringsnivå via GRADE og FHIs\nkvalitative systematiske oversikter. Dette er en konvergens mellom\nlandenes metodiske standard.</p>\n<p>Men både UK og Norge beskriver i 2021/2026 evidensen fundamentalt på\nsamme måte som i 2006/2007: som heterogen, utilstrekkelig, og med\nbegrensninger for sentrale undergrupper. 20 års forskning har altså ikke\nfundamentalt endret uttalelsene om evidensgrunnlagets karakter.</p>\n<p><strong>Substansiell observasjon:</strong> Dette tyder på at\nbevegelsen i behandlingsanbefalinger (særlig UK-bruddet i 2021) ikke\nprimært skyldes ny positiv evidens som støtter andre tilnærminger, men\nen revurdering av hvordan eksisterende evidens skal tolkes og anvendes —\nsærlig for pasienter med PEM og for alvorlig syke. Dette er en viktig\nobservasjon fordi det skiller faglig revurdering fra forskningsbasert ny\nkonsensus.</p>\n<h3 id=\"populasjonsavgrensning-divergens-punktet\">5.6\nPopulasjonsavgrensning — divergens-punktet</h3>\n<p>Dette er området hvor landene har divergert mest dramatisk:</p>\n<p><strong>Norsk utvikling:</strong> - 2006: CFS/ME som spesifikk\ntilstand - 2014: “Pasienter med CFS/ME” — fortsatt spesifikk tilstand -\n2026: <strong>“****Langvarig utmattelse, inkl. ME/CFS****”</strong>**\n****— utvidet populasjon**</p>\n<p><strong>Britisk utvikling:</strong> - 2007 (CG53): CFS/ME som\nspesifikk tilstand - 2021 (NG206): ME/CFS som spesifikk tilstand —\n<em>avgrensningen uendret</em></p>\n<p><strong>Komparativ observasjon:</strong> UK har holdt fast ved samme\npopulasjonsavgrensning over 14 år. Norge har utvidet i 2026. Dette er et\nsubstansielt divergerende valg som gjør retningslinjene mindre\nsammenlignbare nå enn de var i utgangspunktet.</p>\n<p><strong>Konsekvens:</strong> Pasienter med ME/CFS i UK har én\nretningslinje rettet spesifikt mot dem (NG206). Pasienter med ME/CFS i\nNorge vil fra 2026 ha en retningslinje som inkluderer dem i en bredere\npopulasjon med andre typer utmattelse. Dette har ikke bare formelle, men\npotensielt også kliniske konsekvenser — særlig for pasienter med PEM,\nhvor evidensgrunnlaget er svakere og blandet populasjonsdata kan gi\nutilstrekkelig sensitive anbefalinger.</p>\n<p><strong>Spørsmål utkastet åpner:</strong> Hvorfor har Norge gjort\ndette valget? Er det en faglig beslutning om å favne bredere, eller en\nstrukturell utvanning som svekker ME/CFS-spesifikk veiledning? Dette\nspørsmålet er ikke besvart i tilgjengelig materiale og bør være sentralt\ni høringsinnspill.</p>\n<h3 id=\"institusjonell-modenhet-og-metodisk-infrastruktur\">5.7\nInstitusjonell modenhet og metodisk infrastruktur</h3>\n<p><strong>Norsk utvikling:</strong> - 2006: Enkeltprosjekt ved\nKunnskapssenteret uten standardisert retningslinjeapparat - 2014:\nHdir-veileder innenfor Avdeling rehabilitering og sjeldne tilstander -\n2026: Hdir-retningslinje innenfor standardisert retningslinjeformat, med\neksplisitt GRADE, FHI-kunnskapsoppsummering, standardisert\nstyrkemarkering</p>\n<p><strong>Britisk utvikling:</strong> - 2007 (CG53): NICE-prosess med\nGuideline Development Group, National Collaborating Centre, dedikerte\nhelseøkonomer, interessentkonsultasjon - 2021 (NG206): Samme\nNICE-rammeverk, men nå med PMG20 (Methods Manual) oppdatert, åtte\nseparate Evidence Reviews, Register of Interests publisert, Quality\nStandards</p>\n<p><strong>Komparativ observasjon:</strong> UK har hatt et modent\nretningslinjeapparat gjennom hele perioden. Norge har bygget tilsvarende\napparat gradvis. I 2026 er den norske metodiske infrastrukturen\nvesentlig nærmere NICE enn den var i 2006.</p>\n<p>Men det er fortsatt gap: - NICE har individuelle habilitetsregistre\npublisert (Register of Interests). Hdir har verbal erklæring i kap. 1. -\nNICE har separate Evidence Reviews som publiserte dokumenter. Hdir har\nkunnskapsgrunnlag som vedlegg til prosessen. - NICE har Quality\nStandards separat, men koblet til retningslinjen. Hdir har ikke\ntilsvarende kvalitetsindikatorer.</p>\n<p><strong>Observasjon:</strong> Dette er gap som kan lukkes — de er\nmetodologiske valg, ikke systemforskjeller. Norge kan velge å innføre\ntilsvarende praksis i fremtidige retningslinjer.</p>\n<h2 id=\"observasjoner-om-parallell-utvikling\">6. Observasjoner om\nparallell utvikling</h2>\n<p>Basert på denne analysen trer syv hovedobservasjoner frem:</p>\n<p><strong>1. Brukerdissens er strukturelt i begge land, men med ulik\nkarakter.</strong> Begge land har hatt formaliserte uenigheter — Norge\nkonsistent over 20 år, UK særlig i 2021. Typen uenighet er forskjellig:\nnorsk brukerdissens er <em>pasient/organisasjons-drevet</em>, mens\nUK-uenighetene i 2021 var <em>fagperson-drevet</em>. 2026-situasjonen i\nNorge er spesiell ved at den har <em>begge typer</em> samtidig (4\nfagdissenser + 3 brukerdissenser).</p>\n<p><strong>2. Formelle dissenser er gradvis blitt holdt utenfor det\nformelle retningslinjedokumentet.</strong> 2006-rapporten integrerte\nMENiN-vedlegget. Fra 2007 og fremover er dissens håndtert gjennom\ndokumentasjon av tilbaketrekkinger (UK) eller som separate publiseringer\n(Norge 2026). Dette er en observerbar institusjonell utvikling bort fra\ndokumentarisk transparens om uenighet.</p>\n<p><strong>3. Behandlingsanbefalinger har konvergert over tid — Norge\nhar gradvis beveget seg i samme retning som UK.</strong> Men UK har\ngjort et tydelig brudd; Norge har gjort gradvise justeringer. Dette er\nforskjellige institusjonelle strategier for å håndtere samme faglige\nutvikling.</p>\n<p><strong>4. Populasjonsavgrensning er det mest markante\ndivergens-punktet.</strong> UK har holdt fast ved ME/CFS som spesifikk\ntilstand. Norge har utvidet i 2026. Dette er et aktivt divergerende valg\nsom ikke følger av evidens, men av institusjonelle prioriteringer.</p>\n<p><strong>5. Metodisk infrastruktur konvergerer — Norge tar\nigjen.</strong> Formaliseringen av norsk retningslinjeprosess i 2026\n(GRADE, FHI-kunnskapsoppsummering, standardisert format) gjør avstanden\ntil NICE mindre enn den var i 2006.</p>\n<p><strong>6. Evidensgrunnlaget beskrives bemerkelsesverdig stabilt over\n20 år — bevegelsen ligger i tolkning, ikke primært i grunnlag.</strong>\nBåde Norge og UK beskriver evidensen fundamentalt likt (heterogen,\nutilstrekkelig, svak for sentrale undergrupper) i 2006/2007 og\n2021/2026. Endringer i anbefalinger skyldes derfor institusjonell\nrevurdering snarere enn ny evidens.</p>\n<p><strong>7. Transparens om oppdragsgrunnlag går i motsatt retning av\nforventning i Norge.</strong> 2006-mandatet (Stortinget), 2014-mandatet\n(sitert i veilederen), 2024-oppdraget (dokumentert i tildelingsbrev\nTB2026-26 men ikke referert i retningslinjen, kun uformelt\npressedekket). UK-siden har gjennom hele perioden hatt eksplisitt\nNICE-struktur som er offentlig dokumentert. Dette er et område der norsk\nutvikling går i motsatt retning av hva parallellanalysen ville\nforvente.</p>\n<h2 id=\"begrensninger\">7. Begrensninger</h2>\n<p><strong>Enkeltanalytiker og én strukturert lesning.</strong>\nObservasjoner er veiledende.</p>\n<p><strong>Ikke uttømmende detaljkunnskap om CG53-prosessen.</strong>\nAnalysen av CG53 bygger på sentrale kjerneelementer, men ikke på en\nsystematisk gjennomgang av alle 54 sider eller tilhørende\nNICE-dokumentasjon.</p>\n<p><strong>Asymmetri i kildebasis.</strong> Norsk prosessdokumentasjon\ner bedre dokumentert for denne analysen (via publiserte dissenser,\npressemeldinger, seminar-referater som er i prosjektet) enn tilsvarende\nUK-prosessdokumentasjon.</p>\n<p><strong>Kategoriforskjeller.</strong> 2006-rapporten er HTA, ikke\nretningslinje. Sammenligninger på 2006–2007-stadiet har dette\nforbeholdet.</p>\n<p><strong>Utkaststatus for 2026-dokumentet.</strong> Observasjoner som\nrefererer til 2026-utkastet kan bli utdaterte.</p>\n<p><strong>Ikke-behandlede perspektiver.</strong> - Skottland og Wales\nhar egen helseforvaltning innenfor UK — NG206 er NICE (England &amp;\nWales); skotsk og nordirsk praksis er ikke dekket - USAs og Europas\nparallelle utvikling er ikke analysert - Ikke-anglofone retningslinjer\n(Sverige, Danmark nevnt i 2026-utkastet) er ikke sammenlignet - Covid-19\nsom kontekstendring fra ca. 2020 og framover er ikke systematisk\nbehandlet</p>\n<p><strong>Ikke AGREE II-skåring.</strong> Dette er bevisst — parallell\ndiakron analyse krever andre rammer enn synkron\nretningslinjeevaluering.</p>\n<h2 id=\"forholdet-til-hovedanalysen\">8. Forholdet til hovedanalysen</h2>\n<p>Dette notatet supplerer hovedanalysen (v3.0: synkron AGREE\nII-sammenligning av NG206 og Hdir 2026-utkastet) ved å legge diakron\nparallell kontekst til den synkrone evalueringen.</p>\n<p><strong>Hvordan notatet informerer hovedanalysen:</strong></p>\n<p><strong>Item 5 (Stakeholder Involvement):</strong> Parallellanalysen\nviser at brukerdissens har vært til stede i flere av\ndokumentgenerasjonene, men at 2006-rapportens integrering av\nMENiN-vedlegget representerer den mest transparente håndteringen.\nHdir-utkastets omtale-fravær av brukerdissensene i selve\nretningslinjedokumentet — selv om dokumentene er tilgjengelige på\nhøringssiden — er en observerbar tilbakegang fra egen norsk tradisjon og\ntydelig kontrast til 2026-utkastets egen håndtering av fagdissensene,\nsom er integrert i kap. 1.</p>\n<p><strong>Item 10 (Methods for recommendations):</strong> Begge landene\nhar beveget seg gradvis mot mer formaliserte metodiske rammer. Hdir 2026\ner metodisk mer moden enn Hdir 2014, men ligger fortsatt et stykke bak\nNICE-modellen.</p>\n<p><strong>Item 14 (Updating procedure):</strong> Observerte\noppdateringsintervaller — Norge har hatt én mellomgenerasjon (2014) som\nUK ikke har hatt. Dette er både en styrke (oftere revisjon) og en\nsvakhet (lengre avstand mellom dokumenter gir mulighet for dramatisk\nbrudd som NG206).</p>\n<p><strong>Item 22 (Editorial independence):</strong> 2014-mandatet er\nsitert i veilederen; 2024-oppdraget er ikke. NICE har gjennom hele\nperioden hatt eksplisitt struktur for metodisk uavhengighet.</p>\n<p><strong>Item 23 (Competing interests):</strong> NICE Register of\nInterests (publisert for NG206) har ikke norsk parallell verken i 2014\neller 2026. Dette er en konsistent britisk-norsk forskjell på denne\ndimensjonen.</p>\n<p><strong>Domain 3 (Rigour of Development):</strong> Norsk\nformalisering har konvergert mot NICE-standard. Gapet i 2026 er mindre\nenn det var i 2006/2014.</p>\n<p><strong>Populasjonsavgrensning:</strong> Dette er et substansielt\ndivergens-punkt som parallellanalysen gjør særlig tydelig. Norge har\nutvidet, UK har ikke. Dette gjør Item 3-vurderingen mer kompleks — det\ner ikke bare et kvalitetsspørsmål, men også et strukturelt redaksjonelt\nvalg som trekker retningslinjene fra hverandre.</p>\n<p><strong>Hovedanalysen står fortsatt som synkron evaluering.</strong>\nDette notatet tilfører diakron kontekst, men erstatter ikke den synkrone\nAGREE II-rammen. Hovedobservasjonene fra AGREE-evalueringen\n(domenesskårer, overall assessment, seksjon 5 om dissenshåndtering,\nseksjon 6 om høringsimplikasjoner) står uavhengig av\nparallellanalysen.</p>\n<p><em>Evolusjonsnotat v2.3 — 21. april 2026. Parallell norsk-britisk\ndiakron kvalitativ analyse av fem nasjonale dokumenter\n(Kunnskapssenteret 2006, NICE CG53 2007, Hdir-veileder 2014, NICE NG206\n2021, Hdir-utkast 2026). Tilleggsnotat til AGREE II-komparativ\nanalyse.</em></p>\n";

const ITEMS = [
  { id: 1, domain: 1, title: 'Overall objective described', ng206Score: 6, hdirScore: 5, ng206Short: 'Tydelig formålsformulering i Overview + Context-seksjon med epidemiologiske data.', hdirShort: 'To mål i høringsbrevets Formål-seksjon. Mindre epidemiologisk forankring.', ng206Full: 'Overview (s. 5) med tydelig formålsformulering: "This guideline covers diagnosing and managing ME/CFS". Context (s. 93) gir substansiell epidemiologisk forankring: prevalens ca. 250 000 i England og Wales, kjønnsfordeling 2,4:1, 25 % med alvorlig sykdom. Trekket fra 7: formulerte mål er kvalitative ("improve awareness") snarere enn kvantifiserte utfallsmål.', hdirFull: 'Høringsbrevets "Formål"-seksjon formulerer to mål eksplisitt: (1) at pasienter får "kunnskapsbasert, individuelt tilpasset helsehjelp som bidrar til økt livskvalitet, mestring og bedring", og (2) at helsepersonell "opplever å ha tydelige råd". Strukturen er tydelig (kulepunkt-format). Trekket fra høyere skår: epidemiologisk og kontekstuell forankring på Context-nivå er ikke like utbygget i det tilgjengelige materialet fra kap. 1.' },
  { id: 2, domain: 1, title: 'Health question(s) specifically described', ng206Score: 6, hdirScore: 5, ng206Short: 'Operasjonalisert i 8 separate Evidence Reviews (A–H) med PICO-struktur.', hdirShort: '12 anbefalinger med GRADE. Eksplisitte PICO-formulerte spørsmål mindre synlige.', ng206Full: 'Helsespørsmålene er operasjonalisert i åtte separate Evidence Reviews (A–H) med eksplisitte review-spørsmål og PICO-strukturerte inklusjonskriterier. Retningslinjen refererer til disse konsekvent ("Full details of the evidence and the committee\'s discussion are in evidence review..."). Sporbar struktur fra overordnet formål til spesifikke besvarelsesspørsmål.', hdirFull: 'Retningslinjen formulerer 12 anbefalinger fordelt på 4 kapitler. GRADE-vurderinger er gjennomført (kap. 2), men eksplisitte PICO-formulerte helsespørsmål i selve retningslinjedokumentet er mindre synlige. Formålsformuleringen fra høringsbrevet og strukturen i anbefalingene indikerer indirekte hvilke spørsmål som er dekket.' },
  { id: 3, domain: 1, title: 'Target population specifically described', ng206Score: 7, hdirScore: 5, ng206Short: 'Aldersgrupper, IoM 2015-kriterier adaptert, 4 nøkkelsymptomer, severe/very severe.', hdirShort: 'Bredere populasjon ("langvarig utmattelse, inkl. ME/CFS"). Kriterier spesifisert, men differensiering mellom undergrupper mindre strukturert.', ng206Full: 'Populasjonen er spesifikt beskrevet med aldersgrupper (barn, unge og voksne), adopterte diagnostiske kriterier (Institute of Medicine 2015, adaptert), fire nøkkelsymptomer (invalidiserende utmattelse, post-exertional malaise, ikke-oppfriskende søvn, kognitive vansker), og eksplisitt stratifisering etter alvorlighetsgrad (Box 1 s. 7, samt dedikert seksjon 1.17 for severe/very severe).', hdirFull: 'Populasjonen er bredere ("langvarig utmattelse, inkl. ME/CFS") og inkluderer flere tilstander. Diagnostiske kriterier er spesifisert (Canadakriteriene for voksne ME/CFS, Jason pediatriske kriterier for barn, WHO-definisjon og Canadakriteriene for PEM). Men populasjonsbredden skaper en definitorisk utfordring: hvilke tilstander innenfor "langvarig utmattelse" gjelder hvilke anbefalinger? Differensiering mellom ME/CFS, post-viral fatigue, long covid og andre utmattelsestilstander er ikke like strukturert synliggjort som NG206s ME/CFS-spesifikke tilnærming.' },
  { id: 4, domain: 2, title: 'GDG includes all relevant professional groups', ng206Score: 5, hdirScore: 6, ng206Short: 'NICE Committee details referert, tverrfaglig sammensetning, men ikke direkte listet i hovedretningslinjen.', hdirShort: 'Eksplisitt liste over 21 medlemmer i kap. 1 med profesjonskategorier spesifisert.', ng206Full: 'NICEs "Committee details"-side (referert i retningslinjen, s. 95) er offentlig tilgjengelig og angir komitesammensetningen. Retningslinjen er utviklet ved National Guideline Centre (Royal College of Physicians). NICE har etablert praksis for tverrfaglig komitesammensetning. Uten direkte verifisering av committee details-dokumentet kan skåren ikke heves til 6–7.', hdirFull: 'Arbeidsgruppens sammensetning er eksplisitt listet i kap. 1: 21 medlemmer med profesjonskategorier spesifisert — 2 fastleger, 3 psykologspesialister, 2 fysioterapeuter, 2 ergoterapeuter, 2 spesialister i barnemedisin, 2 spesialister i fysikalsk medisin og rehabilitering, 1 helsesykepleier, 1 spesialist i infeksjonsmedisin, 1 NAV-rådgivende overlege, samt 5 brukerrepresentanter. Transparens om sammensetning er bedre dokumentert direkte i retningslinjen enn i NG206.' },
  { id: 5, domain: 2, title: 'Views and preferences of target population sought', ng206Score: 6, hdirScore: 3, ng206Short: 'Brukerrepresentanter i komité, kvalitativ evidens om pasienterfaring i Evidence Reviews.', hdirShort: '5 brukerrepresentanter i gruppen, men 3 av 5 har tatt formell dissens etter publisering. Dissensene ikke integrert.', ng206Full: 'NICEs prosess for brukerinvolvering inkluderer pasient- og lekrepresentanter i komiteen, og kvalitativ evidens om pasienterfaring som del av Evidence Reviews. NG206 refererer eksplisitt til evidens om pasienterfaring i flere rationale-seksjoner. Interessentkonsultasjon er en formalisert del av NICE-prosessen.', hdirFull: 'Prosedyren eksisterer: fem brukerrepresentanter i arbeidsgruppen, brukererfaring eksplisitt del av kunnskapsgrunnlaget, og FHIs kvalitative systematiske oversikt (Hestevik, Langøien, Bergsund, 2025) er anvendt. Men det empiriske utfallet er observerbart problematisk: 3 av 5 brukerrepresentanter — representantene fra ME-foreningen, ME-foreldrene og Norsk Covidforening — har tatt formell dissens etter publisering. Skåren gjenspeiler diskrepansen mellom prosedyre og utfall.' },
  { id: 6, domain: 2, title: 'Target users of the guideline clearly defined', ng206Score: 7, hdirScore: 6, ng206Short: '"Who is it for?" s. 5 angir tre hovedgrupper: helse-/sosialfagpersonell, commissioners, pasienter og familier.', hdirShort: 'Anbefalinger rettet mot spesifikke roller (fastlege, virksomhetsleder, kommune, spesialist).', ng206Full: 'Eksplisitt "Who is it for?"-seksjon s. 5 angir tre hovedgrupper: helse- og sosialfagpersonell (inkludert utdanning og bedriftshelse), commissioners, og personer med mistenkt eller diagnostisert ME/CFS og deres familier/omsorgspersoner. Anbefalinger gjennom hele dokumentet er rettet mot spesifikke profesjonsgrupper.', hdirFull: 'Høringsbrevets Formål angir pasienter og helsepersonell. Anbefalingene er rettet mot spesifikke roller: fastlege (2.1, 2.3, 4.1), virksomhetsleder (3.1), kommune (3.2), spesialist i barne- og ungdomsmedisin (4.2). Målgruppeidentifikasjon er tydelig i hver anbefaling. Trekket fra 7: "commissioners" eller tilsvarende bestillerroller ikke like eksplisitt adressert.' },
  { id: 7, domain: 3, title: 'Systematic methods for evidence search', ng206Score: 6, hdirScore: 5, ng206Short: '8 Evidence Reviews med systematiske søkestrategier. PMG20 metodikk.', hdirShort: 'Systematiske litteratursøk utført. Søkestrategi indikert, men ikke spesifisert i detalj i retningslinjen.', ng206Full: 'Retningslinjen bygger på åtte separate Evidence Reviews (A–H) med systematiske søkestrategier. NICE Methods Manual (PMG20) definerer metodikk. Søkestrategier er vedlegg til hver Evidence Review. Selve retningslinjen refererer til disse konsekvent.', hdirFull: '"Gjennomført systematiske litteratursøk på aktivitetsbaserte intervensjoner og kognitiv atferdsterapi. Et stort antall systematiske oversikter ble identifisert. De samme primærstudiene er inkludert i de fleste av de systematiske oversiktene, derfor ble de nyeste systematiske oversiktene av god eller moderat kvalitet inkludert." FHIs kunnskapsoppsummering inneholder mer detaljert søkemetodikk, men denne er ikke direkte integrert i retningslinjedokumentet.' },
  { id: 8, domain: 3, title: 'Criteria for selecting evidence', ng206Score: 6, hdirScore: 4, ng206Short: 'PICO-struktur, eksplisitte inklusjons-/eksklusjonskriterier, begrunnet seleksjon.', hdirShort: 'Nyeste SR av god/moderat kvalitet inkludert. Formelle kriterier ikke eksplisitt listet i retningslinjen.', ng206Full: 'Hver Evidence Review har eksplisitt PICO-struktur, inklusjons- og eksklusjonskriterier, og begrunnet seleksjon av studier.', hdirFull: 'Det er angitt at nyeste systematiske oversikter av god eller moderat kvalitet ble inkludert, men formelle inklusjons- og eksklusjonskriterier er ikke eksplisitt listet i retningslinjen. Prinsippet om å bruke nyeste SR-er er metodologisk legitimt, men gir mindre transparens enn NICE-modellen.' },
  { id: 9, domain: 3, title: 'Strengths and limitations of evidence', ng206Score: 6, hdirScore: 6, ng206Short: 'GRADE anvendt. Rationale-seksjoner diskuterer evidensens karakter eksplisitt.', hdirShort: 'Eksplisitt GRADE med rapporterte effektestimater, KI og tillit-nivåer. Transparent om svakhet for PEM-populasjon.', ng206Full: 'GRADE anvendt i Evidence Reviews. Rationale-seksjoner diskuterer evidensens karakter eksplisitt: "the evidence for non-pharmacological and pharmacological interventions for ME/CFS was heterogenous and inconclusive, with limited evidence for any single intervention".', hdirFull: 'Eksplisitt GRADE-anvendelse. Konkrete effektestimater: utmattelse etter CBT g=−0,52 (lav tillit), fysisk funksjon etter CBT g=0,29 (svært lav tillit, heterogenitet I²=76,6%). Eksplisitt om PEM-populasjonen: "Forskningsgrunnlaget for effekten hos pasienter med PEM definert etter Canadakriteriene eller WHO, er svakt. Det er få identifiserte studier." Transparent rapportering — ett av få items der Hdir og NG206 skårer likt.' },
  { id: 10, domain: 3, title: 'Methods for formulating recommendations', ng206Score: 5, hdirScore: 4, ng206Short: 'PMG20 konsensusprosess, Minutes publisert. Fire medlemmer trakk seg juli 2021.', hdirShort: 'Kunnskapsbasert tilnærming beskrevet generelt. Konsensusmetode ikke spesifisert.', ng206Full: 'PMG20 definerer NICEs konsensusprosess (§ 3.9). Minutes er publisert. Hver anbefaling ledsages av "Why the committee made the recommendation"-seksjon. Fire medlemmer trakk seg fra komiteen i juli 2021 før publisering; dokumentert i Minutes men ikke diskutert i hovedteksten.', hdirFull: 'Kunnskapsbasert tilnærming beskrevet generelt: forskningslitteratur, klinisk erfaring og brukererfaring veies sammen. Vekting: "På områder der det er funnet mindre forskningsbasert kunnskap og/eller overføringsverdien fra internasjonal til norsk helsetjeneste er lav, blir klinisk kunnskap og brukerkunnskap tillagt større vekt." Konsensusmetode (stemmegivning, Delphi, nominell gruppeteknikk) er ikke spesifisert. Prosedyre for håndtering av etterhåndsdissens er ikke beskrevet.' },
  { id: 11, domain: 3, title: 'Health benefits, side effects, risks considered', ng206Score: 6, hdirScore: 5, ng206Short: 'Rationale and impact-seksjoner adresserer risiko systematisk. PEM gjennomgående prinsipp.', hdirShort: 'Begrunnelsesseksjoner per anbefaling. PEM nevnt som sentral konsekvens. Systematisk nytte–risiko-diskusjon mindre synlig.', ng206Full: '"Rationale and impact"-seksjoner og "How the recommendation might affect practice"-avsnitt adresserer risiko systematisk. Eksempler: eksplisitt diskusjon av "controversy over graded exercise therapy had resulted in confusion over what support should be available" og "potential for harm when CBT is inappropriately delivered". Post-exertional malaise er et gjennomgående risikobasert prinsipp i anbefalingene.', hdirFull: 'Begrunnelsesseksjoner for hver anbefaling. PEM er nevnt som sentral konsekvens av aktivitet for pasienter med ME/CFS. Men systematisk diskusjon av nytte–risiko per anbefaling er mindre synlig enn i NG206s "Rationale and impact"-struktur.' },
  { id: 12, domain: 3, title: 'Explicit link between recommendations and evidence', ng206Score: 7, hdirScore: 5, ng206Short: 'Hver anbefaling kobler eksplisitt til spesifikk Evidence Review.', hdirShort: 'Begrunnelser refererer til FHI og spesifikke studier, men koblingen mellom anbefaling og studie mindre systematisk.', ng206Full: 'Hver anbefaling kobler eksplisitt til spesifikk Evidence Review: "Full details of the evidence and the committee\'s discussion are in evidence review G: non-pharmacological management of ME/CFS..." Direkte sporing mellom anbefaling og evidens.', hdirFull: 'Begrunnelser refererer til FHIs kunnskapsoppsummering og spesifikke studier (Casson et al. 2023, Maas et al. 2024, Kuut et al. 2023 og 2024, Nerli et al. 2024, Kong et al. 2023). Men koblingen mellom spesifikke anbefalinger og spesifikke studier er mindre systematisk. Eksempel: "aktivitetsregulering" (anbefaling 2.5) er et overordnet konsept som dekker flere evidenskategorier. Populasjonsbredden skjerper denne utfordringen.' },

const COLOR_NG = '#1e3a5f'; // Dyp blå — UK/NICE
const COLOR_HD = '#a0522d'; // Varm terracotta — NO/Hdir
const COLOR_BG = '#faf8f3'; // Off-white, varm
const COLOR_BG_CARD = '#ffffff';
const COLOR_BORDER = '#e7e3d8';
const COLOR_TEXT = '#1a1a1a';
const COLOR_MUTED = '#6b6356';
const COLOR_ACCENT = '#8b6f3a';

// Score anchor for 1-7 scale
const scoreColor = (s) => {
  if (s >= 6) return '#2d5016';
  if (s >= 5) return '#4a7c2a';
  if (s >= 4) return '#a68b00';
  if (s >= 3) return '#c2410c';
  return '#991b1b';
};

// ====== COMPONENTS ======

function StyleHeader() {
  return (
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');
      body { margin: 0; }
      .display-font { font-family: 'Cormorant Garamond', Georgia, serif; }
      .body-font { font-family: 'Inter', system-ui, sans-serif; }
    `}</style>
  );
}

function Navigation({ current, onChange }) {
  const sections = [
    { id: 'overview', label: 'Oversikt' },
    { id: 'domains', label: 'Domener' },
    { id: 'items', label: 'Items' },
    { id: 'evolution', label: 'Evolusjon' },
    { id: 'dissent', label: 'Dissens' },
    { id: 'document', label: 'Hovedanalyse' },
    { id: 'evolution_doc', label: 'Evolusjonsnotat' },
    { id: 'about', label: 'Om analysen' },
  ];

  return (
    <nav style={{
      position: 'sticky', top: 0, zIndex: 10,
      background: COLOR_BG, borderBottom: `1px solid ${COLOR_BORDER}`,
      padding: '0 24px',
    }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', display: 'flex', alignItems: 'center', gap: 32, padding: '16px 0', flexWrap: 'wrap' }}>
        <div style={{ fontFamily: 'Cormorant Garamond, Georgia, serif', fontSize: 22, fontWeight: 600, letterSpacing: '-0.01em' }}>
          AGREE II — NG206 / Hdir 2026
        </div>
        <div style={{ flex: 1, display: 'flex', gap: 4, flexWrap: 'wrap' }}>
          {sections.map(s => (
            <button
              key={s.id}
              onClick={() => onChange(s.id)}
              style={{
                padding: '8px 16px',
                fontFamily: 'Inter, sans-serif',
                fontSize: 13,
                letterSpacing: '0.02em',
                background: current === s.id ? COLOR_TEXT : 'transparent',
                color: current === s.id ? COLOR_BG : COLOR_TEXT,
                border: `1px solid ${current === s.id ? COLOR_TEXT : 'transparent'}`,
                cursor: 'pointer',
                transition: 'all 0.15s',
              }}
            >
              {s.label}
            </button>
          ))}
        </div>
      </div>
    </nav>
  );
}

function Badge({ children, color = COLOR_MUTED, bg = COLOR_BG }) {
  return (
    <span style={{
      display: 'inline-block', padding: '2px 8px', fontSize: 11, letterSpacing: '0.05em',
      textTransform: 'uppercase', fontFamily: 'Inter, sans-serif', fontWeight: 500,
      border: `1px solid ${color}`, color, background: bg,
    }}>{children}</span>
  );
}

function ScoreBadge({ score, isNG }) {
  const color = scoreColor(score);
  return (
    <div style={{
      display: 'inline-flex', alignItems: 'baseline', gap: 6,
      padding: '4px 10px', background: color, color: '#fff',
      fontFamily: 'Inter, sans-serif',
    }}>
      <span style={{ fontSize: 10, letterSpacing: '0.1em', opacity: 0.85 }}>{isNG ? 'NG' : 'HD'}</span>
      <span style={{ fontFamily: 'Cormorant Garamond, Georgia, serif', fontSize: 18, fontWeight: 600 }}>{score}</span>
    </div>
  );

}

// === DISSENT ===

  }));

    <div style={{ padding: '48px 0' }}>

        Dissensmønsteret i arbeidsgruppen
      </h2>
      <p style={{ color: COLOR_MUTED, fontSize: 16, margin: '0 0 32px', maxWidth: 720 }}>
        Syv av 21 arbeidsgruppemedlemmer har tatt formell dissens — ca. en tredel. Fordelt på fire fagdissenser før publisering og tre brukerdissenser etter.
      </p>

      {/* Chart */}
      <div style={{ background: COLOR_BG_CARD, border: `1px solid ${COLOR_BORDER}`, padding: 32, marginBottom: 32 }}>
        <h3 style={{ fontFamily: 'Cormorant Garamond, Georgia, serif', fontSize: 22, fontWeight: 500, margin: '0 0 20px' }}>
          Fordeling etter kategori
        </h3>
        <ResponsiveContainer width="100%" height={320}>
          <BarChart data={chartData} margin={{ top: 20, right: 30, left: 0, bottom: 80 }}>
            <CartesianGrid strokeDasharray="2 4" stroke={COLOR_BORDER} />
            <XAxis dataKey="name" angle={-25} textAnchor="end" height={100} tick={{ fontFamily: 'Inter, sans-serif', fontSize: 11, fill: COLOR_TEXT }} />
            <YAxis tick={{ fontFamily: 'Inter, sans-serif', fontSize: 12, fill: COLOR_MUTED }} />
            <Tooltip contentStyle={{ background: COLOR_BG_CARD, border: `1px solid ${COLOR_BORDER}`, fontFamily: 'Inter, sans-serif', fontSize: 13 }} />
            <Legend wrapperStyle={{ fontFamily: 'Inter, sans-serif', fontSize: 13, paddingTop: 12 }} />
            <Bar dataKey="I gruppen" fill={COLOR_BORDER} />
            <Bar dataKey="Dissens" fill={COLOR_HD} />
          </BarChart>
        </ResponsiveContainer>
      </div>

      {/* Category details */}
      <div style={{ background: COLOR_BG_CARD, border: `1px solid ${COLOR_BORDER}`, padding: 24, marginBottom: 32 }}>
        <h3 style={{ fontFamily: 'Cormorant Garamond, Georgia, serif', fontSize: 22, fontWeight: 500, margin: '0 0 20px' }}>
          Konsentrasjon av dissens
        </h3>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontFamily: 'Inter, sans-serif', fontSize: 13 }}>
          <thead>
            <tr style={{ borderBottom: `2px solid ${COLOR_BORDER}` }}>
              <th style={{ textAlign: 'left', padding: '10px 12px 10px 0', fontWeight: 500, color: COLOR_MUTED, fontSize: 11, letterSpacing: '0.05em' }}>Kategori</th>
              <th style={{ textAlign: 'center', padding: '10px 12px', fontWeight: 500, color: COLOR_MUTED, fontSize: 11, letterSpacing: '0.05em' }}>I gruppen</th>
              <th style={{ textAlign: 'center', padding: '10px 12px', fontWeight: 500, color: COLOR_MUTED, fontSize: 11, letterSpacing: '0.05em' }}>Dissens</th>
              <th style={{ textAlign: 'center', padding: '10px 12px', fontWeight: 500, color: COLOR_MUTED, fontSize: 11, letterSpacing: '0.05em' }}>%</th>
              <th style={{ textAlign: 'left', padding: '10px 12px', fontWeight: 500, color: COLOR_MUTED, fontSize: 11, letterSpacing: '0.05em' }}>Navn</th>
            </tr>
          </thead>
          <tbody>
            {DISSENSES.categories.map((c, i) => (
              <tr key={i} style={{ borderBottom: `1px solid ${COLOR_BORDER}` }}>
                <td style={{ padding: '12px 12px 12px 0' }}>{c.cat}</td>
                <td style={{ padding: '12px 12px', textAlign: 'center', fontVariantNumeric: 'tabular-nums' }}>{c.total}</td>
                <td style={{ padding: '12px 12px', textAlign: 'center', fontWeight: 600, color: c.dissent > 0 ? COLOR_HD : COLOR_MUTED, fontVariantNumeric: 'tabular-nums' }}>{c.dissent}</td>
                <td style={{ padding: '12px 12px', textAlign: 'center', fontWeight: c.pct >= 50 ? 600 : 400, color: c.pct >= 50 ? COLOR_HD : COLOR_MUTED, fontVariantNumeric: 'tabular-nums' }}>{c.pct}%</td>

              </tr>
            ))}

        </table>
        <p style={{ marginTop: 16, fontFamily: 'Inter, sans-serif', fontSize: 13, lineHeight: 1.6, color: COLOR_MUTED, fontStyle: 'italic' }}>

function DissentGroup({ title, count, data }) {
  return (
    <div style={{ background: COLOR_BG_CARD, border: `1px solid ${COLOR_BORDER}`, padding: 24 }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 16 }}>

          {title}
        </h3>
        <span style={{ fontFamily: 'Cormorant Garamond, Georgia, serif', fontSize: 32, fontWeight: 600, color: COLOR_ACCENT }}>
          {count}
        </span>
      </div>
      <p style={{ fontFamily: 'Inter, sans-serif', fontSize: 13, lineHeight: 1.6, color: COLOR_MUTED, margin: '0 0 16px' }}>
        {data.description}
      </p>
      <ul style={{ listStyle: 'none', padding: 0, margin: 0, display: 'flex', flexDirection: 'column', gap: 8 }}>
        {data.members.map((m, i) => (
          <li key={i} style={{ fontFamily: 'Inter, sans-serif', fontSize: 13, paddingLeft: 16, position: 'relative' }}>

    </div>
  );
}

// === ABOUT ===

function About() {
  return (
    <div style={{ padding: '48px 0', maxWidth: 760 }}>
      <h2 style={{ fontFamily: 'Cormorant Garamond, Georgia, serif', fontSize: 44, fontWeight: 500, margin: '0 0 24px', letterSpacing: '-0.01em' }}>
        Om analysen
      </h2>

      <section style={{ marginBottom: 40 }}>
        <h3 style={{ fontFamily: 'Cormorant Garamond, Georgia, serif', fontSize: 22, fontWeight: 500, margin: '0 0 12px' }}>
          Metode
        </h3>
        <p style={{ fontFamily: 'Inter, sans-serif', fontSize: 14, lineHeight: 1.6, color: COLOR_TEXT, margin: '0 0 12px' }}>
          Dashboardet oppsummerer en AGREE II-basert komparativ analyse av to samtidig gjeldende retningslinjer for ME/CFS. AGREE II (Appraisal of Guidelines for Research and Evaluation) er et internasjonalt validert instrument med 23 items fordelt på seks domener.
        </p>
        <p style={{ fontFamily: 'Inter, sans-serif', fontSize: 14, lineHeight: 1.6, color: COLOR_TEXT, margin: '0 0 12px' }}>
          Hver item skåres på en skala fra 1 til 7, og domenesskåre beregnes som <em>(oppnådd sum − min. mulig sum) / (maks. mulig sum − min. mulig sum) × 100</em>. AGREE II måler metodisk kvalitet i utviklingsprosess og rapportering — ikke klinisk gyldighet av anbefalingene.
        </p>
      </section>

      <section style={{ marginBottom: 40 }}>
        <h3 style={{ fontFamily: 'Cormorant Garamond, Georgia, serif', fontSize: 22, fontWeight: 500, margin: '0 0 12px' }}>
          Vesentlige forbehold
        </h3>
        <ul style={{ fontFamily: 'Inter, sans-serif', fontSize: 14, lineHeight: 1.7, color: COLOR_TEXT, paddingLeft: 20 }}>
          <li><strong>Enkeltanalytiker.</strong> Standard AGREE II-praksis bruker to til fire vurderere med rapportert interrater-reliabilitet. Denne analysen er én strukturert gjennomgang. Skårer er veiledende.</li>
          <li><strong>Utkaststatus.</strong> Hdir-dokumentet er høringsutkast (frist 4. mai 2026) og kan endres før endelig publisering.</li>
          <li><strong>Innsynsavhengige materialer.</strong> Individuelle habilitetsskjemaer og oppdragsdokumentasjon fra HOD ikke offentlig publisert. Items 22 og 23 påvirkes.</li>
          <li><strong>Populasjonsforskjell.</strong> NG206 dekker ME/CFS; Hdir dekker "langvarig utmattelse inkl. ME/CFS". Forskjellen påvirker flere items direkte.</li>
        </ul>
      </section>

      <section style={{ marginBottom: 40 }}>
        <h3 style={{ fontFamily: 'Cormorant Garamond, Georgia, serif', fontSize: 22, fontWeight: 500, margin: '0 0 12px' }}>
          Primærkilder
        </h3>
        <ul style={{ fontFamily: 'Inter, sans-serif', fontSize: 13, lineHeight: 1.7, color: COLOR_TEXT, paddingLeft: 20 }}>
          <li>NICE (2021). <em>ME/CFS: diagnosis and management (NG206)</em>. 96 s.</li>
          <li>Helsedirektoratet (2026). <em>Nasjonal faglig retningslinje for langvarig utmattelse inkl. ME/CFS — høringsutkast</em>. Publ. 4. februar 2026.</li>
          <li>Dissensdokumentasjon fra fire fagpersoner (ZIP på høringssiden) og tre brukerforeninger (ME-foreningen, ME-foreldrene, Norsk Covidforening).</li>
          <li>For historisk kontekst: Kunnskapssenter-rapport nr 9 (2006), NICE CG53 (2007), Nasjonal veileder IS-1944 (2014).</li>
        </ul>
      </section>

      <section>
        <h3 style={{ fontFamily: 'Cormorant Garamond, Georgia, serif', fontSize: 22, fontWeight: 500, margin: '0 0 12px' }}>
          Versjon
        </h3>
        <p style={{ fontFamily: 'Inter, sans-serif', fontSize: 13, color: COLOR_MUTED, lineHeight: 1.6 }}>
          Dashboard v1.0 (april 2026). Bygget fra AGREE II-komparativ analyse v3.3 og Evolusjonsnotat v2.3. Single-file React-komponent; alle data er hardkodet.
        </p>
      </section>
    </div>
  );
}

// === DOCUMENT VIEWER ===

function DocumentViewer({ title, subtitle, html }) {
  return (
    <div style={{ padding: '48px 0' }}>
      <style>{`
        .doc-body h2 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 32px; font-weight: 500; letter-spacing: -0.01em; margin: 48px 0 16px; padding-bottom: 12px; border-bottom: 1px solid #e7e3d8; line-height: 1.2; }
        .doc-body h3 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 24px; font-weight: 500; letter-spacing: -0.01em; margin: 36px 0 12px; line-height: 1.3; }
        .doc-body h4 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 20px; font-weight: 600; margin: 28px 0 10px; color: #8b6f3a; line-height: 1.3; }
        .doc-body p { font-family: 'Inter', system-ui, sans-serif; font-size: 15px; line-height: 1.7; margin: 0 0 16px; color: #1a1a1a; }
        .doc-body ul, .doc-body ol { font-family: 'Inter', system-ui, sans-serif; font-size: 15px; line-height: 1.7; padding-left: 24px; margin: 0 0 16px; }
        .doc-body li { margin-bottom: 8px; }
        .doc-body strong { font-weight: 600; color: #1a1a1a; }
        .doc-body em { font-style: italic; }
        .doc-body blockquote { border-left: 3px solid #8b6f3a; padding-left: 20px; margin: 20px 0; color: #6b6356; font-style: italic; }
        .doc-body hr { border: none; border-top: 1px solid #e7e3d8; margin: 40px 0; }
        .doc-body table { width: 100%; border-collapse: collapse; margin: 20px 0; font-family: 'Inter', sans-serif; font-size: 13px; }
        .doc-body table th { text-align: left; padding: 10px 12px; border-bottom: 2px solid #e7e3d8; font-weight: 600; color: #6b6356; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; }
        .doc-body table td { padding: 10px 12px; border-bottom: 1px solid #e7e3d8; vertical-align: top; }
        .doc-body code { font-family: 'SF Mono', Monaco, monospace; font-size: 13px; background: #f0ebe0; padding: 2px 6px; border-radius: 2px; }
        .doc-body a { color: #8b6f3a; text-decoration: underline; }
        .doc-body .footnote { font-size: 13px; color: #6b6356; }
      `}</style>

      <div style={{ maxWidth: 760 }}>
        <div style={{ marginBottom: 12, fontSize: 11, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#8b6f3a', fontFamily: 'Inter, sans-serif' }}>
          Fulltekst
        </div>
        <h1 style={{ fontFamily: 'Cormorant Garamond, Georgia, serif', fontSize: 44, fontWeight: 500, margin: '0 0 12px', letterSpacing: '-0.02em', lineHeight: 1.1 }}>
          {title}
        </h1>
        <p style={{ color: '#6b6356', fontSize: 16, margin: '0 0 40px', lineHeight: 1.5 }}>
          {subtitle}
        </p>

        <div className="doc-body" dangerouslySetInnerHTML={{ __html: html }} />
      </div>
    </div>
  );
}

// === MAIN ===

function Dashboard() {
  const [section, setSection] = useState('overview');

  return (
    <div style={{ background: COLOR_BG, minHeight: '100vh', color: COLOR_TEXT, fontFamily: 'Inter, system-ui, sans-serif' }}>
      <StyleHeader />
      <Navigation current={section} onChange={setSection} />
      <main style={{ maxWidth: 1200, margin: '0 auto', padding: '0 24px' }}>
        {section === 'overview' && <Overview goTo={setSection} />}
        {section === 'domains' && <Domains />}
        {section === 'items' && <Items />}
        {section === 'evolution' && <Evolution />}
        {section === 'dissent' && <Dissent />}
        {section === 'document' && <DocumentViewer title="Hovedanalyse — AGREE II-basert komparativ analyse" subtitle="Synkron evaluering av NICE NG206 og Helsedirektoratets høringsutkast 2026. Versjon 3.1." html={MAIN_DOCUMENT_HTML} />}
        {section === 'evolution_doc' && <DocumentViewer title="Evolusjonsnotat — parallell norsk-britisk analyse" subtitle="Diakron kvalitativ sammenligning av fem nasjonale dokumenter 2006–2026. Versjon 2.1." html={EVOLUTION_DOCUMENT_HTML} />}
        {section === 'about' && <About />}
      </main>
      <footer style={{ borderTop: `1px solid ${COLOR_BORDER}`, marginTop: 64, padding: '24px', fontFamily: 'Inter, sans-serif', fontSize: 12, color: COLOR_MUTED, textAlign: 'center' }}>
        Dashboard basert på AGREE II-komparativ analyse v3.3 og Evolusjonsnotat v2.3 · Bygget 19. april 2026
      </footer>
    </div>
  );
}


// Render
ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
