// Full dokumentinnhold som HTML (konvertert fra markdown via pandoc)
const MAIN_DOCUMENT_HTML = "<p>Table of Contents</p>\n<h1 id=\"agree-ii-basert-komparativ-analyse\">AGREE II-basert komparativ\nanalyse</h1>\n<h2\nid=\"nice-ng206-2021-og-helsedirektoratets-høringsutkast-om-langvarig-utmattelse-inkl.-mecfs-2026\">NICE\nNG206 (2021) og Helsedirektoratets høringsutkast om langvarig\nutmattelse, inkl. ME/CFS (2026)</h2>\n<p><strong>Formål med dokumentet:</strong> Analytisk underlag for å\nkunne vurdere Helsedirektoratets høringsutkast i sammenligning med den\netablerte NICE-retningslinjen på samme fagfelt. Utarbeidet i forbindelse\nmed høringsfrist 4. mai 2026.</p>\n<p><strong>Versjon:</strong> 3.2 (21. april 2026)\n<strong>Metode:</strong> AGREE II (Appraisal of Guidelines for Research\nand Evaluation, 2. utgave), anvendt som strukturert analyseramme på\nbegge retningslinjer.</p>\n<p><strong>Versjonsinformasjon:</strong> Komplett versjonshistorikk for\nalle prosjektdokumenter er samlet i separat dokument <em>Versjonslogg\nv1.0 (21. april 2026)</em>.</p>\n<h2 id=\"sammendrag\">Sammendrag</h2>\n<p>Denne analysen vurderer to samtidig gjeldende retningslinjer innenfor\nfagfeltet ME/CFS og langvarig utmattelse etter AGREE II-rammen:</p>\n<ul>\n<li><p><strong>NICE NG206</strong> (publisert 29. oktober 2021,\nStorbritannia, 96 sider)</p></li>\n<li><p><strong>Helsedirektoratets høringsutkast</strong> (publisert 4.\nfebruar 2026, høringsfrist 4. mai 2026, Norge)</p></li>\n</ul>\n<p>På domenesskårer varierer avstanden mellom retningslinjene fra\nmoderat (Domain 4 Clarity of Presentation, 5,6 prosentpoeng) til\nsubstansiell (Domain 6 Editorial Independence, 41,7 prosentpoeng). NG206\nskårer høyere på alle seks AGREE-domener. Den største forskjellen ligger\ni dokumentasjon av metodisk rigor (Domain 3), applicability (Domain 5)\nog editorial independence (Domain 6).</p>\n<p><strong>Kvantitativ oversikt — domenesskårer:</strong></p>\n<table>\n<thead>\n<tr class=\"header\">\n<th>Domene</th>\n<th>NG206</th>\n<th>Hdir</th>\n<th>Differanse</th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>1. Scope and Purpose</td>\n<td>88,9 %</td>\n<td>66,7 %</td>\n<td>+22,2</td>\n</tr>\n<tr class=\"even\">\n<td>2. Stakeholder Involvement</td>\n<td>83,3 %</td>\n<td>66,7 %</td>\n<td>+16,7</td>\n</tr>\n<tr class=\"odd\">\n<td>3. Rigour of Development</td>\n<td>81,3 %</td>\n<td>58,3 %</td>\n<td>+23,0</td>\n</tr>\n<tr class=\"even\">\n<td>4. Clarity of Presentation</td>\n<td>77,8 %</td>\n<td>72,2 %</td>\n<td>+5,6</td>\n</tr>\n<tr class=\"odd\">\n<td>5. Applicability</td>\n<td>70,8 %</td>\n<td>37,5 %</td>\n<td>+33,3</td>\n</tr>\n<tr class=\"even\">\n<td>6. Editorial Independence</td>\n<td>75,0 %</td>\n<td>33,3 %</td>\n<td>+41,7</td>\n</tr>\n</tbody>\n</table>\n<p><strong>Fire hovedobservasjoner som kan være relevante for\nhøringsinnspill:</strong></p>\n<ul>\n<li><p><strong>Interessentprosessen viser substansiell asymmetri og\nmotsatt rettet uenighet.</strong> Hdir-arbeidsgruppen inkluderte 21\nmedlemmer. Syv medlemmer har tatt formell dissens — omtrent en tredel.\nFire fagdissenser (Nerli, Herner, Jøssang, Prydz) er integrert i\nretningslinjens kap. 1 som inline PDF-vedlegg. Tre brukerdissenser\n(Schei, Thorsen, Mørch-Storstein) er publisert av Hdir i ZIP-filen for\ninnkomne høringsinnspill, men er ikke omtalt i selve\nretningslinjedokumentet. De to dissensgruppene trekker utkastet i\nmotsatt retning: fagdissensene etterlyser sterkere\nrehabiliteringsoptimisme og mindre vekt på unngåelsesatferd;\nbrukerdissensene etterlyser tydeligere PEM-differensiering og sterkere\nrisikoramme. Dette gir en observerbar todelt uenighet i arbeidsgruppen,\nikke en ensidig kritikk av utkastet. De to brukerrepresentantene fra\nRecovery Norge dissenterer ikke — konsistent med organisasjonens\nrehabiliteringsorienterte perspektiv.</p></li>\n<li><p><strong>Dokumentasjon av metodisk rigor (Domain 3) er svakere i\nHdir-utkastet enn i NG206.</strong> NG206 støttes av åtte separate\nEvidence Reviews (A–H) med eksplisitte søkestrategier,\nseleksjonskriterier, GRADE-vurderinger og koblinger til anbefalinger.\nHdir-utkastet støttes av FHIs kunnskapsoppsummering og har eksplisitt\nGRADE-anvendelse, men formaliseringen av søkestrategi og\nseleksjonskriterier i selve retningslinjen er knappere.</p></li>\n<li><p><strong>Editorial independence (Domain 6) er lite dokumentert i\nselve retningslinjen.</strong> Habilitetsprosessen er beskrevet verbalt\ni kap. 1, men individuelle habilitetsskjemaer for de 21\narbeidsgruppemedlemmene er ikke offentlig publisert (slik NICE har gjort\nmed sitt Register of Interests). Oppdraget fra Helse- og\nomsorgsdepartementet er offentlig dokumentert i <em>Tildelingsbrev\n2026</em>, oppdrag <strong>TB2026-26</strong>, men er ikke referert\neller sitert i retningslinjedokumentet. Oppdragets tittel i\ntildelingsbrevet er <em>“Nasjonal faglig retningslinje for langvarig\nutmattelse av uklar årsak, inkludert CFS/ME”</em> — høringsutkastets\ntittel er <em>“Nasjonal faglig retningslinje for langvarig utmattelse,\ninkl. ME/CFS”</em>, uten kvalifikasjonen “av uklar årsak”. Oppdraget er\neksplisitt koblet til avvikling av den nasjonale kompetansetjenesten for\nCFS/ME og etablering av en ny “nasjonal kompetansetjeneste for\nutmattelsestilstander” — institusjonell kontekst som ikke er omtalt i\nretningslinjen.</p></li>\n<li><p><strong>Populasjonsbredden skaper strukturelle\ndokumentasjonsutfordringer.</strong> Hdir-utkastet dekker “langvarig\nutmattelse, inkl. ME/CFS” — en bredere populasjon enn NG206s avgrensning\ntil ME/CFS. Utkastet erkjenner selv at evidensen er svak for sentrale\nundergrupper (“Forskningsgrunnlaget for effekten hos pasienter med PEM\ndefinert etter Canadakriteriene eller WHO, er svakt. Det er få\nidentifiserte studier”), men differensieringen mellom undergrupper er\nikke konsekvent gjennomført i hver anbefaling. Bredden er ikke i seg\nselv en svakhet; det er et legitimt valg å favne flere pasientgrupper.\nMen bredden skaper metodiske forpliktelser som må reflekteres i\nanbefalingsstrukturen.</p></li>\n</ul>\n<p>Hovedteksten begrunner hver observasjon med henvisning til\nprimærkilder. Historisk kontekst (norsk og britisk utvikling 2006–2026)\ner behandlet separat i <em>Evolusjonsnotat v2.0</em>.</p>\n<h2 id=\"bakgrunn-og-metode\">1. Bakgrunn og metode</h2>\n<h3 id=\"om-agree-ii-som-analyseverktøy\">1.1 Om AGREE II som\nanalyseverktøy</h3>\n<p>AGREE II (Appraisal of Guidelines for Research and Evaluation, 2.\nutgave) er et internasjonalt validert instrument for å vurdere\nkvaliteten på utviklingsprosessen og rapporteringen av kliniske\nretningslinjer. Instrumentet er utviklet av AGREE Research Trust og\nbrukes bredt i metode- og retningslinjelitteratur. Det består av 23\nitems fordelt på 6 domener:</p>\n<ul>\n<li><p>Scope and Purpose (items 1–3)</p></li>\n<li><p>Stakeholder Involvement (items 4–6)</p></li>\n<li><p>Rigour of Development (items 7–14)</p></li>\n<li><p>Clarity of Presentation (items 15–17)</p></li>\n<li><p>Applicability (items 18–21)</p></li>\n<li><p>Editorial Independence (items 22–23)</p></li>\n</ul>\n<p>Hvert item skåres på en 7-punktsskala (1 = strongly disagree, 7 =\nstrongly agree). Domenesskåre beregnes som:</p>\n<p>(oppnådd sum − min. mulig sum) / (maks. mulig sum − min. mulig sum) ×\n100.</p>\n<p>Resultatet er en prosentandel mellom 0 og 100 per domene. AGREE II\nmåler metodisk kvalitet i utviklingsprosess og rapportering — ikke\nklinisk gyldighet av anbefalingene.</p>\n<h3 id=\"gjennomføring-av-denne-analysen\">1.2 Gjennomføring av denne\nanalysen</h3>\n<p>Analysen er basert på følgende primærkilder:</p>\n<ul>\n<li><p>NG206 fulltekst (96 sider), inkludert Overview, Recommendations,\nRecommendations for research, Rationale and impact, Terms used, Context\nog Update information.</p></li>\n<li><p>Hdir høringsutkast slik det forelå arkivert 18. april 2026,\ninkludert høringsbrev med Formål-seksjon og kap. 1 “Bakgrunn, metode og\nprosess”.</p></li>\n<li><p>Dissensdokumentasjon: fire fagdissenser listet i retningslinjens\nkap. 1 (Tom Farmen Nerli, Linn Breen Herner, Ingjerd Helene Jøssang,\nPeter Prydz) og tre brukerrepresentantdissenser publisert av\npasientforeningene (Trude Schei/ME-foreningen 26.02.2026, Tanja\nThorsen/ME-foreldrene 26.02.2026, Carina Mørch-Storstein/Norsk\nCovidforening 03.03.2026).</p></li>\n<li><p>Felles pressemelding fra de tre brukerforeningene\n13.03.2026.</p></li>\n</ul>\n<h3 id=\"viktige-forbehold\">1.3 Viktige forbehold</h3>\n<p><strong>Enkeltanalytiker.</strong> Standard AGREE II-praksis bruker\nto til fire uavhengige vurderere og rapporterer interrater-reliabilitet.\nDenne analysen er gjennomført som én strukturert gjennomgang og skal\nleses som “én analyses vurdering”, ikke som validert konsensus. Skårene\ngir en systematisk referanseramme, men presise tall-forskjeller bør\nbehandles med forsiktighet. Substansielle forskjeller (mer enn 10\nprosentpoeng på domenenivå) er mer robuste indikasjoner enn marginale\ndifferanser.</p>\n<p><strong>Utkaststatus for Hdir-dokumentet.</strong> Hdir-utkastet er\nunder høring til 4. mai 2026 og kan endres før endelig publisering.\nEnkelte items (særlig Item 13 om ekstern fagfellevurdering og Item 14 om\noppdateringsprosedyre) kan få annen skår ved endelig versjon.</p>\n<p><strong>Innsynsavhengige eller ikke offentlig publiserte\nmaterialer.</strong> Enkelte dokumenter er ikke offentlig tilgjengelige\nog er ikke konsultert: - Individuelle habilitetsskjemaer for de 21\narbeidsgruppemedlemmene i Hdir-prosessen. - NICE Register of Interests\n(29.10.2021, 1,12 MB, antatt offentlig tilgjengelig på\nNICE-nettstedet).</p>\n<p><strong>Offentlig tilgjengelige oppdragsdokumenter som ikke er\nreferert i retningslinjen.</strong> Oppdraget fra HOD til Hdir er\ndokumentert i <em>Tildelingsbrev 2026</em>, oppdrag\n<strong>TB2026-26</strong> (avd. Spesialisthelsetjenesteavdelingen,\nSHA), side 30. Dokumentet er offentlig, men er ikke referert eller\nsitert i retningslinjen. Saksnummer 24/13487 som Helsedirektoratet har\noppgitt for høringsinnsending, er den <em>interne høringssakens</em>\nsaksnummer — oppdragsreferansen fra HOD er TB2026-26. Oppdragets tittel\navviker fra leveransens: oppdraget er <em>“Nasjonal faglig retningslinje\nfor langvarig utmattelse av uklar årsak, inkludert CFS/ME”</em>, mens\nleveransens tittel er <em>“Nasjonal faglig retningslinje for langvarig\nutmattelse, inkl. ME/CFS”</em> (kvalifikasjonen “av uklar årsak” er\nfjernet).</p>\n<p>For items der sentrale vurderingskriterier krever disse dokumentene,\ner dette eksplisitt markert.</p>\n<p><strong>Populasjonsforskjell.</strong> NG206 dekker ME/CFS.\nHdir-utkastet dekker “langvarig utmattelse, inkl. ME/CFS” — en bredere\npopulasjon. Dette er en strukturell forskjell som påvirker direkte\nsammenlignbarhet på flere items. Detaljert behandling i underseksjon\n1.4.</p>\n<p><strong>Utvidet primærkildebasis.</strong> Brukerforeningenes\npubliseringer av sine brukerrepresentanters dissenser er behandlet som\nprimærkilder for prosessobservasjoner, på linje med Helsedirektoratets\negne publikasjoner. Dette er begrunnet i at de tre brukerrepresentantene\ner arbeidsgruppemedlemmer (ikke eksterne kommentatorer) og foreningene\nopptrer som utgiver-ansvarlige for sine egne dokumenter. Asymmetrien mot\nNG206 (der tilsvarende publikasjoner ikke finnes) er behandlet i\ntolkningen.</p>\n<h3 id=\"populasjonsforskjellen-som-strukturell-sak\">1.4\nPopulasjonsforskjellen som strukturell sak</h3>\n<p>Dette er den mest konsekvensfulle strukturforskjellen mellom de to\nretningslinjene og fortjener eksplisitt behandling fordi den påvirker\ntolkningen av flere items.</p>\n<p><strong>Hva forskjellen består i.</strong> NG206 dekker ME/CFS som en\navgrenset tilstand. NICE har adoptert modifiserte Institute of Medicine\n2015-kriterier med fire obligatoriske nøkkelsymptomer: invalidiserende\nutmattelse, post-exertional malaise (PEM), ikke-oppfriskende søvn eller\nsøvnforstyrrelser, og kognitive vansker. PEM er obligatorisk. Dette gir\nen relativt skarpt avgrenset pasientpopulasjon.</p>\n<p>Hdir-utkastet dekker “langvarig utmattelse, inkl. ME/CFS” — en\nbredere kategori der ME/CFS er én av flere tilstander innenfor rammen.\nTittelen signaliserer at anbefalinger skal gjelde for en populasjon som\ner større enn ME/CFS-populasjonen: post-viral utmattelse (inkludert\netter covid-19), annen langvarig utmattelse, og ME/CFS. Utkastet bruker\nCanadakriteriene for ME/CFS hos voksne, Jason pediatriske kriterier for\nbarn, og WHO-definisjon av PEM.</p>\n<p><strong>Hvorfor dette er en strukturell sak, ikke bare\nterminologisk.</strong> Forskjellen skaper ulike metodologiske\nforpliktelser:</p>\n<p>Når populasjonen er bredere, blir evidensgrunnlaget mer heterogent.\nEffektstudier av intervensjoner mot “utmattelse” inkluderer ofte\npasienter med ulike underliggende tilstander. En intervensjon som har\neffekt på postinfeksiøs utmattelse generelt, har ikke nødvendigvis\neffekt for en ME/CFS-pasient med PEM. Hdir-utkastet erkjenner denne\nproblematikken eksplisitt i kap. 2: “Forskningsgrunnlaget for effekten\nhos pasienter med PEM definert etter Canadakriteriene eller WHO, er\nsvakt. Det er få identifiserte studier.”</p>\n<p>Dette stiller retningslinjen overfor et strukturelt valg: - (a) gi\nanbefalinger basert på evidens fra den bredere populasjonen og anta at\nresultatene overføres til undergruppene, eller - (b) differensiere\nanbefalingene per undergruppe.</p>\n<p>Det første er metodisk problematisk for ME/CFS-pasienter med PEM,\nfordi inkluderte studier ofte har blandet eller ikke-spesifisert\npopulasjon. Det andre krever klare populasjonsskiller i hver anbefaling.\nHdir-utkastet differensierer delvis (f.eks. skilles Canadakriteriene for\nME/CFS ut), men differensieringen er ikke konsekvent gjennomført i alle\nanbefalinger.</p>\n<p>NICE begrenser derfor scope til ME/CFS og inkluderer ikke bredere\nutmattelsespopulasjoner.</p>\n<p><strong>Konsekvens for AGREE II-skåring.</strong> Der NG206 og Hdir\nskårer ulikt på et item, kan differansen ha minst to forklaringer: enten\nreell forskjell i retningslinjekvalitet, eller forskjell som skyldes at\nen bredere populasjon er vanskeligere å dokumentere like stringent. For\nenkelte items kan begge være sanne samtidig. Populasjonsforskjellen har\ndirekte vurderingsmessig betydning for følgende items:</p>\n<ul>\n<li><p><strong>Item 3 (Target population):</strong> populasjonsbredden\nkrever mer strukturert differensiering.</p></li>\n<li><p><strong>Item 9 (Strengths and limitations of evidence):</strong>\nHdir får lik skår som NG206 her, blant annet fordi utkastet transparent\nrapporterer evidensens begrensning for PEM-populasjonen.</p></li>\n<li><p><strong>Item 12 (Link between recommendations and\nevidence):</strong> overordnede anbefalinger (for eksempel\n“aktivitetsregulering”) dekker flere evidenskategorier, og koblingen\nmellom de ulike delene av anbefalingen, hvilken evidens som støtter dem,\nog hvilken populasjon evidensen gjelder, er ikke alltid\neksplisitt.</p></li>\n<li><p><strong>Tolkning av Domain 3 som helhet:</strong>\nskåreforskjeller bør leses med forståelse for at oppgaven Hdir har\npåtatt seg (bredere populasjon), metodologisk er mer krevende å løse\nlike konsekvent som NICEs smalere scope.</p></li>\n</ul>\n<p><strong>Konsekvens for pasienter med PEM.</strong> Dersom\nretningslinjen blander populasjoner i anbefalingene, risikerer man at\nintervensjoner testet på bredere utmattelsespopulasjoner (ofte uten\nPEM-krav) anbefales som generelle tiltak — og dermed implisitt også for\npasienter med ME/CFS og obligatorisk PEM. Retningslinjen uttaler selv at\nevidensen er svak for PEM-populasjonen, men gir likevel anbefalinger som\ngjelder hele “langvarig utmattelse”-kategorien. Dette er en observasjon\nav strukturell logikk, ikke en normativ kritikk.</p>\n<p><strong>Hva forskjellen ikke betyr.</strong> Populasjonsbredden er\nikke i seg selv en svakhet ved Hdir-utkastet. Norge kan ha legitime\ngrunner til å ville ha en retningslinje som dekker langvarig utmattelse\nbredt, siden mange pasienter med utmattelsesproblemer ikke oppfyller\nstrenge ME/CFS-kriterier, men likevel har behov for helsetjenester.\nBredden reflekterer et valg om å favne flere. Poenget er at bredden\n<em>skaper metodiske forpliktelser</em> som et strengt avgrensningsvalg\n(slik NG206 har) ikke innebærer.</p>\n<h2 id=\"domenesskårer-og-sammenstilling\">2. Domenesskårer og\nsammenstilling</h2>\n<p><strong>Samlet oversikt:</strong></p>\n<table style=\"width:100%;\">\n<colgroup>\n<col style=\"width: 14%\" />\n<col style=\"width: 14%\" />\n<col style=\"width: 14%\" />\n<col style=\"width: 14%\" />\n<col style=\"width: 14%\" />\n<col style=\"width: 14%\" />\n<col style=\"width: 14%\" />\n</colgroup>\n<thead>\n<tr class=\"header\">\n<th>Domene</th>\n<th>Items</th>\n<th>NG206 sum</th>\n<th>NG206 %</th>\n<th>Hdir sum</th>\n<th>Hdir %</th>\n<th>Forskjell (p.p.)</th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>1. Scope and Purpose</td>\n<td>1–3</td>\n<td>19/21</td>\n<td>88,9</td>\n<td>15/21</td>\n<td>66,7</td>\n<td>+22,2</td>\n</tr>\n<tr class=\"even\">\n<td>2. Stakeholder Involvement</td>\n<td>4–6</td>\n<td>18/21</td>\n<td>83,3</td>\n<td>15/21</td>\n<td>66,7</td>\n<td>+16,7</td>\n</tr>\n<tr class=\"odd\">\n<td>3. Rigour of Development</td>\n<td>7–14</td>\n<td>47/56</td>\n<td>81,3</td>\n<td>36/56</td>\n<td>58,3</td>\n<td>+23,0</td>\n</tr>\n<tr class=\"even\">\n<td>4. Clarity of Presentation</td>\n<td>15–17</td>\n<td>17/21</td>\n<td>77,8</td>\n<td>16/21</td>\n<td>72,2</td>\n<td>+5,6</td>\n</tr>\n<tr class=\"odd\">\n<td>5. Applicability</td>\n<td>18–21</td>\n<td>21/28</td>\n<td>70,8</td>\n<td>13/28</td>\n<td>37,5</td>\n<td>+33,3</td>\n</tr>\n<tr class=\"even\">\n<td>6. Editorial Independence</td>\n<td>22–23</td>\n<td>11/14</td>\n<td>75,0</td>\n<td>6/14</td>\n<td>33,3</td>\n<td>+41,7</td>\n</tr>\n</tbody>\n</table>\n<p>NG206 skårer høyere på alle domener. Forskjellen er moderat i Domain\n4 (som måler visuell og språklig klarhet — et område der Hdirs\nstandardiserte anbefalingsformat fungerer godt) og substansiell i Domain\n5 og 6. Dette mønstret er empirisk forenlig med at NICE har et modent\nmetodologisk apparat (PMG20, separate Evidence Reviews, Register of\nInterests, publiserte Quality Standards) som er synlig i\nretningslinjedokumentet, mens Hdirs prosess i mindre grad er formalisert\ni selve retningslinjeteksten.</p>\n<h2 id=\"vurdering-per-domene\">3. Vurdering per domene</h2>\n<h3 id=\"domain-1-scope-and-purpose\">Domain 1 — Scope and Purpose</h3>\n<p><strong>Domenesskåre: NG206 88,9 % | Hdir 66,7 %</strong></p>\n<h4 id=\"item-1-overall-objective-described\">Item 1 — Overall objective\ndescribed</h4>\n<p><em>NG206: skår 6.</em> Overview-seksjonen (s. 5) gir tydelig\nformålsformulering: “This guideline covers diagnosing and managing\nmyalgic encephalomyelitis (or encephalopathy)/chronic fatigue syndrome\n(ME/CFS)… It aims to improve awareness and understanding about ME/CFS\nand when to suspect it, so that people are diagnosed earlier.” Formålet\ner forankret i en substansiell Context-seksjon (s. 93) som gir\nepidemiologisk forankring (prevalens ca. 250 000 i England og Wales,\nkjønnsfordeling 2,4:1, 25 % med alvorlig sykdom, livskvalitet lavere enn\nved flere andre kroniske tilstander). Trekket fra skår 7 er at\nformulerte mål er kvalitative (“improve awareness”) snarere enn\nkvantifiserte utfallsmål.</p>\n<p><em>Hdir: skår 5.</em> Høringsbrevets “Formål”-seksjon formulerer to\nmål eksplisitt: (1) at pasienter får “kunnskapsbasert, individuelt\ntilpasset helsehjelp som bidrar til økt livskvalitet, mestring og\nbedring”, og (2) at helsepersonell “opplever å ha tydelige råd”.\nStrukturen er tydelig (kulepunkt-format). Trekket fra høyere skår er at\nepidemiologisk og kontekstuell forankring på Context-nivå (som NG206\nhar) ikke er like utbygget i det tilgjengelige materialet fra kap.\n1.</p>\n<h4 id=\"item-2-health-questions-specifically-described\">Item 2 — Health\nquestion(s) specifically described</h4>\n<p><em>NG206: skår 6.</em> Helsespørsmålene er operasjonalisert i åtte\nseparate Evidence Reviews (A–H) med eksplisitte review-spørsmål og\nPICO-strukturerte inklusjonskriterier. Retningslinjen selv refererer til\ndisse konsekvent (“Full details of the evidence and the committee’s\ndiscussion are in evidence review…”). Dette gir sporbar struktur fra\noverordnet formål til spesifikke besvarelsespørsmål.</p>\n<p><em>Hdir: skår 5.</em> Retningslinjen formulerer 12 anbefalinger\nfordelt på 4 kapitler. GRADE-vurderinger er gjennomført (kap. 2), men\neksplisitte PICO-formulerte helsespørsmål i selve\nretningslinjedokumentet er mindre synlige. Formålsformuleringen fra\nhøringsbrevet og strukturen i anbefalingene indikerer indirekte hvilke\nspørsmål som er dekket.</p>\n<h4 id=\"item-3-target-population-specifically-described\">Item 3 — Target\npopulation specifically described</h4>\n<p><em>NG206: skår 7.</em> Populasjonen er spesifikt beskrevet med\naldersgrupper (barn, unge og voksne), adopterte diagnostiske kriterier\n(Institute of Medicine 2015, adaptert med redusert varighet og\npresiserte symptomdefinisjoner), fire nøkkelsymptomer (invalidiserende\nutmattelse, post-exertional malaise, ikke-oppfriskende søvn, kognitive\nvansker), og eksplisitt stratifisering etter alvorlighetsgrad (Box 1 s.\n7, samt dedikert seksjon 1.17 for severe og very severe). Definisjoner i\n“Terms used” (s. 56+) gir presis begrepsavklaring.</p>\n<p><em>Hdir: skår 5.</em> Populasjonen er bredere (“langvarig\nutmattelse, inkl. ME/CFS”) og inkluderer flere tilstander. Diagnostiske\nkriterier er spesifisert (Canadakriteriene for voksne ME/CFS, Jason\npediatriske kriterier for barn, WHO-definisjon og Canadakriteriene for\nPEM). Men populasjonsbredden skaper en definitorisk utfordring: hvilke\ntilstander innenfor “langvarig utmattelse” gjelder hvilke anbefalinger?\nDifferensiering mellom ME/CFS, post-viral fatigue, long covid og andre\nutmattelsestilstander er ikke like strukturert synliggjort som NG206s\nME/CFS-spesifikke tilnærming. Populasjonsvalget behandles i detalj i\nseksjon 1.4 — poenget for Item 3 er at kriteriesettene er definert, men\nat operasjonaliseringen av hvilke undergrupper som omfattes av hvilken\nanbefaling er mindre eksplisitt.</p>\n<h3 id=\"domain-2-stakeholder-involvement\">Domain 2 — Stakeholder\nInvolvement</h3>\n<p><strong>Domenesskåre: NG206 83,3 % | Hdir 66,7 %</strong></p>\n<h4 id=\"item-4-gdg-includes-all-relevant-professional-groups\">Item 4 —\nGDG includes all relevant professional groups</h4>\n<p><em>NG206: skår 5.</em> NICEs “Committee details”-side (referert i\nretningslinjen, s. 95) er offentlig tilgjengelig og angir\nkomitesammensetningen. Retningslinjen er utviklet ved National Guideline\nCentre (Royal College of Physicians). NICE har etablert praksis for\ntverrfaglig komitesammensetning. Uten direkte verifisering av committee\ndetails-dokumentet kan jeg ikke heve skåren til 6–7; 5 reflekterer at\nprosessen er dokumentert i separate kilder men ikke direkte listet i\nhovedretningslinjen.</p>\n<p><em>Hdir: skår 6.</em> Arbeidsgruppens sammensetning er eksplisitt\nlistet i kap. 1: 21 medlemmer med profesjonskategorier spesifisert — 2\nfastleger, 3 psykologspesialister, 2 fysioterapeuter, 2 ergoterapeuter,\n2 spesialister i barnemedisin, 2 spesialister i fysikalsk medisin og\nrehabilitering, 1 helsesykepleier, 1 spesialist i infeksjonsmedisin, 1\nNAV-rådgivende overlege, samt 5 brukerrepresentanter (Recovery Norge ×\n2, ME-foreningen × 1, ME-foreldrene × 1, Norsk Covidforening × 1). I\ntillegg prosjektgruppe på 5 seniorrådgivere fra Helsedirektoratet med\njuridisk og metodisk støtte. Transparens om sammensetning er bedre\ndokumentert direkte i retningslinjen enn i NG206. Trekket fra 7 er at\nenkelte kompetanseområder som kunne vært ventet i et bredt fagfelt\n(f.eks. nevrologi, immunologi) ikke er navngitt.</p>\n<h4 id=\"item-5-views-and-preferences-of-target-population-sought\">Item 5\n— Views and preferences of target population sought</h4>\n<p><em>NG206: skår 6.</em> NICEs prosess for brukerinvolvering\ninkluderer pasient- og lekrepresentanter i komiteen, og kvalitativ\nevidens om pasienterfaring som del av Evidence Reviews. NG206 refererer\neksplisitt til evidens om pasienterfaring i flere rationale-seksjoner\n(“The qualitative evidence showed that people with ME/CFS have found CBT\nuseful when delivered by a therapist who understands ME/CFS, but also\nthat there is the potential for harm when it is inappropriately\ndelivered”). Interessentkonsultasjon er en formalisert del av\nNICE-prosessen.</p>\n<p><em>Hdir: skår 3.</em> Dette er et komplekst item. Prosedyren\neksisterer: fem brukerrepresentanter i arbeidsgruppen, brukererfaring\neksplisitt del av kunnskapsgrunnlaget (“forskningslitteratur, klinisk\nerfaring og brukererfaring på en systematisk måte vurderes opp mot\nønskede og uønskede konsekvenser av et tiltak”), og FHIs kvalitative\nsystematiske oversikt (Hestevik, Langøien, Bergsund, 2025) er anvendt.\nMen det empiriske utfallet av prosedyren er observerbart problematisk: 3\nav 5 brukerrepresentanter — alle representantene fra ME-foreningen,\nME-foreldrene og Norsk Covidforening — har tatt formell dissens på\nutkastet etter publisering. De to brukerrepresentantene fra Recovery\nNorge dissenterer ikke, konsistent med organisasjonens\nrehabiliteringsorienterte perspektiv. I tillegg har fire fagdissenser\nfra arbeidsgruppen (Nerli, Herner, Jøssang, Prydz) blitt levert før\npublisering. Samlet 7/21 dissensrate fordelt på to motsatt orienterte\nblokker (jf. seksjon 5.5): fagdissensene etterlyser sterkere\nrehabiliteringsoptimisme, brukerdissensene etterlyser tydeligere\nPEM-differensiering. ME-foreldrene-publiseringen 5. mars 2026 beskriver\nat taushetspliktsregimet de facto forhindret styrene fra å vurdere\nutkastet som helhet før publisering. Skåren gjenspeiler diskrepansen\nmellom prosedyre og utfall, samt den todelte strukturen i\nuenigheten.</p>\n<p><em>Merknad:</em> Item 5 er operasjonalisert bredt i denne analysen —\nikke bare “ble synspunktene innhentet?” men også “ble de faktisk\nreflektert i sluttdokumentet?”. Dette er i tråd med AGREE II User\nManuals vurderingskriterier om at interessentinvolvering skal være\nsporbar gjennom hele prosessen. En strengt prosedyre-orientert tolkning\nville gitt en høyere skår.</p>\n<h4 id=\"item-6-target-users-of-the-guideline-clearly-defined\">Item 6 —\nTarget users of the guideline clearly defined</h4>\n<p><em>NG206: skår 7.</em> Eksplisitt “Who is it for?”-seksjon s. 5\nangir tre hovedgrupper: helse- og sosialfagpersonell (inkludert dem som\njobber i eller gir innspill til utdanning og bedriftshelse),\ncommissioners, og personer med mistenkt eller diagnostisert ME/CFS og\nderes familier/omsorgspersoner. Anbefalinger gjennom hele dokumentet er\nrettet mot spesifikke profesjonsgrupper.</p>\n<p><em>Hdir: skår 6.</em> Høringsbrevets Formål angir pasienter og\nhelsepersonell. Anbefalingene er rettet mot spesifikke roller: fastlege\n(2.1, 2.3, 4.1), virksomhetsleder (3.1), kommune (3.2), spesialist i\nbarne- og ungdomsmedisin (4.2). Målgruppeidentifikasjon er tydelig i\nhver anbefaling. Trekket fra 7 er at “commissioners” eller tilsvarende\nbestillerroller ikke er like eksplisitt adressert.</p>\n<h3 id=\"domain-3-rigour-of-development\">Domain 3 — Rigour of\nDevelopment</h3>\n<p><strong>Domenesskåre: NG206 81,3 % | Hdir 58,3 %</strong></p>\n<p>Dette er studiens hoveddomene og den største skårforskjellen, drevet\nav mer formalisert metodedokumentasjon i NICE-strukturen.</p>\n<h4 id=\"item-7-systematic-methods-for-evidence-search\">Item 7 —\nSystematic methods for evidence search</h4>\n<p><em>NG206: skår 6.</em> Retningslinjen bygger på åtte separate\nEvidence Reviews (A–H) med systematiske søkestrategier. NICE Methods\nManual (PMG20) definerer metodikk. Søkestrategier er vedlegg til hver\nEvidence Review. Selve retningslinjen refererer til disse\nkonsekvent.</p>\n<p><em>Hdir: skår 5.</em> Sitat fra kap. 1: “gjennomført systematiske\nlitteratursøk på aktivitetsbaserte intervensjoner og kognitiv\natferdsterapi. Et stort antall systematiske oversikter ble identifisert.\nDe samme primærstudiene er inkludert i de fleste av de systematiske\noversiktene, derfor ble de nyeste systematiske oversiktene av god eller\nmoderat kvalitet inkludert.” Og: “Oppdatert litteratursøk vil\ngjennomføres før endelig publisering.” Søkestrategi er indikert men ikke\nspesifisert i full detalj i selve retningslinjen. FHIs\nkunnskapsoppsummering (som ligger som vedlegg til prosessen) inneholder\nmer detaljert søkemetodikk, men denne er ikke direkte integrert i\nretningslinjedokumentet.</p>\n<h4 id=\"item-8-criteria-for-selecting-evidence-clearly-described\">Item 8\n— Criteria for selecting evidence clearly described</h4>\n<p><em>NG206: skår 6.</em> Hver Evidence Review har eksplisitt\nPICO-struktur, inklusjons- og eksklusjonskriterier, og begrunnet\nseleksjon av studier.</p>\n<p><em>Hdir: skår 4.</em> Det er angitt at nyeste systematiske\noversikter av god eller moderat kvalitet ble inkludert, men formelle\ninklusjons- og eksklusjonskriterier er ikke eksplisitt listet i\nretningslinjen. Prinsippet om å bruke nyeste SR-er er metodologisk\nlegitimt, men gir mindre transparens enn NICE-modellen.</p>\n<h4\nid=\"item-9-strengths-and-limitations-of-evidence-clearly-described\">Item\n9 — Strengths and limitations of evidence clearly described</h4>\n<p><em>NG206: skår 6.</em> GRADE anvendt i Evidence Reviews.\nRationale-seksjoner diskuterer evidensens karakter eksplisitt (“the\nevidence for non-pharmacological and pharmacological interventions for\nME/CFS was heterogenous and inconclusive, with limited evidence for any\nsingle intervention”).</p>\n<p><em>Hdir: skår 6.</em> Eksplisitt GRADE-anvendelse. Konkrete\neffektestimater med konfidensintervaller og tillit-nivåer rapporteres\n(Hedge’s g, SMD). Eksempler på rapporterte funn fra kap. 2: - Utmattelse\netter CBT-behandling: g = −0,52 (KI −0,69 til −0,35), lav tillit -\nFysisk funksjon etter CBT-behandling: g = 0,29 (KI 0,11 til 0,47), svært\nlav tillit (risiko for skjevhet, heterogenitet I² = 76,6 %, mangel på\npresisjon) - Langtidsoppfølging fysisk funksjon: g = 0,15 (KI −0,18 til\n0,47), svært lav tillit - Gradert aktivitet fysisk funksjon etter\noppfølging: MD = 19,56, svært lav tillit (risiko for skjevhet, mangel på\npresisjon, høy heterogenitet I² = 90,7 %)</p>\n<p>Eksplisitt omtale av evidensgrunnlagets begrensninger for\nPEM-populasjonen: “Forskningsgrunnlaget for effekten hos pasienter med\nPEM definert etter Canadakriteriene eller WHO, er svakt. Det er få\nidentifiserte studier.” Dette er en transparent rapportering av\nevidensgrunnlagets svakhet, særlig viktig gitt populasjonsbredden i\nutkastet (jf. seksjon 1.4): når en bred utmattelsespopulasjon dekkes, er\nåpen markering av at evidensen er svakere for enkelte undergrupper (her:\nME/CFS-pasienter med obligatorisk PEM) metodologisk viktig for brukeren\nav retningslinjen.</p>\n<p>Dette er ett av få items der Hdir og NG206 skårer likt. Hdir-utkastet\nhar solid GRADE-anvendelse og er transparent om evidensens svakhet for\nsentrale undergrupper.</p>\n<h4\nid=\"item-10-methods-for-formulating-recommendations-clearly-described\">Item\n10 — Methods for formulating recommendations clearly described</h4>\n<p><em>NG206: skår 5.</em> PMG20 definerer NICEs konsensusprosess (§\n3.9). Minutes er publisert. Hver anbefaling ledsages av “Why the\ncommittee made the recommendation”-seksjon som dokumenterer komitéens\nresonnement. Fire medlemmer trakk seg fra komiteen i juli 2021 før\npublisering; dette er dokumentert i minutes men ikke diskutert i\nhovedteksten.</p>\n<p><em>Hdir: skår 4.</em> Kunnskapsbasert tilnærming er beskrevet\ngenerelt: forskningslitteratur, klinisk erfaring og brukererfaring veies\nsammen. Vekting: “På områder der det er funnet mindre forskningsbasert\nkunnskap og/eller overføringsverdien fra internasjonal til norsk\nhelsetjeneste er lav, blir klinisk kunnskap og brukerkunnskap tillagt\nstørre vekt.” Dissens kan tas, og fire fagdissenser er listet i kap. 1.\nTrekket fra høyere skår: konsensusmetode (f.eks. stemmegivning, Delphi,\nnominell gruppeteknikk) er ikke spesifisert. Prosedyre for håndtering av\netterhåndsdissens (som faktisk inntraff — tre brukerrepresentanter tok\ndissens 26.02.–03.03.2026) er ikke beskrevet. Hvordan den bredere\n“klinisk kunnskap og brukerkunnskap”-vektingen ble operasjonalisert\nkonkret er ikke dokumentert.</p>\n<h4 id=\"item-11-health-benefits-side-effects-risks-considered\">Item 11 —\nHealth benefits, side effects, risks considered</h4>\n<p><em>NG206: skår 6.</em> “Rationale and impact”-seksjoner og “How the\nrecommendation might affect practice”-avsnitt adresserer risiko\nsystematisk. Eksempel: eksplisitt diskusjon av “controversy over graded\nexercise therapy had resulted in confusion over what support should be\navailable” og “potential for harm when CBT is inappropriately\ndelivered”. Post-exertional malaise er et gjennomgående risikobasert\nprinsipp i anbefalingene.</p>\n<p><em>Hdir: skår 5.</em> Begrunnelsesseksjoner for hver anbefaling. PEM\ner nevnt som sentral konsekvens av aktivitet for pasienter med ME/CFS.\nMen systematisk diskusjon av nytte–risiko per anbefaling er mindre\nsynlig enn i NG206s “Rationale and impact”-struktur.</p>\n<h4\nid=\"item-12-explicit-link-between-recommendations-and-supporting-evidence\">Item\n12 — Explicit link between recommendations and supporting evidence</h4>\n<p><em>NG206: skår 7.</em> Hver anbefaling kobler eksplisitt til\nspesifikk Evidence Review: “Full details of the evidence and the\ncommittee’s discussion are in evidence review G: non-pharmacological\nmanagement of ME/CFS and evidence review H: appendices…” Dette gir\ndirekte sporing mellom anbefaling og evidens.</p>\n<p><em>Hdir: skår 5.</em> Begrunnelser refererer til FHIs\nkunnskapsoppsummering og spesifikke studier (Casson et al. 2023, Maas et\nal. 2024, Kuut et al. 2023 og 2024, Nerli et al. 2024, Kong et al. 2023,\nSamper-Pedro et al. 2023, Zeraatkar et al. 2024). Men koblingen mellom\nspesifikke anbefalinger og spesifikke studier er mindre systematisk.\nEksempel: “aktivitetsregulering” (anbefaling 2.5) er et overordnet\nkonsept som dekker flere evidenskategorier, og det er ikke alltid\ntydelig hvilke studier som støtter hvilke deler av anbefalingen.\nPopulasjonsbredden i utkastet (jf. seksjon 1.4) skjerper denne\nutfordringen: når anbefalingen gjelder hele “langvarig\nutmattelse”-populasjonen, men den siterte evidensen er fra studier med\nulike populasjoner (noen med PEM-krav, andre uten), blir manglende\neksplisitt kobling særlig betydningsfull. En bruker av retningslinjen\nkan ikke fra teksten alene vurdere om en bestemt studie er relevant for\nsin pasientgruppe.</p>\n<h4\nid=\"item-13-externally-reviewed-by-experts-prior-to-publication\">Item 13\n— Externally reviewed by experts prior to publication</h4>\n<p><em>NG206: skår 6.</em> NICEs formelle\ninteressentkonsultasjonsprosess. <em>Consultation</em>-dokumenter\npublisert. Respons på innspill dokumentert.</p>\n<p><em>Hdir: skår 4.</em> Høringen pågår på vurderingstidspunktet (frist\n4. mai 2026). Prosedyren er godt dokumentert: tre innsendingsperioder\n(frem til 2. mars, 2.–18. mars, 18. mars–8. april), alle høringsinnspill\ntilgjengelige i Excel/ZIP-format på høringssiden. Dette er positivt for\nprosessuell transparens. Trekket fra høyere skår: utfallet av høringen\n(hvordan innspillene er håndtert) kan ikke vurderes før etter\nhøringsfristen. I tillegg er det en observerbar intern uenighet som kan\nkarakteriseres som signal om utkastets kvalitet: 7\narbeidsgruppemedlemmer har tatt formell dissens — 4 fagpersoner før\npublisering og 3 brukerrepresentanter etter publisering. Dette er ikke\nekstern review i egentlig forstand (de er arbeidsgruppemedlemmer), men\ndet er en observerbar indikator på at intern review ikke produserte\nkonsensus.</p>\n<h4 id=\"item-14-procedure-for-updating-provided\">Item 14 — Procedure for\nupdating provided</h4>\n<p><em>NG206: skår 5.</em> NG206 erstattet CG53 (publisert august 2007),\nmed et oppdateringsintervall på ca. 14 år. NICE har standardisert\nprosedyre for surveillance review. I selve retningslinjen er prosedyre\nfor fremtidige oppdateringer implisitt gjennom NICE-strukturen, ikke\neksplisitt spesifisert.</p>\n<p><em>Hdir: skår 3.</em> Kap. 1 angir: “Oppdatert litteratursøk vil\ngjennomføres før endelig publisering (etter ekstern høring), for å sikre\nat nyere forskning fanges opp.” Dette gjelder denne revisjonens\nferdiggjøring, ikke fremtidige oppdateringer av endelig retningslinje.\nProsedyre for fremtidige oppdateringer (tidshorisont, ansvarlig,\nkriterier for oppdatering) er ikke identifisert. Utkaststatus gjør dette\nforståelig men ikke fraværet eksonert — mange retningslinjer inkluderer\noppdateringsplan allerede i utkastsform.</p>\n<h3 id=\"domain-4-clarity-of-presentation\">Domain 4 — Clarity of\nPresentation</h3>\n<p><strong>Domenesskåre: NG206 77,8 % | Hdir 72,2 %</strong></p>\n<p>Dette er det domenet med minst forskjell mellom retningslinjene.\nBegge har etablerte og profesjonelle presentasjonsformater.</p>\n<h4 id=\"item-15-recommendations-specific-and-unambiguous\">Item 15 —\nRecommendations specific and unambiguous</h4>\n<p><em>NG206: skår 6.</em> Anbefalingene er nummererte med hierarkisk\nstruktur (1.1.1, 1.11.3, 1.17.1). NICE bruker standardisert\nspråkmarkering for styrke: “Making decisions using NICE guidelines”\nforklarer hvordan ordvalg signaliserer styrke/certainty. Anbefalingene\ner presise og handlingsrettede.</p>\n<p><em>Hdir: skår 6.</em> 12 anbefalinger med tydelig styrkemarkering\ndefinert i kap. 1: “skal” (lovregulert eller så klart faglig forankret\nat det sjelden er forsvarlig å fravike), “bør”/“anbefaler” (sterk\nanbefaling), “kan”/“foreslår” (svak anbefaling). Eksempler på presise\nanbefalinger: “2.4 For diagnostisering av ME/CFS hos voksne anbefales\nCanadakriteriene.” Handlingsrettet og entydig. Standardisert struktur\n(Anbefaling → Praktisk informasjon → Begrunnelse) bidrar til\ntydelighet.</p>\n<h4 id=\"item-16-different-management-options-clearly-presented\">Item 16\n— Different management options clearly presented</h4>\n<p><em>NG206: skår 5.</em> Flere områder diskuterer alternativer: energy\nmanagement-prinsipper med ulike komponenter, CBT som støttende\nintervensjon (ikke kur), alvorlighetsdifferensierte tiltak. For noen\nområder (f.eks. eksplisitt fjerning av GET som anbefaling) er det én\nanbefaling.</p>\n<p><em>Hdir: skår 4.</em> Anbefaling 2.5 “aktivitetsregulering” er\noverordnet; GRADE-vurderingene i kap. 2 omtaler både pacing og gradert\naktivitet som separate tilnærminger, men anbefalingen selv skiller ikke\neksplisitt mellom alternativene. Dette kan være bevisst (for å unngå\npreskriptiv detaljering), men gjør sammenligning av alternativer mindre\nsynlig for brukeren av retningslinjen. Trekket fra lavere skår: pasient-\neller situasjonsspesifikke valgalternativer er lite differensiert.</p>\n<h4 id=\"item-17-key-recommendations-easily-identifiable\">Item 17 — Key\nrecommendations easily identifiable</h4>\n<p><em>NG206: skår 6.</em> Visuell struktur med bokser (Box 1 Severity,\nBox 5 CBT), dedikert “Key recommendations for research”-seksjon (s. 62),\nog klar numerisk hierarki. Anbefalinger for “Care for people with severe\nor very severe ME/CFS” plassert i egen seksjon “to make sure they could\nbe easily found within the guideline”.</p>\n<p><em>Hdir: skår 6.</em> 12 anbefalinger i standardisert layout.\nKapittelvis nummerering (2.1–2.6, 3.1–3.2, 4.1–4.4) gjør navigering\nenkel. Normeringsnivå markert i hver anbefaling.</p>\n<h3 id=\"domain-5-applicability\">Domain 5 — Applicability</h3>\n<p><strong>Domenesskåre: NG206 70,8 % | Hdir 37,5 %</strong></p>\n<p>Dette er den nest største skårforskjellen. NICE-modellen er\nomfattende utviklet på implementeringssiden; Hdir-utkastet er mindre\nutbygget her.</p>\n<h4 id=\"item-18-facilitators-and-barriers-described\">Item 18 —\nFacilitators and barriers described</h4>\n<p><em>NG206: skår 6.</em> “How the recommendation might affect\npractice”-seksjoner adresserer dette eksplisitt. Eksempler: “Training\nand education in ME/CFS are not widespread and this will be a change in\npractice”, “current provision of ME/CFS specialist teams is very uneven\nacross the country and increased staffing may be needed in some areas”,\n“Allocating a single point of contact to people with ME/CFS is not\nroutine practice across the NHS”.</p>\n<p><em>Hdir: skår 4.</em> Implementeringsdiskusjon er mindre eksplisitt.\nHøringsbrevet ber om forslag til implementeringstiltak, som signaliserer\nat dette er et område der dokumentet ønsker innspill. Barrierer og\nfasiliteringer er adressert i begrunnelsesfeltene per anbefaling, men\nikke like systematisk.</p>\n<h4 id=\"item-19-advice-andor-tools-for-implementation\">Item 19 — Advice\nand/or tools for implementation</h4>\n<p><em>NG206: skår 6.</em> “NICE has produced tools and resources to\nhelp you put this guideline into practice” (s. 95). Omfattende\nverktøy-base på NICE-nettsted. Pasientinformasjon, beslutningsstøtte,\nauditverktøy.</p>\n<p><em>Hdir: skår 4.</em> “Praktisk informasjon”-seksjoner i hver\nanbefaling gir eksempler på gjennomføring. Struktur: “Praktisk\ninformasjon beskriver hvordan anbefalingen kan gjennomføres i praksis\neller eksempler på mulig innhold.” Men eksterne verktøy, sjekklister og\nbeslutningsalgoritmer er ikke identifisert som vedlegg i tilgjengelig\nmateriale.</p>\n<h4 id=\"item-20-resource-implications-considered\">Item 20 — Resource\nimplications considered</h4>\n<p><em>NG206: skår 5.</em> Systematisk diskutert i “How the\nrecommendations might affect practice”-seksjoner. Eksempler: “there will\nbe a resource impact from the cost of providing this training”, “There\nmay be an increased number of home visits for people with severe or very\nsevere ME/CFS. However, this will provide equity of access to care for\nthis group who are usually housebound”. Ikke kvantifiserte\nhelseøkonomiske analyser i selve retningslinjen, men systematisk\nkvalitativ vurdering.</p>\n<p><em>Hdir: skår 3.</em> Ressursspørsmål er implisitte i flere\nbegrunnelser, men formelle ressursestimater eller systematisk kvalitativ\nressursvurdering er lite synlig.</p>\n<h4 id=\"item-21-monitoring-andor-auditing-criteria-presented\">Item 21 —\nMonitoring and/or auditing criteria presented</h4>\n<p><em>NG206: skår 4.</em> NICE publiserer Quality Standards separat som\nkoblet til retningslinjen (etablert NICE-modell). I selve retningslinjen\ner monitoring/audit-kriterier ikke eksplisitte.</p>\n<p><em>Hdir: skår 2.</em> Monitoring- eller auditkriterier er ikke\nidentifisert i det tilgjengelige materialet. Ingen eksplisitte\nkvalitetsindikatorer knyttet til anbefalinger.</p>\n<h3 id=\"domain-6-editorial-independence\">Domain 6 — Editorial\nIndependence</h3>\n<p><strong>Domenesskåre: NG206 75,0 % | Hdir 33,3 %</strong></p>\n<p>Den største domeneforskjellen. Domenet er substansielt påvirket av at\ninnsynsavhengige materialer ikke er tilgjengelige for\nHdir-vurderingen.</p>\n<h4 id=\"item-22-views-of-funding-body-have-not-influenced-content\">Item\n22 — Views of funding body have not influenced content</h4>\n<p><em>NG206: skår 5.</em> NICE er et offentlig eksekutivt organ\n(executive non-departmental public body) med etablert metodologisk\nuavhengighet beskyttet i PMG20. Ingen eksplisitt erklæring om at\nfinansieringskildens synspunkter ikke har påvirket innhold er direkte\nsitert i retningslinjen, men NICE-strukturen er allment akseptert som\nmetodologisk uavhengig.</p>\n<p><em>Hdir: skår 3 (med delskåringsmerknad).</em> Helsedirektoratet er\nretningslinjens utgiver. Oppdragsgiver er Helse- og\nomsorgsdepartementet. Oppdraget er dokumentert i <em>Tildelingsbrev 2026\nfra HOD til Hdir</em>, oppdrag <strong>TB2026-26</strong>, side 30.\nDokumentet er offentlig tilgjengelig, men er <strong>ikke referert eller\nsitert i retningslinjen</strong>. Saksnummer 24/13487 som\nHelsedirektoratet har oppgitt i høringsinvitasjonen refererer til Hdirs\ninterne høringssak, ikke til oppdraget fra HOD.</p>\n<p><strong>Substansielt tittelavvik mellom oppdrag og\nleveranse.</strong> Tildelingsbrevet oppdrar <em>“Nasjonal faglig\nretningslinje for langvarig utmattelse <strong>av uklar årsak</strong>,\ninkludert CFS/ME”</em>. Høringsutkastet har tittelen <em>“Nasjonal\nfaglig retningslinje for langvarig utmattelse, inkl. ME/CFS”</em> — uten\nkvalifikasjonen “av uklar årsak”. Hdir har altså fjernet\nscope-kvalifikasjonen under utarbeidelsen. Dette er en redaksjonell\nendring som potensielt utvider scope fra medisinsk uforklart utmattelse\ntil all langvarig utmattelse, og som ikke er forklart eller drøftet i\nretningslinjen.</p>\n<p><strong>Institusjonell kontekst fra oppdraget som ikke er omtalt i\nretningslinjen.</strong> TB2026-26 begrunner oppdraget eksplisitt med\ntre formål: (1) “faglig grunnlag for et ev. fremtidig nasjonalt\npasientforløp”; (2) “faglig grunnlag for virksomheten i en nasjonal\nkompetansetjeneste for utmattelsestilstander” (ny bredere tjeneste); (3)\n“pågående prosess for avvikling og omorganisering av den nasjonale\nkompetansetjenesten for CFS/ME”. Disse institusjonelle koblingene —\nsærlig avviklingen av CFS/ME-kompetansetjenesten og etableringen av en\nny utmattelseskompetansetjeneste — er vesentlig kontekst for å forstå\nhvorfor populasjonen er utvidet. Retningslinjen omtaler ikke denne\nkoblingen.</p>\n<p><strong>Fristoversikt fra oppdraget.</strong> Endelig retningslinje:\n1. september 2026. Implementeringsmateriell: 31. desember 2026.\nHøringsfristen 4. mai 2026 er en delprosess i dette løpet.</p>\n<p>Ytterligere observasjon om igangsettingen: revisjonsarbeidet ble ikke\nannonsert i eget skriftlig dokument fra Hdir ut over det som fremgår av\ntildelingsbrevet. Nyheten om at veilederen skulle revideres ble også\nformidlet muntlig under et seminar i regi av Fafo/SINTEF. Arbeidsgruppen\nble etablert i 1. kvartal 2024, med første møte i april 2024.</p>\n<p>Relevante delelementer av oppdragsforholdet som kunne vært adressert\ndirekte i retningslinjen men som ikke er det: - Eksplisitt referanse til\nTB2026-26 som oppdragsgrunnlag. - Sitering av oppdragets tre\ninstitusjonelle formål (fremtidig nasjonalt pasientforløp, ny bred\nutmattelseskompetansetjeneste, avvikling av CFS/ME-kompetansetjeneste).\n- Forklaring av tittelavviket mellom oppdraget (“av uklar årsak,\ninkludert CFS/ME”) og leveransen (“inkl. ME/CFS”). - Budsjett- og\nressursrammer for oppdraget.</p>\n<p>Ingen eksplisitt erklæring om metodologisk uavhengighet fra\ndepartementet er identifisert i retningslinjen. Skåren gjenspeiler at\nretningslinjens egen dokumentasjon av oppdragsforholdet er ufullstendig\n— det betyr ikke at den faglige uavhengigheten nødvendigvis er svekket.\nPoenget er at leseren av retningslinjen ikke kan vurdere oppdragets\ninnhold fra retningslinjen alene.</p>\n<p><em>Merknad:</em> Funnet av TB2026-26 som primærkilde styrker Item\n22-observasjonen metodisk (vi har nå oppdragstekst for sitat) men endrer\nikke skåren substansielt. AGREE II Item 22 spør om oppdragsgivers\nsynspunkter er rapportert å ikke ha påvirket innholdet; at oppdraget\neksisterer, er ikke diskutert i retningslinjen, og at en substansiell\nscope-endring (fjerning av “av uklar årsak”) er foretatt uten\nforklaring, er alle observasjoner som holder skåren på moderat nivå.</p>\n<h4\nid=\"item-23-competing-interests-of-gdg-members-recorded-and-addressed\">Item\n23 — Competing interests of GDG members recorded and addressed</h4>\n<p><em>NG206: skår 6.</em> NICE Register of Interests er publisert\n(datert 29.10.2021, 1,12 MB). NICE har formalisert policy for håndtering\nav interessekonflikter (PMG20). Individuelle interesser per komitemedlem\ner offentlig tilgjengelige i registeret.</p>\n<p><em>Hdir: skår 3.</em> Kap. 1 i retningslinjen gir verbal\nbeskrivelse: “Arbeidsgruppemedlemmer har fylt ut Helsedirektoratets\nhabilitetsskjema. Intellektuelle eller finansielle interesser som\npotensielt kan påvirke arbeidet er lagt frem for de andre deltakerne i\narbeidsgruppen. Ingen interesser med konsekvenser for deltakelse i\narbeidet er identifisert. Medlemmer i arbeidsgruppa var ikke tilstede\nved diskusjoner om artikler der de selv er medforfattere.” Tilleggsnote:\n“Det er sjelden deltakere ekskluderes fra Helsedirektoratets\nretningslinjeutvikling på grunn av inhabilitet.” Prosessen er beskrevet,\nmen individuelle habilitetsskjemaer for de 21 medlemmene er ikke\noffentlig publisert — dette er innsynsavhengig materiale. Forskjellen\nmot NICE Register of Interests er substansiell: NICE gir full\ntransparens per medlem, Hdir gir en samlet verbal erklæring. For Item 23\ner dette en strukturell dokumentasjonsforskjell.</p>\n<h2 id=\"samlet-vurdering-overall-assessment\">4. Samlet vurdering\n(Overall Assessment)</h2>\n<h3 id=\"oa1-rate-the-overall-quality-of-this-guideline\">OA1 — Rate the\noverall quality of this guideline</h3>\n<p><strong>NG206: 6 (høy kvalitet)</strong></p>\n<p>Begrunnelse: Velintegrert metodologisk apparat (Evidence Reviews,\nPMG20, Register of Interests, Quality Standards), tydelig kobling mellom\nevidens og anbefalinger, eksplisitt risikodiskusjon, god kontekstuell\nforankring. Trekket fra 7 er at enkelte områder (ressursvurdering,\nmonitoring-kriterier) ikke er like formaliserte som\nhovedmetodologien.</p>\n<p><strong>Hdir: 4 (moderat kvalitet)</strong></p>\n<p>Begrunnelse: Substansielle kvaliteter på enkelte punkter — eksplisitt\nGRADE-anvendelse, transparent arbeidsgruppesammensetning, tydelig\nanbefalingsstruktur med etablert normeringshierarki, norsk rettslig\nkontekstualisering. Men substansielle svakheter på interessentprosessen\n(3 av 5 brukerrepresentanter har tatt formell dissens), Domain 5\nApplicability (mangler verktøy, monitoring, ressursestimater) og Domain\n6 Editorial Independence (begrenset offentlig dokumentasjon av\nindividuelle interesser og av revisjonsoppdragets innhold). At\ndokumentet er et høringsutkast under aktiv revisjon gjør noe av dette\nforståelig, men fraværet av applicability- og monitoring-elementer er\nsubstansielt.</p>\n<h3 id=\"oa2-would-recommend-this-guideline-for-use\">OA2 — Would\nrecommend this guideline for use</h3>\n<p><strong>NG206: Yes</strong></p>\n<p>Retningslinjen er metodologisk solid, internt konsistent og gir\noperasjonaliserbare anbefalinger. Den er bredt referert i internasjonal\nmetode- og klinisk litteratur.</p>\n<p><strong>Hdir: Yes, with modifications</strong></p>\n<p>Utkastet har substansielle kvaliteter og kan rimelig fungere som\nfagnorm etter modifikasjoner. Følgende modifikasjoner ville heve skåren\npå flere domener, basert på de kvalitative observasjonene i denne\nanalysen: - Eksplisitt håndtering av etterhåndsdissensene fra\nbrukerrepresentantene i retningslinjens kap. 1, parallelt med hvordan\nfagdissensene er håndtert, med synliggjøring av at arbeidsgruppen har\ntodelt uenighet (Item 5, Item 10, Item 11). - Offentliggjøring av\nindividuelle habilitetsskjemaer i tilsvarende format som NICE Register\nof Interests (Item 23). - Publisering av dokumentasjon om\nrevisjonsoppdraget (mandat, oppdragsgiver, tidsrammer, eventuelle\nfaglige føringer), eller eksplisitt erklæring i retningslinjen om\noppdragets innhold (Item 22). - Eksplisitt differensiering i hver\nanbefaling mellom hvilke diagnostiske undergrupper (for eksempel ME/CFS\nmed PEM, post-viral utmattelse, annen langvarig utmattelse) anbefalingen\nhviler på solid evidens for, og hvilke den er ekstrapolert til (knyttet\ntil populasjonsbredden, jf. seksjon 1.4). - Utvikling av\noppdateringsprosedyre for fremtidige revisjoner (Item 14). - Utvikling\nav implementeringsverktøy, monitoring-kriterier og ressursestimater\n(Domain 5).</p>\n<p>Dette er ikke endringer i det faglige innholdet, men dokumentasjons-\nog prosessuelle endringer som vil styrke retningslinjens transparens og\nanvendbarhet.</p>\n<h2 id=\"prosessrefleksjon-dissenshåndtering-og-interessentasymmetri\">5.\nProsessrefleksjon — dissenshåndtering og interessentasymmetri</h2>\n<p>Denne seksjonen går grundigere inn i det mest distinkte prosessuelle\ntrekket ved Hdir-utkastet: behandlingen av dissens fra\narbeidsgruppemedlemmer.</p>\n<h3 id=\"dissensmønsteret\">5.1 Dissensmønsteret</h3>\n<p><strong>Syv arbeidsgruppemedlemmer har tatt formell dissens.</strong>\nDette er et høyt antall for en 21-personers arbeidsgruppe — ca. en\ntredel (33 %).</p>\n<p><strong>De fire fagdissensene</strong> (levert før publisering av\nutkastet): 1. Tom Farmen Nerli — spesialist i fysikalsk medisin og\nrehabilitering, Sykehuset Vestfold 2. Linn Breen Herner —\npsykologspesialist, Oslo universitetssykehus 3. Ingjerd Helene Jøssang —\nfastlege, Norsk forening for allmennmedisin 4. Peter Prydz — fastlege,\nNorsk forening for allmennmedisin</p>\n<p>Disse er navngitt og lenket i retningslinjens kap. 1 som inline\nPDF-vedlegg. Fulltekst for alle fire er verifisert og arkivert 21. april\n2026. Se <em>Fagdissens-analyse v1.0</em> for substansiell\ngjennomgang.</p>\n<p><strong>De tre brukerrepresentantdissensene</strong> (levert etter\npublisering): 5. Trude Schei (ME-foreningen) — 26.02.2026 6. Tanja\nThorsen (ME-foreldrene) — 26.02.2026 7. Carina Mørch-Storstein (Norsk\nCovidforening) — 03.03.2026</p>\n<p>Alle tre har enstemmig støtte fra sine foreningers styrer. Brevene\nbruker eksplisitt terminologien “formell dissens”. De er <em>ikke</em>\nomtalt i retningslinjedokumentet, men er publisert av Helsedirektoratet\ni ZIP-filen <em>Dissenser i PDF</em> under “Innkomne høringsinnspill” på\nhøringssiden, bundlet i “Sendt inn fram til 2. mars”. I tillegg har\nforeningene selvpublisert dem på egne nettsider.</p>\n<h3 id=\"fordeling-på-gdg-kategorier\">5.2 Fordeling på\nGDG-kategorier</h3>\n<table>\n<colgroup>\n<col style=\"width: 25%\" />\n<col style=\"width: 25%\" />\n<col style=\"width: 25%\" />\n<col style=\"width: 25%\" />\n</colgroup>\n<thead>\n<tr class=\"header\">\n<th>Kategori</th>\n<th>I arbeidsgruppen</th>\n<th>Tatt dissens</th>\n<th>Andel</th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>Fastleger (allmennmedisin)</td>\n<td>2</td>\n<td>2 (Jøssang, Prydz)</td>\n<td>100 %</td>\n</tr>\n<tr class=\"even\">\n<td>Spesialist i fysikalsk medisin og rehabilitering</td>\n<td>2</td>\n<td>1 (Nerli)</td>\n<td>50 %</td>\n</tr>\n<tr class=\"odd\">\n<td>Psykologspesialister</td>\n<td>3</td>\n<td>1 (Herner)</td>\n<td>33 %</td>\n</tr>\n<tr class=\"even\">\n<td>Brukerrepresentanter (ME/post-viral-foreninger)</td>\n<td>3</td>\n<td>3 (Schei, Thorsen, Mørch-Storstein)</td>\n<td>100 %</td>\n</tr>\n<tr class=\"odd\">\n<td>Brukerrepresentanter (Recovery Norge)</td>\n<td>2</td>\n<td>0</td>\n<td>0 %</td>\n</tr>\n<tr class=\"even\">\n<td>Øvrige profesjonsgrupper</td>\n<td>9</td>\n<td>0</td>\n<td>0 %</td>\n</tr>\n</tbody>\n</table>\n<p><em>Observasjon:</em> Dissensene er konsentrert i to grupper — begge\nfastlegerepresentantene og alle tre brukerrepresentantene fra\nME/post-viral-foreningene. Dette er et empirisk observasjonspunkt som\nkan være relevant for interessentanalysen.</p>\n<h3 id=\"strukturell-forskjell-i-håndtering\">5.3 Strukturell forskjell i\nhåndtering</h3>\n<p><strong>Før publisering-dissens (4 fagpersoner):</strong>\nRetningslinjens publisering ble utsatt fra opprinnelig planlagt dato i\nslutten av januar til 4. februar 2026. Dissensene er integrert i\nretningslinjens dokumentasjon: navngitt i kap. 1, fulltekst tilgjengelig\nsom inline PDF-vedlegg direkte under seksjonen <em>Dissenser</em> i kap.\n1.</p>\n<p><strong>Etter publisering-dissens (3 brukerrepresentanter):</strong>\nDissensene er ikke omtalt i retningslinjedokumentet. Men de er publisert\nav Helsedirektoratet selv i ZIP-filen <em>Dissenser i PDF</em> under\n“Innkomne høringsinnspill” på høringssiden (bundlet i “Sendt inn fram\ntil 2. mars”). Pasientforeningene har i tillegg selvpublisert dissensene\npå egne nettsider (me-foreningen.no, me-foreldrene.no, Norsk\nCovidforening via mediakanaler og felles pressemelding 13.03.2026).</p>\n<p>Asymmetrien i dokumentplassering er dermed en gradering av synlighet,\nikke et synlig/usynlig-skille: begge dissenskategorier er publisert av\nHdir, men i ulike dokumentlag med ulik formell status. Fagdissensene er\ndel av retningslinjedokumentet. Brukerdissensene er mottatte\nhøringsinnspill. Forskjellen er funksjon av tre sammenvirkende\nmekanismer:</p>\n<ol type=\"1\">\n<li><strong>Timing:</strong> Dissensene kom inn henholdsvis før og etter\npublisering av utkastet.</li>\n<li><strong>Taushetspliktsregime under utvikling:</strong> ME-foreldrene\nkunngjorde 5. mars 2026 at “Hdir stilte strenge krav til taushetsplikt\nfor de involverte, og styret hadde derfor kun sett noen løsrevne avsnitt\nfør høringsutkastet ble publisert.” Foreningenes styrer kunne ikke\nvurdere utkastet som helhet før publisering, og kunne dermed ikke\nautorisere representantene til å ta dissens på samme tidslinje som\nfagpersonene (som kunne ta dissens på egne vegne).</li>\n<li><strong>Substansielt format forutsetter publisert tekst:</strong>\nBrukerdissensene argumenterer mot spesifikke formuleringer, siterer fra\nutkastet, og foreslår alternativer. Denne formen forutsetter tilgang til\nden publiserte teksten. Fagdissensene, skrevet mens utkastet fremdeles\nvar under utvikling, kunne ikke ha denne formen.</li>\n</ol>\n<h3 id=\"hva-observasjonen-betyr-og-ikke-betyr\">5.4 Hva observasjonen\nbetyr — og ikke betyr</h3>\n<p>Observasjonen er empirisk robust, men følgende skal\n<strong>ikke</strong> leses inn:</p>\n<ul>\n<li><p>Ingen dokumentert bevisst differensiering fra Helsedirektoratets\nside. Forskjellen er funksjon av timing og taushetspliktsregime, ikke av\ndiskriminerende behandling.</p></li>\n<li><p>Det er ikke studiens oppgave å vurdere om dissensenes innhold er\nfaglig korrekt. AGREE II handler om prosess og rapportering.</p></li>\n</ul>\n<p>Det som <strong>er</strong> en legitim observasjon: - Den\nprosessuelle kombinasjonen (taushetspliktsregime + timing + formatkrav)\nproduserer en strukturell asymmetri i interessentrepresentasjon ved\npublisering. - Ved publisering er brukerperspektivene fra\nME/post-viral-foreningene de facto ikke synlige i retningslinjen, på\ntross av deres formelle dissens bare noen uker senere. - Dette er\nrelevant for AGREE II-vurderingen på Item 5 og Item 10.</p>\n<h3 id=\"dissensretning-motsatt-rettet-uenighet-i-to-blokker\">5.5\nDissensretning — motsatt rettet uenighet i to blokker</h3>\n<p>Med fulltekst-tilgang til alle syv dissenser er et nytt\nobservasjonspunkt tilgjengelig: de to dissensgruppene trekker\nhøringsutkastet i <strong>motsatt retning</strong>.</p>\n<p>Fagdissensene — etter samlet lesning av alle fire brev — mener\nutkastet er for pessimistisk og legger for mye vekt på unngåelsesatferd.\nKjernepåstanden er at rehabiliteringsperspektivet med sikte på bedring\nog tilfriskning er underrepresentert, og at aktivitetsrelaterte\nanbefalinger har noceboeffekt fordi de “tar bort håpet om bedring”. Alle\nfire brev samler seg om denne substansielle retningen, med små indre\nvariasjoner (Nerli og Herner eksplisitt nocebo-orientert, Jøssang og\nPrydz minimalistisk rehabiliteringsorientert).</p>\n<p>Brukerdissensene mener utkastet er for upresist og gir for lite\nrisikobevissthet, særlig rundt PEM. Schei forankrer kritikken i rettssak\nog brukerundersøkelser (juridisk-empirisk modus). Thorsen krever\nstrukturell todeling etter PEM-status og NICE-harmonering\n(strukturelt-prinsipiell modus). Mørch-Storstein argumenterer fra\nICD-11-klassifikasjon og firedelt fenotyping (akademisk-klassifikatorisk\nmodus).</p>\n<p>De to blokkene ser altså ulike feil i samme dokument, og begge ber om\nkorreksjon — i motsatt retning. Observasjonen er empirisk robust.</p>\n<p>For AGREE II-vurderingen er dette særlig relevant for:</p>\n<ul>\n<li><strong>Item 5 (Stakeholder Involvement):</strong> 7/21 dissensrate\ntolkes ikke som “alle er uenige i det samme”, men som uenighet i to\nmotsatt orienterte blokker. Tolkningen “brukere versus fag” holder ikke\n— dissenslinjen følger sykdomsforståelse, ikke\nrepresentasjonskategori.</li>\n<li><strong>Item 11 (Health benefits, side effects, risks\nconsidered):</strong> Dissensmønsteret er empirisk belegg for at\nutkastets balansering av nytte/risiko ikke er akseptert av minst en\ntredel av arbeidsgruppen, fordelt på begge sider av\nkontroversfeltet.</li>\n</ul>\n<h3 id=\"taksonomisk-observasjon-distinkt-ikke-porøst-skille\">5.6\nTaksonomisk observasjon: distinkt, ikke porøst skille</h3>\n<p>En tidligere antakelse i prosjektet var at skillet mellom bruker- og\nfagdissens kunne være porøst — begrunnet i at Mørch-Storsteins\nakademisk-klassifikatoriske form syntes å ligne fagdissens-formen. Med\nfagdissensene nå i primærtekst er denne hypotesen ikke\nopprettholdbar.</p>\n<p>Fagdissensene er <strong>korte posisjonserklæringer</strong> på\n85–190 ord hver, uten direkte sitater fra utkastet, uten\nkildereferanser, uten internasjonale sammenligninger, uten alternative\ntekstforslag. De har tre komponenter: (a) uttalelse om at dissens tas\nfra hele utkastet, (b) kort substansiell begrunnelse, (c) signatur. Det\ner en juridisk-forvaltningsmessig dissens-form.</p>\n<p>Brukerdissensene er <strong>substansielle argumentasjonsbrev</strong>\nmed full dokumentasjon: direkte sitater, vitenskapelige referanser\n(Choutka, Jason, NICE, Kuut, WHO, FHI m.fl.), empiriske kilder\n(brukerundersøkelser med 600–11 200 respondenter, Gulating-sak),\nalternative tekstforslag, eksplisitt PEM-diskusjon, ICD-forankring,\ninternasjonal sammenligning. Schei-brevet alene er lengre enn alle fire\nfagdissensbrev lagt sammen.</p>\n<p><strong>Presisering av hva som driver formatforskjellen.</strong>\nTiming forklarer brukerdissensenes substansielle form (det er umulig å\nsitere spesifikke passasjer i en tekst som ikke ennå er publisert). Men\ntiming forklarer ikke fagdissensenes minimalistiske form. Fagdissensene\nkunne prinsipielt vært mer substansielle innenfor sin timingsramme ved å\nvedlegge motinnspill til de interne versjoner. At de er så korte\nreflekterer et <em>genrevalg</em> — det minimalistiske\nforvaltningsdissens-formatet — innenfor timingsrammen. Formatforskjellen\ner dermed delvis timingsdrevet (brukersiden) og delvis genrevalgsdrevet\n(fagsiden).</p>\n<h3 id=\"ikke-dissens-mønsteret-komplementær-observasjon\">5.7\nIkke-dissens-mønsteret — komplementær observasjon</h3>\n<p>Av 21 arbeidsgruppemedlemmer tok 14 ikke dissens. Hvem de gjenværende\n14 er, er like relevant for interessentanalysen som hvem som\ndissenterte:</p>\n<table>\n<colgroup>\n<col style=\"width: 25%\" />\n<col style=\"width: 25%\" />\n<col style=\"width: 25%\" />\n<col style=\"width: 25%\" />\n</colgroup>\n<thead>\n<tr class=\"header\">\n<th>Kategori</th>\n<th>I arbeidsgruppen</th>\n<th>Ikke-dissens</th>\n<th>Merknad</th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>Brukerrepresentanter fra Recovery Norge</td>\n<td>2</td>\n<td>2 (Grøntjernet, Sagstad)</td>\n<td>Rehabiliteringsorientert perspektiv, konsistent med\nikke-dissens</td>\n</tr>\n<tr class=\"even\">\n<td>Barnemedisinere</td>\n<td>2</td>\n<td>2 (Helland, Sommerfelt)</td>\n<td>Helland leder Kompetansetjenesten for CFS/ME</td>\n</tr>\n<tr class=\"odd\">\n<td>Fysioterapeuter</td>\n<td>2</td>\n<td>2 (Nygaard, Skogdal)</td>\n<td></td>\n</tr>\n<tr class=\"even\">\n<td>Ergoterapeuter</td>\n<td>2</td>\n<td>2 (Klungland, Skogheim)</td>\n<td></td>\n</tr>\n<tr class=\"odd\">\n<td>Psykologspesialister</td>\n<td>3</td>\n<td>2 (Finset, Landmark)</td>\n<td>Herner dissenterte</td>\n</tr>\n<tr class=\"even\">\n<td>Fys.med./rehab.</td>\n<td>2</td>\n<td>1 (Wilhelmsen)</td>\n<td>Nerli dissenterte</td>\n</tr>\n<tr class=\"odd\">\n<td>Helsesykepleier</td>\n<td>1</td>\n<td>1 (Owesen Espe)</td>\n<td></td>\n</tr>\n<tr class=\"even\">\n<td>Spesialist infeksjonsmedisin</td>\n<td>1</td>\n<td>1 (Langeland)</td>\n<td>Fagfeltet møter long covid klinisk</td>\n</tr>\n<tr class=\"odd\">\n<td>NAV-rådgivende overlege</td>\n<td>1</td>\n<td>1 (Walseth Hara)</td>\n<td></td>\n</tr>\n</tbody>\n</table>\n<p>Analytisk observasjon: Dissenslinjen følger ikke et “bruker versus\nfag”-skille, men et skille i sykdomsforståelse — PEM-sentrert\nME/CFS-forståelse versus bredere rehabiliteringsorientert\nutmattelsesforståelse. At de to Recovery Norge-representantene ikke\ndissenterer, bekrefter at brukerrepresentasjonen i arbeidsgruppen selv\ner internt delt på samme akse som det større kontroversfeltet. At\nHelland (leder av kompetansetjenesten) ikke dissenterer veier for\nprosessens legitimitet på det pediatriske feltet. At Langeland\n(infeksjonsmedisin) ikke dissenterer, er et observasjonspunkt for\ninteressentbalansen på long covid-dimensjonen.</p>\n<p>Detaljert gjennomgang i <em>Fagdissens-analyse v1.0</em>, seksjon\n6.</p>\n<h2 id=\"implikasjoner-for-høringsinnspill\">6. Implikasjoner for\nhøringsinnspill</h2>\n<p>Denne seksjonen lister konkrete observasjoner som er forankret i\nprimærkildene og som kan være nyttige for et høringsinnspill.\nObservasjonene er analytiske, ikke normative — høringsinstansen avgjør\nom og hvordan de brukes.</p>\n<h3 id=\"observasjoner-på-dokumentasjons--og-prosessnivå\">6.1\nObservasjoner på dokumentasjons- og prosessnivå</h3>\n<p><strong>Om interessentprosessen (Item 5, Domain 2):</strong> -\nRetningslinjen omtaler i kap. 1 fire fagdissenser (Nerli, Herner,\nJøssang, Prydz) som inline PDF-vedlegg. De tre brukerdissensene (Schei\n26.02., Thorsen 26.02., Mørch-Storstein 03.03.2026) er ikke omtalt i\nretningslinjedokumentet, men er publisert av Hdir i ZIP-filen for\ninnkomne høringsinnspill. - Dette informasjonsgapet i retningslinjen\nselv kan lukkes ved oppdatering av kap. 1 før endelig publisering, slik\nat brukere av retningslinjen har fullstendig informasjon om\narbeidsgruppens dissens-status og om begge dissensretninger (jf. seksjon\n5.5).</p>\n<p><strong>Om dissenshåndtering (Item 10, Domain 3):</strong> -\nProsedyren for hvordan dissens håndteres i endelig retningslinje er ikke\neksplisitt beskrevet. - Spesifikt mangler prosedyre for hvordan dissens\nsom kommer inn <em>etter</em> publisering av utkast (som faktisk\ninntraff) håndteres i endelig retningslinje.</p>\n<p><strong>Om habilitetsdokumentasjon (Item 23, Domain 6):</strong> -\nHdir gir en samlet verbal erklæring om habilitet i kap. 1, men\npubliserer ikke individuelle habilitetsskjemaer. - Til sammenligning har\nNICE publisert et detaljert Register of Interests (1,12 MB, 29.10.2021)\nmed individuelle opplysninger. - Offentliggjøring av tilsvarende\nregister ville styrke transparens for norsk retningslinjeprosess.</p>\n<p><strong>Om finansieringsuavhengighet (Item 22, Domain 6):</strong> -\nOppdraget fra HOD er dokumentert i <em>Tildelingsbrev 2026</em>, oppdrag\n<strong>TB2026-26</strong> (avd. SHA, side 30), men er ikke referert\neller sitert i retningslinjen. Leseren av retningslinjen må slå opp\ntildelingsbrevet separat for å finne oppdragets innhold. -\n<strong>Substansielt tittelavvik:</strong> tildelingsbrevet oppdrar\n<em>“langvarig utmattelse av uklar årsak, inkludert CFS/ME”</em>;\nhøringsutkastet har tittelen <em>“langvarig utmattelse, inkl.\nME/CFS”</em>. Kvalifikasjonen “av uklar årsak” er fjernet uten\nforklaring. Dette er en substansiell scope-endring som har konsekvenser\nfor hvilke tilstander retningslinjen omfatter. - <strong>Institusjonell\nkontekst i oppdraget</strong> som ikke er omtalt i retningslinjen:\nTB2026-26 begrunner oppdraget eksplisitt med (i) fremtidig nasjonalt\npasientforløp, (ii) ny nasjonal kompetansetjeneste for\nutmattelsestilstander, (iii) pågående avvikling av den nasjonale\nkompetansetjenesten for CFS/ME. Denne strukturelle endringen er\nvesentlig kontekst for populasjonsutvidelsen. - Saksnummer 24/13487, som\nHelsedirektoratet har oppgitt for høringssaken, er Hdirs interne\nhøringssaksnummer — oppdragsreferansen fra HOD er TB2026-26. -\nEksplisitt referanse til TB2026-26 i retningslinjens kap. 1, sitering av\noppdragets formål og forklaring av tittelavviket, ville være forholdsvis\nsmå endringer med substansielt økt transparens.</p>\n<p><strong>Om annonsering av revisjonsarbeidet:</strong> -\nRevisjonsarbeidet ble igangsatt i 1. kvartal 2024 uten formell skriftlig\nkunngjøring. Nyheten om at veilederen skulle revideres ble formidlet fra\nsalen under et seminar i regi av Fafo/SINTEF. For transparens i\nfremtidige retningslinjeprosesser kan det være nyttig med skriftlig\nkunngjøring når arbeid med nasjonale retningslinjer settes i gang,\ntilsvarende den australske praksisen (hvor revisjonsarbeid annonseres\nvia pressemelding fra helseministeren og egen nettside med informasjon\nom mandat, komitesammensetning, fremdriftsplan og mulighet for\noffentlige innspill).</p>\n<h3 id=\"observasjoner-på-anvendbarhets-nivå-domain-5\">6.2 Observasjoner\npå anvendbarhets-nivå (Domain 5)</h3>\n<p><strong>Om implementeringsverktøy (Item 19):</strong> - Sammenlignet\nmed NICE-modellen mangler Hdir-utkastet integrerte\nimplementeringsverktøy. Høringsbrevet ber eksplisitt om innspill om\negnede tiltak — dette er en åpning for konkrete forslag.</p>\n<p><strong>Om monitoring/audit (Item 21):</strong> -\nKvalitetsindikatorer og auditkriterier er ikke identifisert i utkastet.\nNICE har etablert praksis for å publisere Quality Standards separat men\nkoblet til retningslinjen.</p>\n<p><strong>Om ressursvurdering (Item 20):</strong> - Formelle\nressursestimater eller systematisk kvalitativ diskusjon av\nressursimplikasjoner er lite synlig i det tilgjengelige materialet.</p>\n<h3 id=\"observasjoner-på-evidensdokumentasjonsnivå-domain-3\">6.3\nObservasjoner på evidensdokumentasjonsnivå (Domain 3)</h3>\n<p><strong>Om kobling mellom anbefaling og evidens (Item 12):</strong> -\nNoen anbefalinger (f.eks. 2.5 om aktivitetsregulering) er overordnede og\ndekker flere evidenskategorier. Direkte kobling mellom spesifikke deler\nav anbefalingen og spesifikke studier kunne vært klarere.</p>\n<p><strong>Om oppdateringsprosedyre (Item 14):</strong> - Prosedyre for\nfremtidige oppdateringer av endelig retningslinje (tidshorisont,\nkriterier, ansvarlig) er ikke identifisert. Dette er informasjon som\nbrukere av retningslinjen trenger for å vurdere når utkastet kan antas\nutdatert.</p>\n<h3 id=\"observasjoner-på-populasjonsdifferensiering\">6.4 Observasjoner\npå populasjonsdifferensiering</h3>\n<p><strong>Om hvordan undergrupper omfattes av anbefalinger:</strong> -\nPopulasjonsbredden (“langvarig utmattelse, inkl. ME/CFS”) dekker flere\ntilstander med ulike evidensgrunnlag. Utkastet erkjenner selv at\nevidensen er svak for PEM-populasjonen:\n<em>“<strong>Forskningsgrunnlaget for effekten hos pasienter med PEM\ndefinert etter Canadakriteriene eller WHO, er svakt. Det er få\nidentifiserte studier.</strong>”</em> Likevel er ikke differensieringen\nmellom undergrupper konsekvent gjennomført i hver anbefaling. - Konkret:\ndet bør være eksplisitt i hver anbefaling hvilke undergrupper\nanbefalingen hviler på solid evidens for, og hvilke den er ekstrapolert\ntil. For pasienter med ME/CFS og obligatorisk PEM kan retningslinjer\nbasert på evidens fra bredere utmattelsespopulasjoner ha potensielt\nrelevans, men dette forutsetter eksplisitt markering. - Dette er ikke et\nargument mot populasjonsbredden som sådan — det er et argument for at\nbredden må ledsages av tydelig differensiering i\nanbefalingsstrukturen.</p>\n<p><strong>Om diagnostiske undergrupper:</strong> - Utkastet bruker\nCanadakriteriene for ME/CFS hos voksne. Men anbefalinger rettes mot\n“pasienter med langvarig utmattelse, inkl. ME/CFS” samlet. For\nklinikeren som skal vurdere hvilken anbefaling som gjelder for hvilken\npasient, ville eksplisitt kobling mellom hver anbefaling og den/de\ndiagnostiske undergruppen den gjelder for, være nyttig.</p>\n<h3 id=\"observasjoner-som-støtter-utkastets-kvaliteter\">6.5\nObservasjoner som støtter utkastets kvaliteter</h3>\n<p>For balansens skyld skal det bemerkes at Hdir-utkastet har flere\nsubstansielle styrker identifisert i denne analysen: - Eksplisitt og\ndetaljert GRADE-anvendelse med rapporterte effektestimater,\nkonfidensintervaller og tillit-nivåer (Item 9 — samme skår som NG206). -\nTransparent liste over arbeidsgruppens sammensetning med\nprofesjonskategorier (Item 4 — høyere skår enn NG206). - Tydelig\nstyrkemarkering (skal/bør/kan) med eksplisitt definisjon i kap. 1 (Item\n15). - Inkludering av brukererfaring som formelt kunnskapsgrunnlag\nparallelt med forskningsevidens (prinsipp). - Transparent rapportering\nav evidensens begrensninger, særlig for PEM-populasjonen. -\nHøringsprosessen er strukturert og dokumentert (tre innsendingsperioder,\ntilgjengelige innspill-filer).</p>\n<h2 id=\"begrensninger-ved-denne-analysen\">7. Begrensninger ved denne\nanalysen</h2>\n<p><strong>Enkeltanalytiker.</strong> AGREE II-standarden for\npublikasjon bruker typisk to til fire vurderere med rapportert\ninterrater-reliabilitet. Denne analysen er gjennomført som én\nstrukturert lesning. Skårene er veiledende, ikke\nkonsensus-validerte.</p>\n<p><strong>Innsynsavhengige eller ikke offentlig publiserte\nmaterialer.</strong> Følgende dokumenter er ikke konsultert og påvirker\nflere items: - Individuelle habilitetsskjemaer for 21\narbeidsgruppemedlemmer (Hdir) — påvirker Item 23. - NICE Register of\nInterests fulltekst — påvirker Item 23 for NG206. - NICE Evidence\nReviews A–H som separate dokumenter — påvirker Items 7, 8, 9, 12 for\nNG206 (delvis kompensert ved at hovedretningslinjen refererer til dem\nsystematisk).</p>\n<p><strong>Offentlig tilgjengelig, men ikke referert i\nretningslinjen:</strong> - Tildelingsbrev 2026 fra HOD, oppdrag\nTB2026-26 (avd. SHA) — dette er nå tilgjengelig som primærkilde og\nsitert i Item 22 og seksjon 6.1.</p>\n<p><strong>Utkaststatus for Hdir.</strong> Retningslinjen kan endres\nvesentlig før endelig publisering. Skårer bør reevalueres når endelig\nversjon foreligger. Dette gjelder særlig Items 13 og 14.</p>\n<p><strong>Populasjonsforskjell.</strong> NG206 dekker ME/CFS; Hdir\ndekker “langvarig utmattelse inkl. ME/CFS”. Dette er en strukturell\nforskjell med direkte konsekvenser for hvordan enkelte items kan\nvurderes — se seksjon 1.4 for grundig behandling. I korte trekk kan\nskåreforskjeller mellom de to retningslinjene ha minst to forklaringer:\nenten reell forskjell i retningslinjekvalitet, eller forskjell som\nskyldes at en bredere populasjon er vanskeligere å dokumentere like\nsystematisk. For enkelte items kan begge være sanne samtidig. Dette\ngjelder særlig Item 3, Item 12, og til dels Item 9.</p>\n<p><strong>Utvidet primærkildebasis for Hdir.</strong>\nBrukerforeningenes dissenspublikasjoner er behandlet som primærkilder\nfor prosessobservasjoner. Dette er en metodologisk utvidelse utover\nstrengt AGREE II. Begrunnelsen er at brukerrepresentantene er\narbeidsgruppemedlemmer (ikke eksterne kommentatorer). Valget gjør\nanalysen asymmetrisk overfor NG206 (der tilsvarende publikasjoner ikke\nfinnes). En streng prosedyre-orientert tolkning uten denne utvidelsen\nville trolig gitt Item 5 for Hdir en skår på 5–6 snarere enn 3.</p>\n<p><strong>Språklig og kulturell kontekst.</strong> Begge retningslinjer\nopererer i beslektede, men ikke identiske helsesystemer (NHS vs. norsk\noffentlig helsetjeneste). Enkelte items — særlig i Domain 5 — er\nkontekstsensitive. Forskjeller kan delvis skyldes systemforskjeller\nheller enn retningslinjekvalitet.</p>\n<h2 id=\"primærkilder\">8. Primærkilder</h2>\n<p><strong>Retningslinjedokumenter:</strong> - NICE (2021). <em>Myalgic\nencephalomyelitis (or encephalopathy)/chronic fatigue syndrome:\ndiagnosis and management</em> (NG206). Published 29 October 2021. 96\npages. ISBN 978-1-4731-4221-3. - Helsedirektoratet (2026). <em>Nasjonal\nfaglig retningslinje for langvarig utmattelse, inkl. ME/CFS —\nhøringsutkast.</em> Publisert 4. februar 2026. Høringsfrist 4. mai 2026.\nKanonisk vurderingsversjon arkivert 18. april 2026. Saksnummer høring:\n24/13487.</p>\n<p><strong>Oppdragsdokumentasjon:</strong> - Helse- og\nomsorgsdepartementet (2026). <em>Tildelingsbrev 2026 —\nHelsedirektoratet.</em> Oppdrag <strong>TB2026-26</strong>, avd.\nSpesialisthelsetjenesteavdelingen (SHA), side 30. Frist endelig\nretningslinje: 1.9.2026. Frist implementeringsmateriell: 31.12.2026.</p>\n<p><strong>Dissensdokumentasjon:</strong> - Fire fagdissenser som inline\nPDF-vedlegg i retningslinjens kap. 1 (Nerli 26.01.26 Larvik; Herner\n27.01.26 Oslo; Jøssang 26.01.26 Stavanger; Prydz 27.01.26 Hammerfest).\nAlle fulltekst hentet og arkivert 21. april 2026. - Schei, T.\n(26.02.2026). “ME-foreningens brukerrepresentant tar dissens på\nhøringsutkast.” me-foreningen.no. Også publisert av Hdir i <em>Dissenser\ni PDF</em>-ZIP-filen på høringssiden. - ME-foreldrene (26.02.2026).\n“ME-foreldrenes representant tar dissens.” me-foreldrene.no. Også\npublisert av Hdir i samme ZIP-fil. - Norsk Covidforening (03.03.2026).\n“Dissens til Helsedirektoratets høringsutkast: Utmattelse – langvarig\nutmattelse, inkl. ME/CFS.” Også publisert av Hdir i samme ZIP-fil. -\nFelles pressemelding fra Norsk Covidforening, ME-foreningen og\nME-foreldrene (13.03.2026), publisert på me-foreldrene.no.</p>\n<p><strong>Metoderamme:</strong> - AGREE Research Trust (2017).\n<em>Appraisal of Guidelines for Research and Evaluation II — User’s\nManual.</em> agreetrust.org.</p>\n<p><strong>Relaterte leveranser:</strong> - <em>Fagdissens-analyse v1.0\n— parallell kvalitativ behandling av de fire fagdissensene</em> (21.\napril 2026). Separat dokument som behandler fagdissensene på samme\nmetodiske nivå som brukerdissens-analysen i denne hovedanalysens seksjon\n5. - <em>Evolusjonsnotat v2.2 — parallell norsk-britisk analyse\n2006–2026</em> (19. april 2026). Diakron kvalitativ analyse som gir\nhistorisk kontekst for denne synkrone AGREE II-evalueringen.</p>\n<p><em>AGREE II-basert komparativ analyse v3.3 — 21. april 2026. Ren\nsynkron evaluering av NICE NG206 og Helsedirektoratets høringsutkast\n2026. Utarbeidet som underlag for høringsinnspill til Helsedirektoratets\nhøring om Nasjonal faglig retningslinje for langvarig utmattelse, inkl.\nME/CFS (høringsfrist 4. mai 2026).</em></p>\n";
