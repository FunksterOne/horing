 href=\"#e.4-norsk-mellomfase-2014-veilederen\" class=\"toc-link\">E.4 Norsk mellomfase — 2014-veilederen</a></li>\n<li class=\"toc-item toc-item-h2\"><a href=\"#e.5-landenes-nåværende-generasjon-20212026\" class=\"toc-link\">E.5 Landenes nåværende generasjon — 2021/2026</a></li>\n<li class=\"toc-item toc-item-h2\"><a href=\"#e.6-tematisk-parallellanalyse\" class=\"toc-link\">E.6 Tematisk parallellanalyse</a></li>\n<li class=\"toc-item toc-item-h2\"><a href=\"#e.7-samlede-observasjoner-om-parallell-utvikling\" class=\"toc-link\">E.7 Samlede observasjoner om parallell utvikling</a></li>\n<li class=\"toc-item toc-item-h2\"><a href=\"#e.8-begrensninger\" class=\"toc-link\">E.8 Begrensninger</a></li>\n<li class=\"toc-item toc-item-h2\"><a href=\"#e.9-forholdet-til-den-komparative-agree-ii-analysen\" class=\"toc-link\">E.9 Forholdet til den komparative AGREE II-analysen</a></li>\n</ul>\n<li class=\"toc-item toc-item-h1\"><a href=\"#vedlegg-f-primærkildeoversikt\" class=\"toc-link\">VEDLEGG F — Primærkildeoversikt</a></li>\n<ul class=\"toc-list toc-level-2\">\n<li class=\"toc-item toc-item-h2\"><a href=\"#f.1-retningslinjer-vurdert\" class=\"toc-link\">F.1 Retningslinjer vurdert</a></li>\n<li class=\"toc-item toc-item-h2\"><a href=\"#f.2-oppdragsdokumentasjon\" class=\"toc-link\">F.2 Oppdragsdokumentasjon</a></li>\n<li class=\"toc-item toc-item-h2\"><a href=\"#f.3-dissensdokumentasjon\" class=\"toc-link\">F.3 Dissensdokumentasjon</a></li>\n<li class=\"toc-item toc-item-h2\"><a href=\"#f.4-metoderamme\" class=\"toc-link\">F.4 Metoderamme</a></li>\n<li class=\"toc-item toc-item-h2\"><a href=\"#f.5-historisk-tilleggsdokumentasjon\" class=\"toc-link\">F.5 Historisk tilleggsdokumentasjon</a></li>\n</ul>\n</ul>\n</nav><p>─────────────────────────────────────────────────</p>\n<h1 id=\"leseveiledning\">Leseveiledning</h1>\n<p>Dette innspillet er bygget opp i to deler.</p>\n<p><strong>Hoveddelen</strong> (seksjon 1–4) presenterer den metodiske\nrammen og de syv konkrete innspillspunktene som følger av evalueringen.\nHoveddelen kan leses frittstående.</p>\n<p><strong>Vedleggene</strong> (A–F) inneholder analysegrunnlaget og\nprimærkildedokumentasjonen som innspillet hviler på: oppdragsteksten fra\nHelse- og omsorgsdepartementet, fulltekst av de fire fagdissensene fra\narbeidsgruppen, utvidet sammendrag av de tre brukerdissensene, og en\nsamlet primærkildeoversikt.</p>\n<p>En leser som vil orientere seg raskt, bør starte i sammendraget\n(nedenfor) og deretter lese det eller de innspillspunktene som er\nrelevante for egen saksbehandling. En leser som vil etterprøve\ngrunnlaget for et bestemt innspillspunkt, finner i vedleggene de\nprimærkildene punktet bygger på.</p>\n<p>To tilleggsressurser følger som selvstendige vedlegg til\nHelsedirektoratet: et AGREE II-skåringsark i Excel-format som viser skår\nper item med kommentarer, og en interaktiv AGREE II-oversikt (HTML)\npublisert på <a\nhref=\"https://horing.vercel.app\"><u>https://horing.vercel.app</u></a>\nsom visualiserer skårene og den historiske parallelliteten mellom norsk\nog britisk retningslinjeutvikling. HTML-oversikten er interaktiv og lar\nleseren utforske domener, items og dissenshåndtering dynamisk. Disse to\ner ment som oppslagsverktøy, ikke som primære lesedokumenter.</p>\n<p>─────────────────────────────────────────────────</p>\n<h1 id=\"sammendrag\">Sammendrag</h1>\n<h2 id=\"kort-om-innspillet\">Kort om innspillet</h2>\n<p>Helsedirektoratet har lagt ut <em>Nasjonal faglig retningslinje for\nlangvarig utmattelse, inkl. ME/CFS</em> på høring med frist 4. mai 2026.\nDette innspillet er en systematisk kvalitetsvurdering av høringsutkastet\netter AGREE II — det internasjonale rammeverket for evaluering av\nfaglige retningslinjer. NICE NG206 (2021), den britiske retningslinjen\npå samme fagfelt, brukes som referansepunkt for evalueringen.</p>\n<p>Innspillet er avgrenset til <strong>prosessuelle, metodiske og\ndokumentasjonsmessige forhold</strong>. Det inneholder ikke\nfagvurderinger av de enkelte anbefalingers kliniske substans. Grunnlaget\ner åpne primærkilder — høringsutkastet selv, det britiske\nsammenligningsdokumentet, dissensdokumentasjon, og Helse- og\nomsorgsdepartementets oppdrag til Helsedirektoratet for 2026.</p>\n<h2 id=\"agree-ii-hovedresultater\">AGREE II — hovedresultater</h2>\n<p>AGREE II består av 23 vurderingskriterier fordelt på seks domener.\nSkalaen går fra 1 (lavest) til 7 (høyest) per item, og aggregeres til\ndomeneskår som prosent av maksimum. Figuren under viser domeneskårene\nfor de to retningslinjene.</p>\n<table>\n<colgroup>\n<col style=\"width: 44%\" />\n<col style=\"width: 18%\" />\n<col style=\"width: 18%\" />\n<col style=\"width: 18%\" />\n</colgroup>\n<thead>\n<tr class=\"header\">\n<th><strong>Domene</strong></th>\n<th><strong>NICE NG206</strong></th>\n<th><strong>Hdir-utkast</strong></th>\n<th><strong>Differanse</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>Domain 1 — Scope and Purpose</td>\n<td>88,9 %</td>\n<td>66,7 %</td>\n<td>−22,2 pp</td>\n</tr>\n<tr class=\"even\">\n<td>Domain 2 — Stakeholder Involvement</td>\n<td>83,3 %</td>\n<td>66,7 %</td>\n<td>−16,7 pp</td>\n</tr>\n<tr class=\"odd\">\n<td>Domain 3 — Rigour of Development</td>\n<td>81,3 %</td>\n<td>58,3 %</td>\n<td>−23,0 pp</td>\n</tr>\n<tr class=\"even\">\n<td>Domain 4 — Clarity of Presentation</td>\n<td>77,8 %</td>\n<td>72,2 %</td>\n<td>−5,6 pp</td>\n</tr>\n<tr class=\"odd\">\n<td>Domain 5 — Applicability</td>\n<td>70,8 %</td>\n<td>37,5 %</td>\n<td>−33,3 pp</td>\n</tr>\n<tr class=\"even\">\n<td>Domain 6 — Editorial Independence</td>\n<td>75,0 %</td>\n<td>33,3 %</td>\n<td>−41,7 pp</td>\n</tr>\n</tbody>\n</table>\n<p>Tallene viser en retningslinje som har substansielle kvaliteter i\nfremstilling (Domain 4) og interessentinvolvering (Domain 2), men som\nhar betydelige svakheter i tre domener: rigorøsitet i utvikling (Domain\n3), anvendbarhet (Domain 5) og redaksjonell uavhengighet (Domain 6).\nForskjellene mot NICE NG206 er substansielle i disse tre domenene, fra\n23 til 42 prosentpoeng.</p>\n<h2 id=\"syv-innspillspunkter\">Syv innspillspunkter</h2>\n<p>Følgende syv forhold bør styrkes før endelig publisering. Hvert punkt\ner forankret i en spesifikk AGREE II-observasjon.</p>\n<ol type=\"1\">\n<li><p><strong>Dissenssituasjonen i arbeidsgruppen fremstår ubalansert\ndokumentert.</strong> Fire fagdissenser er integrert som vedlegg i\nretningslinjens kap. 1. Tre brukerdissenser er publisert av\nHelsedirektoratet i en ZIP-fil under innkomne høringsinnspill, men er\nikke omtalt i retningslinjedokumentet. Brukerdissensene trekker utkastet\ni motsatt retning av fagdissensene. Arbeidsgruppen har altså en\n<strong>todelt uenighet</strong> som ikke fremkommer av\nretningslinjeteksten. <em>(Forankring: Item 5, 10, 11)</em></p></li>\n</ol>\n<ol type=\"1\">\n<li><p><strong>Individuelle habilitetsskjemaer for de 21\narbeidsgruppemedlemmene er ikke offentlig publisert.</strong> NICE\npubliserer et Register of Interests med 227 sider individuelle\ndeklarasjoner. Tilsvarende publisering fra Helsedirektoratet ville være\ni tråd med internasjonal praksis. <em>(Forankring: Item\n23)</em></p></li>\n</ol>\n<ol type=\"1\">\n<li><p><strong>Oppdraget fra Helse- og omsorgsdepartementet er ikke\nreferert i retningslinjen.</strong> Oppdragsteksten er offentlig\ntilgjengelig i departementets tildelingsbrev for 2026, men\nretningslinjen verken siterer den eller omtaler den institusjonelle\nkonteksten oppdraget er gitt i. Det er også et tittelavvik mellom\noppdraget («langvarig utmattelse <strong>av uklar årsak</strong>,\ninkludert CFS/ME») og leveransen («langvarig utmattelse, inkl. ME/CFS»).\n<em>(Forankring: Item 22; se Vedlegg A for primærkilden)</em></p></li>\n</ol>\n<ol type=\"1\">\n<li><p><strong>Populasjonsbredden skaper en differensieringsutfordring\nsom ikke er konsekvent løst.</strong> Utkastet dekker «langvarig\nutmattelse, inkl. ME/CFS» — en bredere populasjon enn NG206s avgrensning\ntil ME/CFS. Utkastet erkjenner selv at evidensen er svak for\nPEM-populasjonen, men differensieringen mellom undergrupper er ikke\nsystematisk gjennomført i hver anbefaling. <em>(Forankring: Item 3, Item\n8, Item 12)</em></p></li>\n</ol>\n<ol type=\"1\">\n<li><p><strong>Prosedyre for fremtidige revisjoner etter publisering er\nikke spesifisert.</strong> Kap. 1 omtaler oppdatert litteratursøk før\nendelig publisering, men ikke tidshorisont, ansvar eller utløsende\nkriterier for fremtidige revisjoner. <em>(Forankring: Item\n14)</em></p></li>\n</ol>\n<ol type=\"1\">\n<li><p><strong>Implementeringsverktøy, monitoring-kriterier og\nressursestimater er fraværende.</strong> Domain 5 (Applicability) skårer\n37,5 % — nest lavest etter Domain 6 (33,3 %). <em>(Forankring: Item 18,\n19, 20, 21 — hele Domain 5)</em></p></li>\n</ol>\n<ol type=\"1\">\n<li><p><strong>Strukturell differensiering av alvorlig syke er mindre\ntydelig fremhevet enn i NG206.</strong> NG206 har en dedikert seksjon\n1.17 for «severe and very severe ME/CFS» med tilpasset risikovurdering,\nhjemmebesøk som standard for helhetsvurdering, og eksplisitt markering\nav at hver anbefaling er vurdert separat for denne gruppen. Utkastet har\nomtale av alvorlig syke flere steder, men ikke en tilsvarende\nstrukturell samling eller severe/very severe-differensiering. Dette er\nogså et sentralt punkt i Thorsen-dissensen og i den felles\npressemeldingen fra brukerforeningene. <em>(Forankring: Item 3, Item\n16)</em></p></li>\n</ol>\n<h2 id=\"samlet-vurdering\">Samlet vurdering</h2>\n<p>Utkastet har substansielle kvaliteter og kan rimelig fungere som\nfagnorm etter modifikasjoner. Innspillspunktene ovenfor er\ndokumentasjons- og prosessrelaterte — ikke innvendinger mot det faglige\ninnholdet. Samtlige syv punkter kan adresseres før endelig publisering\nuten at anbefalingene selv endres.</p>\n<p>En sentral strukturell observasjon er at arbeidsgruppen har todelt\nuenighet: fagdissensene etterlyser sterkere rehabiliteringsoptimisme,\nbrukerdissensene etterlyser tydeligere PEM-differensiering og sterkere\nrisikoramme. Dette fremstår ikke i retningslinjedokumentet, og bør\nsynliggjøres før publisering.</p>\n<p>─────────────────────────────────────────────────</p>\n<h1 id=\"innspillets-ramme-og-avgrensning\">1. Innspillets ramme og\navgrensning</h1>\n<p>Dette innspillet adresserer Helsedirektoratets eksplisitte invitasjon\ntil innspill på retningslinjen som helhet — særlig høringsspørsmål 1\n(<em>Møter retningslinjen det som er beskrevet som formålet?</em>) og\nhøringsspørsmål 4 (<em>Generelle kommentarer til utkastet som\nhelhet</em>). Innspillet er avgrenset til <strong>prosessuelle,\nmetodiske og dokumentasjonsmessige forhold</strong>. Det inneholder ikke\nfagvurderinger av de enkelte anbefalingers kliniske substans.</p>\n<p>Grunnlaget er en strukturert AGREE II-evaluering (Appraisal of\nGuidelines for Research and Evaluation, 2. utgave) av høringsutkastet,\nsammenlignet med NICE NG206 (2021) som referanseramme for samme fagfelt.\nSammenligningen er ikke ment å hevde at NG206 er en uomtvistet\ngullstandard, men at en parallell evaluering viser hvor Hdir-utkastet\nligger nærmere og hvor det ligger lengre fra etablerte transparenskrav\nfor nasjonale retningslinjer.</p>\n<p>Analysen er gjennomført som én strukturert lesning. Substansielle\nforskjeller (≥10 prosentpoeng på domenenivå) er mer robuste indikasjoner\nenn marginale differanser. Alle observasjoner er forankret i\nprimærkilder som er tilgjengelige offentlig — jf. Vedlegg F.</p>\n<p>─────────────────────────────────────────────────</p>\n<h1 id=\"agree-ii-metoden-og-hovedresultater\">2. AGREE II-metoden og\nhovedresultater</h1>\n<h2 id=\"kort-om-agree-ii\">2.1 Kort om AGREE II</h2>\n<p>AGREE II er utviklet av det internasjonale AGREE-konsortiet og er\nstandard for kvalitetsvurdering av faglige retningslinjer globalt.\nInstrumentet består av 23 vurderingskriterier (items) fordelt på seks\ndomener:</p>\n<ul>\n<li><strong>Domain 1 — Scope and Purpose:</strong> Formål, målgruppe,\nklinisk spørsmål</li>\n<li><strong>Domain 2 — Stakeholder Involvement:</strong>\nArbeidsgruppesammensetning, brukerinvolvering, målgruppe for\nretningslinjen</li>\n<li><strong>Domain 3 — Rigour of Development:</strong> Systematisk\nlitteratursøk, evidenskriterier, begrunnelser for anbefalinger, ekstern\nfagfellevurdering, oppdateringsprosedyre</li>\n<li><strong>Domain 4 — Clarity of Presentation:</strong> Spesifikke\nanbefalinger, håndtering av ulike alternativer, identifiserbarhet av\nnøkkelanbefalinger</li>\n<li><strong>Domain 5 — Applicability:</strong> Fasilitatorer og\nbarrierer for bruk, implementeringsråd, ressursimplikasjoner,\nmonitoring-kriterier</li>\n<li><strong>Domain 6 — Editorial Independence:</strong> Oppdragsgivers\nuavhengighet, håndtering av interessekonflikter</li>\n</ul>\n<p>Hvert item skåres på en skala 1–7. Domeneskår beregnes som\nstandardisert prosent av maksimum etter AGREE II-manualens formel.\nSamlet vurdering er ingen enkel gjennomsnittsskår, men en kvalitativ\nhelhetsvurdering basert på domenenes profil.</p>\n<h2 id=\"domeneskårer-begge-retningslinjer\">2.2 Domeneskårer — begge\nretningslinjer</h2>\n<table>\n<colgroup>\n<col style=\"width: 44%\" />\n<col style=\"width: 18%\" />\n<col style=\"width: 18%\" />\n<col style=\"width: 18%\" />\n</colgroup>\n<thead>\n<tr class=\"header\">\n<th><strong>Domene</strong></th>\n<th><strong>NICE NG206</strong></th>\n<th><strong>Hdir-utkast</strong></th>\n<th><strong>Differanse</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>Domain 1 — Scope and Purpose</td>\n<td>88,9 %</td>\n<td>66,7 %</td>\n<td>−22,2 pp</td>\n</tr>\n<tr class=\"even\">\n<td>Domain 2 — Stakeholder Involvement</td>\n<td>83,3 %</td>\n<td>66,7 %</td>\n<td>−16,7 pp</td>\n</tr>\n<tr class=\"odd\">\n<td>Domain 3 — Rigour of Development</td>\n<td>81,3 %</td>\n<td>58,3 %</td>\n<td>−23,0 pp</td>\n</tr>\n<tr class=\"even\">\n<td>Domain 4 — Clarity of Presentation</td>\n<td>77,8 %</td>\n<td>72,2 %</td>\n<td>−5,6 pp</td>\n</tr>\n<tr class=\"odd\">\n<td>Domain 5 — Applicability</td>\n<td>70,8 %</td>\n<td>37,5 %</td>\n<td>−33,3 pp</td>\n</tr>\n<tr class=\"even\">\n<td>Domain 6 — Editorial Independence</td>\n<td>75,0 %</td>\n<td>33,3 %</td>\n<td>−41,7 pp</td>\n</tr>\n</tbody>\n</table>\n<p>Itemspesifikke skårer, kommentarer per item og begrunnelsesnoter\nfølger i AGREE II-skåringsarket som sendes som separat Excel-fil.</p>\n<h2 id=\"substansielle-observasjoner\">2.3 Substansielle\nobservasjoner</h2>\n<p>Syv observasjoner danner grunnlaget for innspillspunktene i seksjon\n3. Hver observasjon er dokumentert mot primærkilder og knyttet til\nspesifikke AGREE II-items.</p>\n<p><strong>Dissenssituasjonen skaper todelt uenighet som ikke er synlig\ni retningslinjen.</strong> Syv av 21 arbeidsgruppemedlemmer har tatt\nformell dissens — en tredjedel. Fire fagdissenser (Nerli, Herner,\nJøssang, Prydz) er integrert i retningslinjens kap. 1 som inline\nPDF-vedlegg. Tre brukerdissenser (Schei, Thorsen, Mørch-Storstein) er\npublisert av Helsedirektoratet i ZIP-filen for innkomne høringsinnspill,\nmen er ikke omtalt i selve retningslinjedokumentet. De to\ndissensgruppene trekker utkastet i motsatt retning: fagdissensene\netterlyser sterkere rehabiliteringsoptimisme og mindre vekt på\nunngåelsesatferd; brukerdissensene etterlyser tydeligere\nPEM-differensiering og sterkere risikoramme. De to brukerrepresentantene\nfra Recovery Norge dissenterer ikke — konsistent med organisasjonens\nrehabiliteringsorienterte perspektiv. Dissenslinjen følger altså ikke et\nbruker-mot-fag-skille, men en akse i sykdomsforståelse. <em>Fulltekst av\nalle fire fagdissenser i Vedlegg B; fulltekstsammendrag av de tre\nbrukerdissensene i Vedlegg C.</em></p>\n<p><strong>Oppdragsforholdet er underdokumentert i\nretningslinjen.</strong> Helsedirektoratet har utarbeidet retningslinjen\npå oppdrag fra Helse- og omsorgsdepartementet. Oppdraget er publisert i\ndepartementets tildelingsbrev for 2026, og begrunner retningslinjen\neksplisitt med tre institusjonelle formål: fremtidig nasjonalt\npasientforløp, etablering av en ny nasjonal kompetansetjeneste for\nutmattelsestilstander, og pågående avvikling av den nasjonale\nkompetansetjenesten for CFS/ME. Ingen av disse formålene er omtalt i\nretningslinjen. I tillegg er oppdragets tittel <em>«langvarig utmattelse\nav uklar årsak, inkludert CFS/ME»</em>, mens retningslinjens tittel er\n<em>«langvarig utmattelse, inkl. ME/CFS»</em> — kvalifikasjonen «av\nuklar årsak» er fjernet uten forklaring. <em>Primærkilden gjengitt\nordrett i Vedlegg A.</em></p>\n<p><strong>Populasjonsbredden er en strukturell forskjell fra\nNG206.</strong> Hdir-utkastet dekker «langvarig utmattelse, inkl.\nME/CFS» — en bredere populasjon enn NG206s avgrensning til ME/CFS. Dette\ner et legitimt valg, men det skaper metodiske forpliktelser om\ndifferensiering i anbefalingsstrukturen som utkastet ikke konsekvent\ninnfrir. Utkastet erkjenner selv: <em>«Forskningsgrunnlaget for effekten\nhos pasienter med PEM definert etter Canadakriteriene eller WHO, er\nsvakt. Det er få identifiserte studier.»</em> Likevel gis anbefalinger\nsom gjelder hele «langvarig utmattelse»-populasjonen uten at det i hver\nanbefaling er markert hvilke undergrupper anbefalingen hviler på solid\nevidens for, og hvilke den er ekstrapolert til.</p>\n<p><strong>Individuelle habilitetsskjemaer er ikke offentlig\npublisert.</strong> Retningslinjen opplyser at alle 21\narbeidsgruppemedlemmer har fylt ut Helsedirektoratets habilitetsskjema,\nog at ingen interesser med konsekvens for deltakelse er identifisert.\nSelve skjemaene er ikke offentliggjort. NICE har for NG206 publisert et\nRegister of Interests på 227 sider med individuelle deklarasjoner fra\narbeidsgruppens medlemmer. Forskjellen er substansiell og utgjør kjernen\nav skåreforskjellen på Domain 6.</p>\n<p><strong>Oppdateringsprosedyre for fremtidige revisjoner er ikke\nspesifisert.</strong> Kap. 1 i retningslinjen angir at oppdatert\nlitteratursøk gjennomføres før endelig publisering. Prosedyre for\nfremtidige oppdateringer av den endelige retningslinjen — tidshorisont,\nansvarlig enhet, utløsende kriterier for revisjon — er ikke identifisert\ni utkastet. NG206 er forankret i NICEs kontinuerlige overvåkingsprosess\nmed periodisk revurdering. Dette treffer Item 14 (Domain 3).\n<em>Primærkilde: Hdir-utkastet kap. 1.</em></p>\n<p><strong>Applicability-dokumentasjonen er begrenset i\nutkastet.</strong> Hdir skårer 33,3 prosentpoeng lavere enn NG206 på\nDomain 5. Implementeringsbarrierer (Item 18), implementeringsverktøy\n(Item 19), ressursestimater (Item 20) og monitoring-kriterier (Item 21)\ner lite identifiserbare i utkastet. NG206 støttes av NICEs Quality\nStandards-apparat og har systematiske «How the recommendations might\naffect practice»-seksjoner per anbefaling. Høringsbrevet ber eksplisitt\nom innspill på implementeringstiltak, hvilket signaliserer at\nHelsedirektoratet selv identifiserer området som under utvikling.\n<em>Primærkilder: Hdir-høringsbrev; NICE NG206 Tools and\nresources.</em></p>\n<p><strong>Strukturell differensiering av alvorlig syke er mindre\ntydelig fremhevet enn i NG206.</strong> NG206 har en dedikert seksjon\n1.17 for severe og very severe ME/CFS der hver anbefaling er vurdert\nseparat for undergruppen, med egen risikovurdering og hjemmebesøk som\nstandard. I Hdir-utkastet er håndteringen av alvorlig syke mindre\nstrukturert fremhevet i anbefalingsstrukturen. 2014-veilederen IS-1944\ninneholdt 10 konkrete praktiske tilpasninger (kap. 3.9) som ikke er\nvidereført i samme form. Dette treffer Item 3 (Domain 1) og Item 16\n(Domain 4). <em>Primærkilder: NG206 seksjon 1.17; IS-1944 kap. 3.9;\nHdir-utkastet.</em></p>\n<p>─────────────────────────────────────────────────</p>\n<h1 id=\"syv-konkrete-innspillspunkter\">3. Syv konkrete\ninnspillspunkter</h1>\n<p>Følgende syv forhold bør styrkes før endelig publisering. Hvert punkt\ner forankret i en spesifikk AGREE II-observasjon og angir både\nobservasjon, primærkildegrunnlag og konkret endringsforslag.</p>\n<h2\nid=\"synliggjøring-av-todelt-dissens-i-arbeidsgruppen-item-5-10-11\">3.1\nSynliggjøring av todelt dissens i arbeidsgruppen (Item 5, 10, 11)</h2>\n<p><strong>Primærkildegrunnlag:</strong> De fire fagdissensene i\nretningslinjens kap. 1. De tre brukerdissensene i Hdirs ZIP-fil\n<em>Dissenser i PDF</em>. Retningslinjens kap. 1 om arbeidsgruppen. Se\nVedlegg B og C for fulltekster og sammendrag.</p>\n<p><strong>Observasjoner:</strong></p>\n<ul>\n<li><p><strong>Fire fagdissenser</strong> (Nerli, Herner, Jøssang,\nPrydz) er levert 26.–27. januar 2026, før publisering, og er integrert\nsom inline PDF-vedlegg i retningslinjens kap. 1. Fagdissensene\nargumenterer konsistent for at utkastet legger for mye vekt på\nunngåelsesatferd og for lite på rehabiliteringsperspektivet med sikte på\nbedring.</p></li>\n</ul>\n<ul>\n<li><p><strong>Tre brukerdissenser</strong> (Schei 26.02.2026, Thorsen\n26.02.2026, Mørch-Storstein 03.03.2026) er levert etter publisering.\nAlle tre er publisert av Helsedirektoratet i <em>Dissenser i\nPDF</em>-ZIP-filen under innkomne høringsinnspill, og selvpublisert av\nforeningene. Brukerdissensene argumenterer konsistent for at utkastet\nmangler tydelig differensiering mellom ME/CFS og bredere\nutmattelsestilstander, ikke redegjør tilstrekkelig for PEM, og ikke\ninformerer om risiko for skade ved aktivitetsøkende behandling.</p></li>\n</ul>\n<ul>\n<li><p><strong>De to dissensgruppene trekker utkastet i motsatt\nretning.</strong> Dette fremgår ikke av retningslinjedokumentet, som\nbare omtaler fagdissensene. En leser av retningslinjen vil dermed ikke\noppfatte at arbeidsgruppen har todelt uenighet.</p></li>\n</ul>\n<ul>\n<li><p><strong>To brukerrepresentanter dissenterer ikke</strong> — begge\nfra Recovery Norge. Dette er konsistent med organisasjonens\nrehabiliteringsorienterte perspektiv, og viser at brukersiden i\narbeidsgruppen selv er internt delt langs samme akse som det større\nkontroversfeltet.</p></li>\n</ul>\n<ul>\n<li><p><strong>Format- og timingsasymmetrien er delvis\nstrukturell.</strong> Brukerdissensene forutsetter tilgang til en\npublisert tekst som de kan argumentere mot; fagdissensene ble skrevet\nmens utkastet ennå var under utvikling og kunne ikke ha denne formen.\nAsymmetrien i dokumentplassering — fagdissenser i retningslinjen,\nbrukerdissenser i innkomne høringsinnspill — er dermed delvis funksjon\nav timing og ikke kun redaksjonell prioritering. Men timing forklarer\nikke at retningslinjen omtaler fagdissensene og tier om at\nbrukerdissensene finnes.</p></li>\n</ul>\n<p><strong>Forslag til endring:</strong></p>\n<ul>\n<li>Retningslinjens kap. 1 oppdateres før endelig publisering slik at\nsamtlige syv dissenser er navngitt og omtalt.</li>\n</ul>\n<ul>\n<li>De tre brukerdissensene bør gis samme integrasjonsform i\nretningslinjeteksten som de fire fagdissensene — enten som inline\nPDF-vedlegg eller tilsvarende synlig plassering.</li>\n</ul>\n<ul>\n<li>Dissensenes todelte retning (rehabiliteringsoptimisme versus\nPEM-differensiering) bør synliggjøres eksplisitt, slik at leseren av\nretningslinjen forstår at arbeidsgruppen har todelt uenighet.</li>\n</ul>\n<h2 id=\"publisering-av-individuelle-habilitetsskjemaer-item-23\">3.2\nPublisering av individuelle habilitetsskjemaer (Item 23)</h2>\n<p><strong>Primærkildegrunnlag:</strong> Retningslinjens kap. 1\n(generell habilitetsformulering). NG206 Register of Interests (227\nsider, offentlig tilgjengelig, eksempel på internasjonal praksis).</p>\n<p><strong>Observasjoner:</strong></p>\n<ul>\n<li><p>Retningslinjen opplyser at alle 21 arbeidsgruppemedlemmer har\nfylt ut habilitetsskjema, og at «intellektuelle eller finansielle\ninteresser som potensielt kan påvirke arbeidet er lagt frem for de andre\ndeltakerne», og at «ingen interesser med konsekvenser for deltakelse i\narbeidet er identifisert».</p></li>\n</ul>\n<ul>\n<li><p>Selve habilitetsskjemaene er ikke offentlig publisert. Leseren av\nretningslinjen kan dermed ikke verifisere vurderingen.</p></li>\n</ul>\n<ul>\n<li><p>NICE publiserer komplett Register of Interests for NG206 med\nindividuelle deklarasjoner. Dette er den internasjonale standarden for\ntransparens om interessekonflikter i faglige retningslinjer.</p></li>\n</ul>\n<p><strong>Forslag til endring:</strong></p>\n<ul>\n<li>Individuelle habilitetsskjemaer for de 21 arbeidsgruppemedlemmene\npubliseres sammen med endelig retningslinje, i format tilsvarende NICE\nRegister of Interests.</li>\n</ul>\n<ul>\n<li>Alternativt bør retningslinjen gi eksplisitt henvisning til hvor\nslik dokumentasjon kan innhentes (f.eks. via offentlig innsyn), og\nhvilke interesser som er vurdert og eventuelt avhjulpet.</li>\n</ul>\n<h2 id=\"oppdragets-innhold-og-tittelavvik-item-22\">3.3 Oppdragets\ninnhold og tittelavvik (Item 22)</h2>\n<p><strong>Primærkildegrunnlag:</strong> Helse- og omsorgsdepartementets\ntildelingsbrev til Helsedirektoratet for 2026. Høringsutkastet kap. 1.\nFulltekst og sammenligning i Vedlegg A.</p>\n<p><strong>Observasjoner:</strong></p>\n<ul>\n<li><p><strong>Oppdraget er dokumentert, men ikke referert i\nretningslinjen.</strong> Departementet har gitt Helsedirektoratet i\noppdrag å utarbeide retningslinjen. Oppdraget er offentlig tilgjengelig\ni departementets tildelingsbrev for 2026. Retningslinjen verken siterer\ndet eller omtaler hvilke formål oppdraget er gitt i. En leser av\nretningslinjen må slå opp tildelingsbrevet separat for å få innsyn i\noppdragets innhold.</p></li>\n</ul>\n<ul>\n<li><p><strong>Tittelavvik mellom oppdrag og leveranse.</strong>\nOppdragsteksten omtaler <em>«Nasjonal faglig retningslinje for langvarig\nutmattelse <strong>av uklar årsak</strong>, inkludert CFS/ME»</em>.\nHøringsutkastet har tittelen <em>«Nasjonal faglig retningslinje for\nlangvarig utmattelse, inkl. ME/CFS»</em> — uten kvalifikasjonen «av\nuklar årsak». Denne redaksjonelle endringen er foretatt under\nutarbeidelsen og utvider scope potensielt fra medisinsk uforklart\nutmattelse til all langvarig utmattelse. Endringen er ikke forklart\neller drøftet i retningslinjen.</p></li>\n</ul>\n<ul>\n<li><p><strong>Tre institusjonelle formål fra oppdraget er ikke\nomtalt.</strong> Oppdragsteksten begrunner arbeidet eksplisitt med: et\neventuelt fremtidig nasjonalt pasientforløp; etablering av en ny\n<em>«nasjonal kompetansetjeneste for utmattelsestilstander»</em>; og\n<em>«pågående prosess for avvikling og omorganisering av den nasjonale\nkompetansetjenesten for CFS/ME»</em>. Disse tre formålene — særlig\navviklingen av CFS/ME-kompetansetjenesten og etableringen av en ny,\nbredere utmattelseskompetansetjeneste — er vesentlig kontekst for å\nforstå hvorfor populasjonen er utvidet. Ingen av dem er nevnt i\nretningslinjen.</p></li>\n</ul>\n<ul>\n<li><p><strong>Saksnummer 24/13487</strong> som Helsedirektoratet har\noppgitt for høringssaken, er Helsedirektoratets interne\nhøringssaksnummer og refererer ikke til oppdragsdokumentet.</p></li>\n</ul>\n<ul>\n<li><p><strong>Historisk utvikling i motsatt retning av\nforventning.</strong> Kunnskapssenter-rapporten fra 2006 ble bestilt av\net offentlig mandat som ble annonsert i Stortingets spørretime 13.\ndesember 2004. 2014-veilederen siterte mandatet fra Helse- og\nomsorgsdepartementet (datert 1. november 2011) i selve veilederen.\nDagens oppdrag fra 2026 er verken referert eller sitert i\nretningslinjen. Det er altså en gradvis reduksjon i dokumentarisk\ntransparens om oppdragsgrunnlaget over tre norske dokumentgenerasjoner —\nden motsatte utviklingen av hva metodisk modning ellers skulle tilsi. Se\nVedlegg E.7 punkt 7 for komparativ kontekst.</p></li>\n</ul>\n<p><strong>Forslag til endring:</strong></p>\n<ul>\n<li>Retningslinjens kap. 1 gis eksplisitt henvisning til\noppdragsdokumentet fra Helse- og omsorgsdepartementet, med sitering av\nde sentrale formuleringene — særlig de tre institusjonelle\nformålene.</li>\n</ul>\n<ul>\n<li>Retningslinjen forklarer forholdet mellom oppdragets tittel og\nleveransens tittel, eller justerer leveransens tittel tilbake til\noppdragets formulering.</li>\n</ul>\n<ul>\n<li>Retningslinjen gir en eksplisitt erklæring om metodologisk\nuavhengighet fra oppdragsgiveren under utarbeidelsen.</li>\n</ul>\n<h2\nid=\"populasjonsdifferensiering-og-evidensseleksjon-item-3-item-8-item-12\">3.4\nPopulasjonsdifferensiering og evidensseleksjon (Item 3, Item 8, Item\n12)</h2>\n<p><strong>Primærkildegrunnlag:</strong> Retningslinjens kap. 1–4.\nGRADE-vurderingene i kap. 2. FHIs kvalitative systematiske oversikt\n(Hestevik, Langøien, Bergsund 2025).</p>\n<p><strong>Observasjoner:</strong></p>\n<ul>\n<li><p>Utkastet dekker <em>«langvarig utmattelse, inkl. ME/CFS»</em> —\nen bredere populasjon enn NG206s avgrensning til ME/CFS. Dette er et\nlegitimt valg. Men bredden skaper metodiske forpliktelser som et strengt\navgrensningsvalg ikke innebærer.</p></li>\n</ul>\n<ul>\n<li><p>Utkastet erkjenner eksplisitt at evidensen er svak for\nPEM-populasjonen: <em>«Forskningsgrunnlaget for effekten hos pasienter\nmed PEM definert etter Canadakriteriene eller WHO, er svakt. Det er få\nidentifiserte studier.»</em></p></li>\n</ul>\n<ul>\n<li><p>Likevel er differensieringen mellom undergrupper (ME/CFS med PEM,\npost-viral utmattelse, annen langvarig utmattelse) ikke konsekvent\ngjennomført i hver anbefaling. Flere anbefalinger gjelder hele\n«langvarig utmattelse»-populasjonen uten eksplisitt markering av hvilke\nundergrupper anbefalingen hviler på solid evidens for, og hvilke den er\nekstrapolert til.</p></li>\n</ul>\n<ul>\n<li><p>Når populasjonen er bred og evidensen varierer mellom\nundergrupper, blir manglende eksplisitt differensiering særlig\nbetydningsfull. Klinikeren som skal vurdere hvilken anbefaling som\ngjelder for hvilken pasient, har ikke tilstrekkelig støtte i\nretningslinjeteksten alene.</p></li>\n</ul>\n<ul>\n<li><p><strong>Formelle evidensseleksjonskriterier er ikke eksplisitt\nlistet i retningslinjen.</strong> Utkastet angir at <em>«De samme\nprimærstudiene er inkludert i de fleste av de systematiske oversiktene,\nderfor ble de nyeste systematiske oversiktene av god eller moderat\nkvalitet inkludert.»</em> Prinsippet om å bruke nyeste systematiske\noversikter er metodologisk legitimt, men inklusjons- og\neksklusjonskriterier på studienivå (PICO-formulerte) fremgår ikke av\nretningslinjen. NG206 publiserer til sammenligning slike kriterier per\nEvidence Review. Dette gjør at leseren vanskelig kan vurdere hvilke\nstudier som er vurdert, og hvilke som er ekskludert, for de enkelte\nanbefalingene — særlig betydningsfullt når populasjonen er bred og\nstudiene bygger på ulike undergrupper.</p></li>\n</ul>\n<p><strong>Forslag til endring:</strong></p>\n<ul>\n<li>Hver anbefaling markeres eksplisitt med hvilke diagnostiske\nundergrupper (for eksempel ME/CFS med obligatorisk PEM, post-viral\nutmattelse, annen langvarig utmattelse) den hviler på solid evidens for,\nog hvilke den er ekstrapolert til.</li>\n</ul>\n<ul>\n<li>For pasienter med ME/CFS og obligatorisk PEM kan anbefalinger basert\npå evidens fra bredere utmattelsespopulasjoner ha relevans, men dette\nbør markeres eksplisitt som ekstrapolering snarere enn direkte\nanbefaling.</li>\n</ul>\n<ul>\n<li>Formelle inklusjons- og eksklusjonskriterier for evidensseleksjon\nbør eksplisitt listes i retningslinjen (eller som sporbar henvisning til\nvedleggsmateriale), slik at leseren kan etterprøve hvilke studier som\nligger til grunn for hvilke anbefalinger — særlig når populasjonen er\nbred.</li>\n</ul>\n<h2 id=\"oppdateringsprosedyre-item-14\">3.5 Oppdateringsprosedyre (Item\n14)</h2>\n<p><strong>Primærkildegrunnlag:</strong> Retningslinjens kap. 1. NICE\nPMG20 (standardprosedyre for oppdatering av retningslinjer).</p>\n<p><strong>Observasjoner:</strong></p>\n<ul>\n<li>Retningslinjen omtaler ikke når eller hvordan den skal\nrevideres.</li>\n</ul>\n<ul>\n<li>Feltet utvikler seg raskt — både på evidenssiden og på\nklassifikasjonssiden (jf. ICD-11 og WHO-oppdateringer).</li>\n</ul>\n<ul>\n<li>NICE har etablert prosedyre for regelmessige\nevidensoverskridelsesvurderinger. Tilsvarende prosedyre ville styrke\nretningslinjens langtidsrelevans.</li>\n</ul>\n<p><strong>Forslag til endring:</strong></p>\n<ul>\n<li>Retningslinjens kap. 1 inneholder en oppdateringsprosedyre:\ntidshorisont for neste revisjon, triggerpunkter for uplanlagt revisjon\n(f.eks. publisering av nye systematiske oversikter, internasjonale\nretningslinjeoppdateringer), og hvilken instans i Helsedirektoratet som\nhar oppdateringsansvar.</li>\n</ul>\n<h2\nid=\"implementeringsverktøy-monitoring-og-ressursestimater-item-18-19-20-21\">3.6\nImplementeringsverktøy, monitoring og ressursestimater (Item 18, 19, 20,\n21)</h2>\n<p><strong>Primærkildegrunnlag:</strong> Retningslinjen i sin helhet.\nNICE NG206 tools and resources (tilgjengelig på nice.org.uk).</p>\n<p><strong>Observasjoner:</strong></p>\n<ul>\n<li>Domain 5 (Applicability), som omfatter Item 18 (fasilitatorer og\nbarrierer), Item 19 (implementeringsverktøy), Item 20\n(ressursimplikasjoner) og Item 21 (monitoring-kriterier), skårer 37,5 %\nfor Hdir-utkastet mot 70,8 % for NG206 — nest største skåregap etter\nDomain 6 (Editorial Independence).</li>\n</ul>\n<ul>\n<li>Implementeringsverktøy (beslutningsstøtte for fastleger,\nsjekklister, pasientinformasjonsmateriell) er ikke utviklet.</li>\n</ul>\n<ul>\n<li>Monitoring-kriterier for kvalitetsindikatorer er ikke angitt.</li>\n</ul>\n<ul>\n<li>Ressursestimater for implementering (økonomiske, personalmessige) er\nikke diskutert.</li>\n</ul>\n<p><strong>Forslag til endring:</strong></p>\n<ul>\n<li>Implementeringsverktøy utvikles som vedlegg til endelig\nretningslinje: beslutningsstøtte for fastlegen ved mistanke om ME/CFS\n(screening for PEM, ortostatisk intoleranse), sjekkliste for hjemmebesøk\nved alvorlig syke, pasientinformasjonsmateriell, koordineringsverktøy\nmellom primær- og spesialisthelsetjenesten.</li>\n</ul>\n<ul>\n<li>Monitoring-kriterier etableres (f.eks. tid fra sykdomsdebut til\ndiagnose, andel pasienter tilbudt PEM-kartlegging).</li>\n</ul>\n<ul>\n<li>Ressursestimater diskuteres, selv om de er beheftet med\nusikkerhet.</li>\n</ul>\n<h2 id=\"strukturell-differensiering-av-alvorlig-syke-item-3-item-16\">3.7\nStrukturell differensiering av alvorlig syke (Item 3, Item 16)</h2>\n<p><strong>Primærkildegrunnlag:</strong> NICE NG206 seksjon 1.17\n(<em>«Care for people with severe or very severe ME/CFS»</em>).\nUtkastets omtale av alvorlig syke er spredt i hovedteksten uten dedikert\nsamlet seksjon. Thorsen-dissensen, punkt om «Alvorlig syke og barn»\n(Vedlegg C.4). Felles pressemelding fra Norsk Covidforening,\nME-foreningen og ME-foreldrene 13. mars 2026 (Vedlegg C.6).</p>\n<p><strong>Observasjoner:</strong></p>\n<ul>\n<li><p><strong>NG206 har en dedikert seksjon 1.17</strong> som samler\nanbefalinger for <em>severe</em> og <em>very severe</em> ME/CFS, med\negen begrunnelse for samling og eksplisitt note om at hver anbefaling er\nvurdert separat for denne gruppen. Plasseringen er ifølge NG206 selv\ngjort <em>«to make sure they could be easily found within the\nguideline»</em>.</p></li>\n</ul>\n<ul>\n<li><p><strong>NG206s strukturelle grep inkluderer:</strong>\nrisikovurdering før hver klinisk interaksjon med pasienter i denne\nkategorien, hjemmebesøk som standard for helhetsvurdering, eksplisitt\nsevere/very severe-differensiering, og separat vurdering av hver\nanbefaling for gruppen.</p></li>\n</ul>\n<ul>\n<li><p><strong>Utkastet har omtale av alvorlig syke flere\nsteder</strong>, men ikke en tilsvarende dedikert strukturell samling.\nDet er heller ikke en eksplisitt <em>severe/very\nsevere</em>-differensiering med tilpassede anbefalinger per\ngradering.</p></li>\n</ul>\n<ul>\n<li><p><strong>Brukerdissensene vektlegger denne mangelen\neksplisitt.</strong> Thorsen: <em>«Retningslinjen gir ikke\ntilstrekkelige føringer for oppfølging av de mest alvorlig syke og barn.\nDet fremgår heller ikke tydelig at barn kan ha svært alvorlig ME.»</em>\nFelles pressemelding: <em>«Utkastet er spesielt svakt når det gjelder\nbarn og de aller sykeste.»</em></p></li>\n</ul>\n<ul>\n<li><p><strong>Evolusjonsnotatet viser en historisk linje.</strong>\n2014-veilederen hadde <em>10 konkrete eksempler på tilpasninger</em> for\nalvorlig syke i kap. 3.9, modifisert etter innspillsrunden i 2015.\nUtkastet har ikke videreført eller videreutviklet denne tilnærmingen —\nnoe av det strukturelle grepet fra 2014 er svekket, ikke\nstyrket.</p></li>\n</ul>\n<p><strong>Forslag til endring:</strong></p>\n<ul>\n<li>Etablere en dedikert seksjon for alvorlig syke etter modell av NG206\nseksjon 1.17, som samler alle anbefalinger relevante for denne\ngruppen.</li>\n</ul>\n<ul>\n<li>Innføre eksplisitt <em>severe/very severe</em>-differensiering som\ngrunnlag for tilpassede anbefalinger per gradering.</li>\n</ul>\n<ul>\n<li>Inkludere hjemmebesøk som standard for helhetsvurdering av svært\nalvorlig syke, risikovurdering før klinisk interaksjon, og eksplisitt\nmarkering av at hver relevant anbefaling er vurdert separat for denne\ngruppen.</li>\n</ul>\n<ul>\n<li>Synliggjøre eksplisitt at barn kan ha svært alvorlig ME, og etablere\ntilpassede føringer for oppfølging.</li>\n</ul>\n<p>─────────────────────────────────────────────────</p>\n<h1 id=\"avsluttende-bemerkning\">4. Avsluttende bemerkning</h1>\n<p>Utkastet har substansielle kvaliteter og kan rimelig fungere som\nfagnorm etter modifikasjoner. De syv innspillspunktene ovenfor gjelder\ndokumentasjon og prosess, ikke det faglige innholdet i anbefalingene.\nSamtlige syv kan adresseres før endelig publisering uten at\nanbefalingene selv endres.</p>\n<p>En bemerkning om sammenhengen mellom dissenshåndtering og\npopulasjonsvalg: To av innspillspunktene — 3.1 (synliggjøring av todelt\ndissens) og 3.4 (populasjonsdifferensiering) — peker mot samme\nunderliggende observasjon. Retningslinjen favner en bredere populasjon\nenn ME/CFS, og tre brukerrepresentanter som spesifikt representerer\nME/CFS- og postvirale pasientgrupper har tatt dissens. Det er en\nobserverbar sammenheng mellom populasjonsvalget og dissensmønsteret,\nuten at innspillet hevder en kausal relasjon.</p>\n<p>En komparasjon med den norske tradisjonen på feltet:\nKunnskapssenter-rapporten fra 2006 integrerte MENiN-vedlegget fysisk i\ndokumentet som det kritisk kommenterte brukerinnspill. Dette er den mest\ntransparente håndteringen av brukerdissens i noen av de norske og\nbritiske dokumentene på feltet fra 2006 til 2026. Høringsutkastets\nhåndtering — brukerdissenser publisert, men ikke integrert i\nretningslinjeteksten — er et skritt tilbake fra 2006-praksisen på dette\nspesifikke transparens-punktet, og det er denne posisjonen vi mener bør\nvurderes på nytt før endelig publisering.</p>\n<p>Det er verdt å understreke avslutningsvis at AGREE II-evalueringen\nsom dette innspillet hviler på, ikke er en normativ dom over\nretningslinjens faglige innhold. Den er en strukturert vurdering av\ndokumentasjon, prosess og transparens, etter et internasjonalt validert\ninstrument. At utkastet på enkelte domener skårer lavere enn NICE NG206,\nreflekterer ikke nødvendigvis faglige forskjeller i substansen, men\nforskjeller i hvor systematisk dokumentasjonen og transparensgrunnlaget\ner utformet. Det er dette som kan styrkes før endelig publisering.</p>\n<p>─────────────────────────────────────────────────</p>\n<h1 id=\"vedlegg-a-oppdraget-fra-helse--og-omsorgsdepartementet\">VEDLEGG\nA — Oppdraget fra Helse- og omsorgsdepartementet</h1>\n<h2 id=\"a.1-kort-om-dokumentet\">A.1 Kort om dokumentet</h2>\n<p>Helsedirektoratet har utarbeidet retningslinjen på oppdrag fra Helse-\nog omsorgsdepartementet. Oppdraget er formelt gitt i departementets\n<em>Tildelingsbrev 2026 — Helsedirektoratet</em>, et\nforvaltningsrettslig styringsdokument som årlig definerer direktoratets\noppgaver innenfor den tildelte budsjettrammen. Oppdraget om nasjonal\nfaglig retningslinje for langvarig utmattelse, inkl. ME/CFS, fremgår av\nside 30 i tildelingsbrevet og er plassert under\nSpesialisthelsetjenesteavdelingen.</p>\n<p>Retningslinjen verken siterer eller refererer til dette\noppdragsdokumentet. Dette vedlegget gjengir oppdragsteksten ordrett og\nsammenligner oppdragets formuleringer med høringsutkastets tilsvarende\nformuleringer.</p>\n<h2 id=\"a.2-oppdragsteksten-i-sin-helhet-ordrett-sitat\">A.2\nOppdragsteksten i sin helhet (ordrett sitat)</h2>\n<blockquote>\n<p><strong>Nasjonal faglig retningslinje for langvarig utmattelse av\nuklar årsak, inkludert CFS/ME</strong></p>\n<p>Nasjonale retningslinjer er et tungt faglig grunnlag for et ev.\nfremtidig nasjonalt pasientforløp. Retningslinjene er også et faglig\ngrunnlag for virksomheten i en nasjonal kompetansetjeneste for\nutmattelsestilstander.</p>\n<p>Et bedre faglig grunnlag for arbeidet med utmattelseslidelser, inkl.\nCFS/ME, et ev. fremtidig nasjonalt pasientforløp og pågående prosess for\navvikling og omorganisering av den nasjonale kompetansetjenesten for\nCFS/ME er viktige grunner til raskt å få på plass en nasjonal faglig\nretningslinje.</p>\n<p>Helsedirektoratet skal utarbeide Nasjonal faglig retningslinje for\nlangvarig utmattelse av uklar årsak, inkludert CFS/ME.</p>\n<p><strong>Frist: 1.9.2026</strong></p>\n<p>Helsedirektoratet skal også samarbeide med helsetjenesten om\nimplementering av Nasjonale faglige retningslinje for langvarig\nutmattelse av uklar årsak inkludert CFS/ME. I dette deloppdraget ligger\nblant annet å:</p>\n</blockquote>\n<ol type=\"1\">\n<li>utvikle materiell som støtter opp om implementeringen av de faglige\nanbefalingene</li>\n</ol>\n<ol type=\"1\">\n<li>gjennomføre aktiviteter som bidrar til å spre kunnskapen som ligger\nsom grunnlag for anbefalingene</li>\n</ol>\n<blockquote>\n<p><strong>Frist 31.12.2026</strong></p>\n</blockquote>\n<h2 id=\"a.3-tittelsammenligning\">A.3 Tittelsammenligning</h2>\n<table>\n<colgroup>\n<col style=\"width: 26%\" />\n<col style=\"width: 73%\" />\n</colgroup>\n<thead>\n<tr class=\"header\">\n<th><strong>Dokument</strong></th>\n<th><strong>Formulering</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>Oppdraget fra Helse- og omsorgsdepartementet</td>\n<td>Nasjonal faglig retningslinje for langvarig utmattelse <strong>av\nuklar årsak</strong>, inkludert CFS/ME</td>\n</tr>\n<tr class=\"even\">\n<td>Høringsutkastet fra Helsedirektoratet</td>\n<td>Nasjonal faglig retningslinje for langvarig utmattelse, inkl.\nME/CFS</td>\n</tr>\n</tbody>\n</table>\n<p>Kvalifikasjonen <em>«av uklar årsak»</em> er fjernet under\nHelsedirektoratets utarbeidelse. Endringen er ikke forklart eller\ndrøftet i retningslinjen. I oppdraget betegnes populasjonen som\nlangvarig utmattelse hvor årsaken er uavklart — en medisinsk uforklart\nutmattelse, der CFS/ME er én undergruppe. I leveransen betegnes\npopulasjonen som langvarig utmattelse generelt — potensielt også med\nkjent medisinsk årsak — der ME/CFS er én undergruppe. Dette er en\nsubstansiell scope-endring.</p>\n<h2 id=\"a.4-oppdragets-tre-institusjonelle-formål\">A.4 Oppdragets tre\ninstitusjonelle formål</h2>\n<p>Oppdragsteksten angir eksplisitt tre formål for retningslinjen. Ingen\nav dem er omtalt i retningslinjedokumentet.</p>\n<ol type=\"1\">\n<li><p><strong>Grunnlag for et fremtidig nasjonalt\npasientforløp.</strong> Retningslinjen skal være <em>«et tungt faglig\ngrunnlag for et ev. fremtidig nasjonalt pasientforløp»</em>.\nHelsedirektoratet arbeider altså mot et nasjonalt pasientforløp som en\nseparat, senere leveranse — retningslinjen er fundamentet for dette\narbeidet.</p></li>\n</ol>\n<ol type=\"1\">\n<li><p><strong>Grunnlag for en ny nasjonal kompetansetjeneste for\nutmattelsestilstander.</strong> Retningslinjen skal være <em>«faglig\ngrunnlag for virksomheten i en nasjonal kompetansetjeneste for\nutmattelsestilstander»</em>. Dette er en ny, bredere kompetansetjeneste\nsom skal dekke utmattelsestilstander, ikke bare CFS/ME.</p></li>\n</ol>\n<ol type=\"1\">\n<li><p><strong>Parallell avvikling av\nCFS/ME-kompetansetjenesten.</strong> Oppdraget begrunnes eksplisitt med\n<em>«pågående prosess for avvikling og omorganisering av den nasjonale\nkompetansetjenesten for CFS/ME»</em>. Den nåværende, spesifikke\nCFS/ME-kompetansetjenesten skal altså legges ned, og retningslinjen er\nen del av det institusjonelle skiftet.</p></li>\n</ol>\n<p>Disse tre punktene gir strukturell kontekst for forståelsen av\npopulasjonsutvidelsen: den er ikke kun faglig begrunnet, men reflekterer\nogså en pågående institusjonell omorganisering som ikke er synlig fra\nretningslinjeteksten.</p>\n<h2 id=\"a.5-fristoversikt\">A.5 Fristoversikt</h2>\n<table>\n<colgroup>\n<col style=\"width: 64%\" />\n<col style=\"width: 35%\" />\n</colgroup>\n<thead>\n<tr class=\"header\">\n<th><strong>Milepæl</strong></th>\n<th><strong>Frist</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>Høringsfrist for utkastet</td>\n<td>4. mai 2026</td>\n</tr>\n<tr class=\"even\">\n<td>Endelig retningslinje</td>\n<td>1. september 2026</td>\n</tr>\n<tr class=\"odd\">\n<td>Implementeringsmateriell</td>\n<td>31. desember 2026</td>\n</tr>\n</tbody>\n</table>\n<p>Høringsrunden er altså en delprosess i et oppdragsløp som strekker\nseg over hele 2026.</p>\n<p><em>Kildehenvisning: Helse- og omsorgsdepartementet (2026).\nTildelingsbrev 2026 — Helsedirektoratet. Side 30.</em></p>\n<p>─────────────────────────────────────────────────</p>\n<h1 id=\"vedlegg-b-fagdissensene\">VEDLEGG B — Fagdissensene</h1>\n<h2 id=\"b.1-bakgrunn\">B.1 Bakgrunn</h2>\n<p>Fire av de 21 medlemmene i Helsedirektoratets arbeidsgruppe har tatt\nformell dissens fra høringsutkastet før publisering. Dissensbrevene ble\nlevert 26.–27. januar 2026 og er grunnen til at publiseringen av\nutkastet ble utsatt fra opprinnelig planlagt dato i slutten av januar\ntil 4. februar 2026. Alle fire dissenser er publisert som inline\nPDF-vedlegg i retningslinjens kap. 1, under seksjonen\n<em>Dissenser</em>.</p>\n<p>Dette vedlegget gir en oppsummerende oversikt,\nrekonstruksjonsbeskrivelser av hver dissens med direkte sitater fra\nbrevene, og en strukturert tabell over arbeidsgruppens fordeling på\ndissenssiden og ikke-dissenssiden.</p>\n<h2 id=\"b.2-oversiktstabell\">B.2 Oversiktstabell</h2>\n<table>\n<colgroup>\n<col style=\"width: 13%\" />\n<col style=\"width: 22%\" />\n<col style=\"width: 11%\" />\n<col style=\"width: 12%\" />\n<col style=\"width: 9%\" />\n<col style=\"width: 29%\" />\n</colgroup>\n<thead>\n<tr class=\"header\">\n<th><strong>Navn</strong></th>\n<th><strong>Institusjon / kategori</strong></th>\n<th><strong>Dato</strong></th>\n<th><strong>Sted</strong></th>\n<th><strong>Omfang</strong></th>\n<th><strong>Argumentasjonskjerne</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>Tom Farmen Nerli</td>\n<td>Spesialist i fysikalsk medisin og rehabilitering, Sykehuset\nVestfold</td>\n<td>26.01.2026</td>\n<td>Larvik</td>\n<td>~120 ord</td>\n<td>Noceboeffekt, unngåelsesatferd, savnet\nrehabiliteringsperspektiv</td>\n</tr>\n<tr class=\"even\">\n<td>Linn Breen Herner</td>\n<td>Psykologspesialist, OUS — Seksjon for barn og unges psykiske helse\npå sykehus</td>\n<td>27.01.2026</td>\n<td>Oslo</td>\n<td>~190 ord</td>\n<td>Negativ forventningsramme, biopsykososial modell savnes,\nbedringsperspektiv mangler</td>\n</tr>\n<tr class=\"odd\">\n<td>Ingjerd Helene Jøssang</td>\n<td>Fastlege, Norsk forening for allmennmedisin</td>\n<td>26.01.2026</td>\n<td>Stavanger</td>\n<td>~85 ord</td>\n<td>For mye vekt på å unngå belastninger, for lite\nrehabiliteringsperspektiv</td>\n</tr>\n<tr class=\"even\">\n<td>Peter Prydz</td>\n<td>Fastlege, Norsk forening for allmennmedisin</td>\n<td>27.01.2026</td>\n<td>Hammerfest</td>\n<td>~110 ord</td>\n<td>Samme som Jøssang + anerkjennelse av delvis enighet med\nprosessen</td>\n</tr>\n</tbody>\n</table>\n<p>Samlet: fire dissenser, fordelt på én spesialist i fysikalsk medisin\nog rehabilitering, én psykologspesialist og begge fastlegene i\narbeidsgruppen. Alle fire argumenterer i samme faglige retning: utkastet\nfremstår for pessimistisk og legger for lite vekt på\nbedringsperspektivet.</p>\n<h2 id=\"b.3-nerli-larvik-26.-januar-2026\">B.3 Nerli — Larvik, 26. januar\n2026</h2>\n<p>Tom Farmen Nerli er spesialist i fysikalsk medisin og rehabilitering\nved Sykehuset Vestfold, Kysthospitalet. Brevet er på ca. 120 ord,\nforfattet som notat uten brevhode og signert fra Larvik.</p>\n<p>Nerli tar dissens fra hele høringsutkastet. Kjernen i begrunnelsen er\nat veilederen vil ha en <strong>noceboeffekt</strong> fordi den\nindirekte oppfordrer til unngåelsesatferd og tar bort håpet om bedring.\nNerli appellerer til klinisk erfaring og forskningsmessig belegg for at\nmange av disse pasientene blir bra, og hevder dette perspektivet\noppleves fraværende i veilederen.</p>\n<p>Brevet inneholder ingen direkte sitater fra høringsutkastet, ingen\neksplisitte kildereferanser, ingen internasjonale sammenligninger og\ningen alternative tekstforslag. PEM nevnes ikke. Diagnosekriterier\n(Canadakriteriene, ICC, Jason, WHO) og internasjonale retningslinjer\n(NICE, IQWiG, Duodecim) nevnes ikke.</p>\n<p><strong>Argumentasjonsmodus:</strong> Klinisk-nocebo-normativ.\nBegrepssentrert — nocebo fungerer som den samlende analytiske linsen.\nAppellen hviler på klinisk erfaring og en uspesifisert referanse til\n<em>«forskningsmessig belegg»</em>. Kort posisjonsmarkering uten utdypet\napparat.</p>\n<h2 id=\"b.4-herner-oslo-27.-januar-2026\">B.4 Herner — Oslo, 27. januar\n2026</h2>\n<p>Linn Breen Herner er psykologspesialist ved Oslo universitetssykehus,\nBarne- og ungdomsklinikken, Seksjon for barn og unges psykiske helse på\nsykehus (S-BUP). Brevet er på ca. 190 ord — det klart lengste av de fire\nfagdissensbrevene — og er skrevet på OUS-brevark med eksplisitt\nadressering til Helsedirektoratet.</p>\n<p>Herner tar dissens fra hele høringsutkastet og gir tre substansielle\nelementer i begrunnelsen:</p>\n<p>For det første angir hun at anbefalingene avviker fra det faglige\nfundamentet <em>«jeg og vi her ved OUS»</em> bygger klinisk praksis på.\nDette er den eneste fagdissensen som eksplisitt institusjonsforankrer\nseg — og som også grammatisk markerer representasjon av et kollektivt\nfagmiljø.</p>\n<p>For det andre adresserer hun konkret aktivitetsanbefalingene: at\nbudskapet om å <em>«passe på»</em>, <em>«følge med»</em>, <em>«regulere\nned»</em>, <em>«stabilisere ved forverring»</em> gir en negativ\nforventning til utfall av intervensjonen — altså noceboskapende. Dette\ner den mest konkrete tekstkritikken blant de fire fagdissensene, selv om\nhun ikke siterer utkastet ordrett.</p>\n<p>For det tredje angir hun tre fraværsobservasjoner: at utkastet\nformidler svært lite om at man kan bli bra og hvordan; at det ikke sies\nnoe om at forklaring av symptomene er sentralt i bedringsprosessen; og\nat biopsykososial forståelse — som hun karakteriserer som <em>«et\nanerkjent rammeverk globalt i arbeidet med pasientgruppen»</em> — er\nknapt nevnt.</p>\n<p><strong>Argumentasjonsmodus:</strong> Institusjonell-biopsykososial.\nPosisjonsforankret i et kollektivt <em>«vi»</em> på OUS S-BUP, med\nbiopsykososial modell som eksplisitt rammeverksreferanse. Den mest\nsubstansielle av de fire fagdissensene, men fortsatt uten eksplisitt\nkildeapparat.</p>\n<h2 id=\"b.5-jøssang-stavanger-26.-januar-2026\">B.5 Jøssang — Stavanger,\n26. januar 2026</h2>\n<p>Ingjerd Helene Jøssang er fastlege og representant for Norsk forening\nfor allmennmedisin (NFA). Brevet er på ca. 85 ord — det korteste av de\nfire — forfattet som notat med overskriften <em>Formell dissens i\noffentlig arbeid</em>, signert fra Stavanger.</p>\n<p>Jøssang tar dissens fra hele høringsutkastet. Kjernepåstanden er at\nteksten <em>«legger totalt sett for mye vekt på å unngå belastninger,\nnoe vi har belegg for og erfaring med at det gjør mer skade enn\nnytte»</em>. Rehabiliteringsperspektivet med sikte på bedring og\ntilfriskning er etter hennes syn for lite vektlagt.</p>\n<p>Ingen direkte sitater fra utkastet, ingen kildereferanser, ingen\ninternasjonale sammenligninger, ingen alternative formuleringer. PEM\nnevnes ikke.</p>\n<p><strong>Argumentasjonsmodus:</strong> Minimalistisk allmennpraktisk.\nRen posisjonsmarkering uten eksemplifisering. Første persons flertall\n(<em>«vi har belegg»</em>) signaliserer talerposisjon fra\nallmennlegestanden, men uten eksplisitt institusjonell forankring.</p>\n<h2 id=\"b.6-prydz-hammerfest-27.-januar-2026\">B.6 Prydz — Hammerfest,\n27. januar 2026</h2>\n<p>Peter Prydz er fastlege og representant for Norsk forening for\nallmennmedisin (NFA). Brevet er på ca. 110 ord, forfattet som notat med\nsamme overskrift som Jøssangs (<em>Formell dissens i offentlig\narbeid</em>). Signert fra Hammerfest.</p>\n<p>Substansielt er Prydz-brevet nesten identisk med Jøssang-brevet:\nsamme kjernepåstand om at teksten <em>«legger generelt for mye vekt på å\nunngå belastninger, noe vi har belegg og erfaring for at gjør mer skade\nenn nytte»</em>, samme formulering om at rehabiliteringsperspektivet er\nfor lite vektlagt.</p>\n<p>Den eneste substansielle forskjellen er en ekstra setning som er unik\nfor Prydz: han <em>beklager</em> dissensen, fordi han opplever at\n<em>«vi ble hørt på områder som angår allmennlegenes oppdrag»</em>.\nDette er den eneste eksplisitte signaleringen i noen av de syv\ndissensbrevene (fag eller bruker) om at dissenten også anerkjenner\ndelvis enighet med prosessen.</p>\n<p><strong>Argumentasjonsmodus:</strong> Minimalistisk allmennpraktisk\nmed samarbeidssignal. Samme form som Jøssang pluss eksplisitt\nanerkjennelse av delvis enighet på allmennlegerelevante områder.\nSignaliserer fortsatt vilje til forvaltningssamarbeid.</p>\n<h2 id=\"b.7-fellesmønster-på-tvers-av-fagdissensene\">B.7 Fellesmønster\npå tvers av fagdissensene</h2>\n<p>Fagdissensene er metodologisk homogene på en måte brukerdissensene\nikke er. Alle fire er korte posisjonserklæringer (85–190 ord) uten\ndirekte sitater fra utkastet, uten kildereferanser, uten internasjonale\nsammenligninger, uten alternative tekstforslag. De har tre komponenter:\nuttalelse om at dissens tas fra hele utkastet, kort substansiell\nbegrunnelse, signatur.</p>\n<p>Dette er en juridisk-forvaltningsmessig dissensform. Timing (før\npublisering) forklarer at dissensene ikke kan sitere spesifikke\npassasjer i en tekst som ennå ikke er publisert — men timing forklarer\nikke at brevene ikke inneholder kildereferanser eller internasjonale\nsammenligninger. Det er et genrevalg innenfor timingsrammen: kort\nposisjonsmarkering, ikke utdypet argumentasjonsbrev.</p>\n<p>Alle fire argumenterer i samme substansielle retning: utkastet er for\npessimistisk, legger for mye vekt på unngåelsesatferd og for lite vekt\npå rehabiliteringsperspektiv og bedringsmuligheter. Variasjonene er\nmarginale: Nerli og Herner er eksplisitt nocebo-orientert; Jøssang og\nPrydz er minimalistisk rehabiliteringsorientert uten nocebo-begrep.</p>\n<h2 id=\"b.8-fordelingen-av-arbeidsgruppen-dissens-og-ikke-dissens\">B.8\nFordelingen av arbeidsgruppen — dissens og ikke-dissens</h2>\n<p>Ikke-dissens er også et observasjonspunkt. Tabellen viser fordelingen\nav arbeidsgruppens 21 medlemmer etter hvem som har tatt dissens og hvem\nsom ikke har det.</p>\n<table style=\"width:100%;\">\n<colgroup>\n<col style=\"width: 23%\" />\n<col style=\"width: 9%\" />\n<col style=\"width: 24%\" />\n<col style=\"width: 22%\" />\n<col style=\"width: 19%\" />\n</colgroup>\n<thead>\n<tr class=\"header\">\n<th><strong>Kategori</strong></th>\n<th><strong>I arbeidsgruppen</strong></th>\n<th><strong>Tatt dissens</strong></th>\n<th><strong>Ikke dissens</strong></th>\n<th><strong>Kommentar</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>Fastleger (allmennmedisin)</td>\n<td>2</td>\n<td>2 (Jøssang, Prydz)</td>\n<td>0</td>\n<td>Hele fastlegeseksjonen dissenterer</td>\n</tr>\n<tr class=\"even\">\n<td>Spesialist i fys.med./rehab.</td>\n<td>2</td>\n<td>1 (Nerli)</td>\n<td>1 (Wilhelmsen)</td>\n<td>Delt</td>\n</tr>\n<tr class=\"odd\">\n<td>Psykologspesialister</td>\n<td>3</td>\n<td>1 (Herner)</td>\n<td>2 (Finset, Landmark)</td>\n<td>Herner dissenterer</td>\n</tr>\n<tr class=\"even\">\n<td>Spesialist i barnemedisin</td>\n<td>2</td>\n<td>0</td>\n<td>2 (inkl. Helland, leder Kompetansetjenesten for CFS/ME)</td>\n<td>Ingen dissens</td>\n</tr>\n<tr class=\"odd\">\n<td>Fysioterapeuter</td>\n<td>2</td>\n<td>0</td>\n<td>2</td>\n<td>Ingen dissens</td>\n</tr>\n<tr class=\"even\">\n<td>Ergoterapeuter</td>\n<td>2</td>\n<td>0</td>\n<td>2</td>\n<td>Ingen dissens</td>\n</tr>\n<tr class=\"odd\">\n<td>Helsesykepleier</td>\n<td>1</td>\n<td>0</td>\n<td>1</td>\n<td>Ingen dissens</td>\n</tr>\n<tr class=\"even\">\n<td>Spesialist infeksjonsmedisin</td>\n<td>1</td>\n<td>0</td>\n<td>1 (Langeland)</td>\n<td>Ingen dissens</td>\n</tr>\n<tr class=\"odd\">\n<td>NAV-rådgivende overlege</td>\n<td>1</td>\n<td>0</td>\n<td>1</td>\n<td>Ingen dissens</td>\n</tr>\n<tr class=\"even\">\n<td>Brukerrepr. — ME/post-viral</td>\n<td>3</td>\n<td>3 (Schei, Thorsen, Mørch-Storstein)</td>\n<td>0</td>\n<td>Hele seksjonen dissenterer</td>\n</tr>\n<tr class=\"odd\">\n<td>Brukerrepr. — Recovery Norge</td>\n<td>2</td>\n<td>0</td>\n<td>2 (Grøntjernet, Sagstad)</td>\n<td>Ingen dissens — konsistent med rehabiliteringsorientert\nperspektiv</td>\n</tr>\n</tbody>\n</table>\n<p>Observasjonen er at dissenslinjen ikke følger et\nbruker-mot-fag-skille, men et skille i sykdomsforståelse. Fagdissensene\nrepresenterer en rehabiliteringsorientert utmattelsesforståelse;\nbrukerdissensene representerer en PEM-sentrert ME/CFS-forståelse. At\nbrukerrepresentasjonen i arbeidsgruppen selv er internt delt langs samme\nakse (ME/post-viral-foreningene dissenterer, Recovery Norge ikke),\nbekrefter at skillet ligger i sykdomsforståelsen og ikke i\nrepresentasjonskategorien.</p>\n<p>─────────────────────────────────────────────────</p>\n<h1 id=\"vedlegg-c-brukerdissensene\">VEDLEGG C — Brukerdissensene</h1>\n<h2 id=\"c.1-bakgrunn\">C.1 Bakgrunn</h2>\n<p>Tre av de fem brukerrepresentantene i arbeidsgruppen har tatt formell\ndissens fra høringsutkastet etter publisering 4. februar 2026.\nDissensbrevene er levert 26. februar til 3. mars 2026. Alle tre er\npublisert av Helsedirektoratet i <em>Dissenser i PDF</em>-ZIP-filen\nunder innkomne høringsinnspill, og selvpublisert av de tre\npasientforeningene på egne nettsider.</p>\n<p>En felles pressemelding fra de tre foreningene — Norges ME-forening,\nME-foreldrene og Norsk Covidforening — ble publisert 13. mars 2026 og\nsammenfatter det felles budskapet i dissensene. Foreningene\nrepresenterer til sammen over 8000 medlemmer.</p>\n<p>Dette vedlegget gir en oversiktstabell, utvidet sammendrag av hver av\nde tre dissensene med direkte sitater fra brevene, og omtaler den felles\npressemeldingen.</p>\n<h2 id=\"c.2-oversiktstabell\">C.2 Oversiktstabell</h2>\n<table>\n<colgroup>\n<col style=\"width: 15%\" />\n<col style=\"width: 20%\" />\n<col style=\"width: 11%\" />\n<col style=\"width: 18%\" />\n<col style=\"width: 34%\" />\n</colgroup>\n<thead>\n<tr class=\"header\">\n<th><strong>Representant</strong></th>\n<th><strong>Forening</strong></th>\n<th><strong>Dato</strong></th>\n<th><strong>Medlemstall (forening)</strong></th>\n<th><strong>Hovedargumenter</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>Trude Schei</td>\n<td>Norges ME-forening (ass. generalsekretær)</td>\n<td>26.02.2026</td>\n<td>Største ME-foreningen i Norge</td>\n<td>Vage formuleringer; manglende PEM-beskrivelse; manglende\nskadeinformasjon; manglende hensyn til brukerundersøkelser</td>\n</tr>\n<tr class=\"even\">\n<td>Tanja Thorsen</td>\n<td>ME-foreldrene</td>\n<td>26.02.2026</td>\n<td>Foreldreforening</td>\n<td>Strukturell plassering; manglende todeling etter PEM-status;\nmanglende samsvar med NICE; manglende omtale av barn og alvorlig\nsyke</td>\n</tr>\n<tr class=\"odd\">\n<td>Carina Mørch-Storstein</td>\n<td>Norsk Covidforening</td>\n<td>03.03.2026</td>\n<td>Forening for long covid</td>\n<td>Manglende skille ME/CFS–long covid–uspesifikke tilstander; manglende\nsamsvar med ICD-11; fravær av biomedisinsk kunnskapsgrunnlag; ensidig\nfokus på utmattelse</td>\n</tr>\n</tbody>\n</table>\n<p>Alle tre dissensbrev har enstemmig støtte fra respektive\nforeningsstyrer. Brevene bruker eksplisitt terminologien <em>«formell\ndissens»</em> — samme språklige form som de fire fagdissensene. Ingen av\ndem er omtalt i selve retningslinjedokumentet.</p>\n<h2 id=\"c.3-schei-norges-me-forening-26.-februar-2026\">C.3 Schei —\nNorges ME-forening, 26. februar 2026</h2>\n<p>Trude Schei, assisterende generalsekretær i Norges ME-forening, åpner\nbrevet med en klar posisjonsmarkering: <em>«Jeg ønsker med dette å ta\ndissens på høringsutkast til nye retningslinjer for ‘langvarig\nutmattelse, inkl. ME/CFS’. Jeg har støtte i ME-foreningens styre i å\ngjøre dette.»</em></p>\n<p>Kjernen i Scheis argumentasjon er at utkastet <em>«verken vil virke\nkompetansehevende eller vil gi ME-syke bedre oppfølging, behandling\neller tilgang til riktige ytelser fra NAV eller kommune»</em>. Brevet er\nordnet i fire substansielle blokker.</p>\n<p><strong>Rettspraksis som dokumentasjon på eksisterende\nveileder-tolkning.</strong> Schei viser til en nylig Gulating\nlagmannsrettssak der NAV hevdet at en ung mann med ME <em>«ikke\noppfyller lovens krav om å gjennomføre ‘hensiktsmessig\nbehandling’»</em>, basert på vag prognoseformulering i nåværende\nveileder. Mannen hadde vært syk i 19 år siden fireårsalderen, opplevd\nforverring etter fysioterapi, og fått avslag på andre behandlinger fordi\nhan var for syk. Likevel hevdet NAV at <em>«alle behandlinger som i det\nhele tatt er nevnt i veilederen skal være forsøkt, og at prognosen var\ngod, om mannen bare endrer innstilling»</em>. Dette er Scheis eksempel\npå hvordan uklare formuleringer i en retningslinje gir rom for\ntolkninger som rammer pasientene.</p>\n<p><strong>Krav til en ny retningslinje.</strong> Schei lister åtte krav\nsom følger av rettspraksis-eksemplet:</p>\n<ul>\n<li>Er klar og tydelig i sine anbefalinger, og ikke gir rom for\ntolkning.</li>\n</ul>\n<ul>\n<li>Gir en god beskrivelse av ME/CFS og av PEM, og konsekvensene av\nPEM</li>\n</ul>\n<ul>\n<li>Informerer om hele symptombildet ved ME/CSF, ikke bare\nutmattelse</li>\n</ul>\n<ul>\n<li>Informerer om risiko for skade forbundet med behandling</li>\n</ul>\n<ul>\n<li>Gir realistiske forventninger om effekt […]</li>\n</ul>\n<ul>\n<li>Gir realistisk informasjon om prognose for ME/CFS</li>\n</ul>\n<ul>\n<li>Skiller tydelig mellom ME/CFS og utmattelse uten PEM i sine\nbehandlingsråd</li>\n</ul>\n<ul>\n<li>Tar hensyn til brede, godt dokumenterte brukererfaringer</li>\n</ul>\n<p>Schei vurderer at utkastet svikter på alle åtte punktene.</p>\n<p><strong>Brukerundersøkelsene som kunnskapsgrunnlag.</strong> Schei\nviser til at ME-foreningen har sendt Helsedirektoratet <em>«en rekke\nbrukerundersøkelser, gjennomført i perioden 2011 til 2025»</em>, med\nmellom 600 og 11 200 respondenter. Undersøkelsene dokumenterer problemer\nsom <em>«lang tid fra sykdomsdebut til diagnose, feil råd om aktivitet\nog påfølgende tap av funksjon, vanskelig tilgang til […] ytelser […],\nskade forbundet med de terapiene NAV krever, og mangel på forsvarlig\nhelsehjelp til de sykeste pasientene»</em>. Scheis vurdering er at\nutkastet <em>«i svært liten grad adresserer disse\nproblemstillingene»</em>.</p>\n<p><strong>Etisk argument om informert samtykke.</strong> Et sentralt\nelement i Scheis argumentasjon er at retningslinjens manglende\ninformasjon om risiko for skade gjør det umulig for behandler å\ninformere pasienten, og dermed umulig for pasienten å gi informert\nsamtykke. Scheis formulering: <em>«Når retningslinjen lar være å\ninformere om risiko for skade, kan ikke behandler informere pasienten,\nog pasienten kan ikke ta informerte valg. Dette er uetisk når alvorlig\nskade er sannsynliggjort.»</em></p>\n<p>Brevet avsluttes: <em>«Jeg kan ikke stille meg bak utkastet i sin\nnåværende form.»</em></p>\n<p><strong>Kildeapparat.</strong> Schei refererer til konkret\nrettspraksis (Gulating lagmannsrettssak), omfattende brukerundersøkelser\n(600–11 200 respondenter), kjente biologiske mekanismer ved PEM\n(oksygenopptak, muskelvev, restitusjon), og det etiske prinsippet om\ninformert samtykke. Dette er en substansielt annerledes\nargumentasjonsform enn fagdissensenes — rikere på kilder og\neksemplifiseringer.</p>\n<h2 id=\"c.4-thorsen-me-foreldrene-26.-februar-2026\">C.4 Thorsen —\nME-foreldrene, 26. februar 2026</h2>\n<p>Tanja Thorsen, representant for ME-foreldrene, strukturerer dissensen\ni åtte navngitte punkter som hver adresserer et distinkt strukturelt\nproblem. Åpningspåstanden: <em>«Dissensen gjelder retningslinjens\noverordnede struktur og premissene for forståelse, diagnostikk og\noppfølging av ME/CFS. Den retter seg mot strukturelle forhold med\nbetydning for pasientsikkerhet, klinisk presisjon og forutsigbarhet,\nikke mot enkeltformuleringer isolert sett.»</em></p>\n<p><strong>Strukturell plassering og avvik fra WHO.</strong> Thorsen\npeker på at <em>«ME/CFS plasseres i tittel og struktur som en\nundergruppe av langvarig utmattelse»</em>, mens <em>«WHO har\nklassifisert ME/CFS som en nevrologisk sykdom med egen diagnose og\navgrensning mot kronisk utmattelse»</em>. Thorsen mener denne\navgrensningen ikke gjenspeiles i utkastet.</p>\n<p><strong>To forespeilede behandlingsløp er ikke realisert.</strong>\nThorsen viser til at det ved oppstart ble forespeilet to behandlingsløp:\n<em>«(1) ME/CFS etter strenge kriterier; (2) langvarig utmattelse uten\noppfylte Canadakriterier (Jason for barn)»</em>. Thorsen konstaterer at\n<em>«dette er ikke realisert»</em>.</p>\n<p><strong>Manglende samsvar med NICE.</strong> Arbeidet skulle ifølge\nThorsen bygge på NICE, men: <em>«Studier NICE vurderer som lav eller\nsvært lav kvalitet, vurderes her som middels kvalitet, uten at avviket\nredegjøres for.»</em> Dette er en konkret metodisk observasjon som ikke\nhar parallell i de andre dissensene.</p>\n<p><strong>PEM som kjernefenomen uten konsekvens.</strong>\nCanadakriteriene refereres, men PEM <em>«gis […] ingen tydelig\nkonsekvens for videre behandlingsanbefalinger»</em>. Thorsen formulerer\nkonsekvensen for differensiert behandling: <em>«For pasienter med PEM\nkan selv mindre belastningsøkning medføre kumulativ og forsinket\nforverring. For pasienter uten PEM kan manglende differensiering føre\ntil unødig restriktive råd og forsinket funksjonsutvikling.»</em></p>\n<p><strong>Alvorlig syke og barn.</strong> Thorsen påpeker at\nretningslinjen <em>«ikke gir tilstrekkelige føringer for oppfølging av\nde mest alvorlig syke og barn»</em>, og at <em>«det fremgår heller ikke\ntydelig at barn kan ha svært alvorlig ME»</em>.</p>\n<p><strong>Avsluttende merknad.</strong> <em>«Dissensen innebærer ikke\nat representanten trekker seg fra arbeidet, men synliggjør uenighet om\nforhold av vesentlig betydning for pasientsikkerhet og samsvar mellom\ndiagnostikk og anbefalinger.»</em></p>\n<p><strong>Kildeapparat.</strong> Thorsen refererer eksplisitt til\nWHO-klassifikasjon, NICE-vurderinger, Canadakriteriene og\nJason-kriteriene for barn. Brevet inneholder ikke bibliografiske\nreferanser, men er konsistent forankret i internasjonale retningslinjer\nog kriteriesystemer.</p>\n<h2 id=\"c.5-mørch-storstein-norsk-covidforening-3.-mars-2026\">C.5\nMørch-Storstein — Norsk Covidforening, 3. mars 2026</h2>\n<p>Carina Mørch-Storstein, brukerrepresentant for Norsk Covidforening,\nåpner dissensen: <em>«Jeg, brukerrepresentant for Norsk Covidforening,\nfremmer med dette en formell dissens til høringsutkastet, med støtte fra\nstyret. Jeg fortsetter dog i arbeidsgruppen.»</em> Dette er den eneste\nav de syv dissensbrevene som eksplisitt markerer at representanten\nfortsetter å delta.</p>\n<p>Mørch-Storstein argumenterer at <em>«utkastet mangler faglig\npresisjon, er ikke i tråd med internasjonale standarder og ivaretar ikke\npasientsikkerheten for personer med postviral sykdom, herunder ME/CFS og\nlong covid i tilstrekkelig grad»</em>. Brevet er strukturert i ni\npunkter.</p>\n<p><strong>Manglende skille mellom ME/CFS, long covid og uspesifikke\nutmattelsestilstander.</strong> Mørch-Storstein viser til at\n<em>«høringsutkastet sammenstiller ME/CFS, long covid og\nutmattelsestilstander av ukjent årsak i én felles anbefaling»</em>, og\nargumenterer at <em>«postvirale lidelser som ME/CFS og long covid har\ndokumenterte biologiske særtrekk, og kan ikke behandles som varianter av\nen generell utmattelse»</em>.</p>\n<p><strong>Manglende samsvar med ICD-11.</strong> Mørch-Storstein\nspesifiserer at ICD-11 skiller mellom <em>«postviral fatigue syndrome\n(8E49-ME/CFS), (RA01-long covid) og andre utmattelsestilstander\n(MG22-Fatique)»</em>, og at utkastet <em>«bryter med denne strukturen\nved å samle tilstandene under én bred kategori. Dette skaper uklarhet i\nklinisk praksis, svekker datakvalitet i helseregistre og gjør det\nvanskelig å følge internasjonale standarder for rapportering og\nforskning.»</em></p>\n<p><strong>Fravær av biomedisinsk kunnskapsgrunnlag.</strong>\nMørch-Storstein argumenterer at <em>«internasjonalt foreligger det et\nbetydelig biomedisinsk kunnskapsgrunnlag som beskriver immunologiske\navvik, autonome forstyrrelser (som POTS), metabolske og mitokondrielle\ndysfunksjoner, nevroinflammasjon, mikrosirkulatoriske forstyrrelser og\npost-exertional malaise (PEM) som sentrale sykdomstrekk»</em>. Utkastet\n<em>«mangler en systematisk og etter vårt skjønn faglig forsvarlig\noppsummering»</em> av dette.</p>\n<p><strong>Uforholdsmessig vektlegging av adferdsterapeutiske\nstudier.</strong> Mørch-Storstein lister seks metodiske svakheter ved\nstudiene: <em>«manglende blinding; subjektive endepunkter i\nikke-blindede intervensjoner; høyt frafall; manglende objektive mål på\nfunksjon; manglende reproduserbarhet; uklart om gruppene man har studert\nhar PEM og/eller ortostatisk intoleranse»</em>.</p>\n<p><strong>Avvik fra WHO og NICE.</strong> Retningslinjene fra WHO og\nNICE <em>«fraråder standardiserte aktivitetsøkende behandlingsformer og\nunderstreker betydningen av energitilpasning og beskyttelse mot\noverbelastning. Høringsutkastet avviker fra denne utviklingen og støtter\nseg i for stor grad på omstridt klinisk praksis og teorier uten\ntilstrekkelig dokumentasjon.»</em></p>\n<p><strong>Kildeapparat.</strong> Mørch-Storstein refererer eksplisitt\ntil: Choutka et al. (Nature Medicine 2022), Jason et al. (Frontiers in\nMedicine 2026), Fafo/SINTEF-rapporten <em>Tjenesten og meg</em> (2021),\nNICE NG206, NordForsk (2025) og WHO (2022). Dette er det bredeste\nbibliografiske apparat blant de tre brukerdissensene.</p>\n<h2\nid=\"c.6-felles-pressemelding-fra-de-tre-foreningene-13.-mars-2026\">C.6\nFelles pressemelding fra de tre foreningene, 13. mars 2026</h2>\n<p>Norsk Covidforening, Norges ME-forening og ME-foreldrene publiserte\n13. mars 2026 en felles pressemelding som sammenfatter de tre\ndissensbrevenes budskap. Tre hovedmomenter:</p>\n<p><strong>Pasientorganisasjonene ber om at retningslinjen ikke\npubliseres i sin nåværende form.</strong> <em>«Nå tar organisasjonenes 3\nrepresentanter i arbeidsgruppen dissens på utkastet til ny retningslinje\nog ber om at retningslinjen ikke publiseres i sin nåværende\nform.»</em></p>\n<p><strong>Internasjonal kontekst.</strong> Pressemeldingen viser til at\nNICE (2021), tyske IQWiG og finske Duodecim alle har oppdatert sine\nretningslinjer med PEM som sentralt diagnostisk trekk og med frarådning\nav gradert aktivitetsøkning for PEM-pasienter. Konklusjonen er at\n<em>«når ledende europeiske fagmiljøer på bakgrunn av evidensbasert\nkunnskap legger PEM til grunn for valg av behandling og rehabilitering,\nmå også norske retningslinjer ta denne kunnskapen på alvor»</em>.</p>\n<p><strong>Pasientsikkerhetsperspektivet.</strong> Pressemeldingen\nargumenterer at <em>«dette handler ikke om særbehandling, men om faglig\npresisjon og pasientsikkerhet. Norge må harmonisere sine retningslinjer\nmed oppdatert internasjonal konsensus.»</em></p>\n<h2 id=\"c.7-samlet-vurdering-av-brukerdissensene\">C.7 Samlet vurdering\nav brukerdissensene</h2>\n<p>De tre brukerdissensene er substansielt homogene i sin grunnholdning:\nutkastet mangler tilstrekkelig differensiering mellom ME/CFS (og\npostviral sykdom mer generelt) og bredere utmattelsestilstander, gir\nikke PEM den strukturelle konsekvens den fortjener, og informerer ikke\ntilstrekkelig om risiko for skade ved aktivitetsøkende behandling.</p>\n<p>Formen er derimot ulik fagdissensenes: brukerdissensene er\nsubstansielle argumentasjonsbrev med direkte sitater fra utkastet,\nvitenskapelige kildereferanser (Choutka, Jason, NICE, Kuut, WHO, FHI),\nempiriske belegg (brukerundersøkelser med 600–11 200 respondenter,\nGulating-sak), alternative tekstforslag og eksplisitt PEM-diskusjon.\nMørch-Storstein har den mest omfattende kildelisten; Schei har den mest\nkonkrete forankringen i rettspraksis og brukererfaringer; Thorsen har\nden mest strukturerte åtte-punkts-formen.</p>\n<p>Den formelle ulikheten mellom fagdissensene (korte\nposisjonserklæringer) og brukerdissensene (substansielle\nargumentasjonsbrev) er delvis forklart av timing: brukerdissensene er\nskrevet etter publisering og kan sitere utkastet direkte, mens\nfagdissensene ble skrevet før publisering. Men brukerdissensenes rikere\nkildeapparat — særlig bibliografiske referanser og eksplisitt\ninternasjonal sammenligning — reflekterer også et annet genrevalg enn\ndet fagdissensene har foretatt.</p>\n<p>─────────────────────────────────────────────────</p>\n<p>─────────────────────────────────────────────────</p>\n<h1 id=\"vedlegg-d-komparativ-agree-ii-analyse\">VEDLEGG D — Komparativ\nAGREE II-analyse</h1>\n<h2 id=\"d.1-om-dette-vedlegget\">D.1 Om dette vedlegget</h2>\n<p>Dette vedlegget inneholder den item-for-item AGREE II-vurderingen som\nligger til grunn for sammendraget i seksjon 2 av hoveddokumentet. Alle\n23 items i instrumentet er vurdert for begge retningslinjene, med\neksplisitte begrunnelser for skårene. Vedlegget utgjør det analytiske\nfundamentet for de syv innspillspunktene og gjør det mulig for leseren å\netterprøve vurderingen per item.</p>\n<h2 id=\"d.2-metode-og-forbehold\">D.2 Metode og forbehold</h2>\n<h3 id=\"d.2.1-om-agree-ii-som-analyseverktøy\">D.2.1 Om AGREE II som\nanalyseverktøy</h3>\n<p>AGREE II (Appraisal of Guidelines for Research and Evaluation, 2.\nutgave) er et internasjonalt validert instrument for å vurdere\nkvaliteten på utviklingsprosessen og rapporteringen av kliniske\nretningslinjer. Instrumentet er utviklet av AGREE Research Trust og\nbrukes bredt i metode- og retningslinjelitteratur. Det består av 23\nitems fordelt på 6 domener. Hvert item skåres på en 7-punktsskala (1 =\nstrongly disagree, 7 = strongly agree). Domeneskåre beregnes som:</p>\n<p>Resultatet er en prosentandel mellom 0 og 100 per domene. AGREE II\nmåler metodisk kvalitet i utviklingsprosess og rapportering — ikke\nklinisk gyldighet av anbefalingene.</p>\n<h3 id=\"d.2.2-viktige-forbehold\">D.2.2 Viktige forbehold</h3>\n<p><strong>Enkeltanalytiker.</strong> Standard AGREE II-praksis bruker\nto til fire uavhengige vurderere og rapporterer interrater-reliabilitet.\nDenne analysen er gjennomført som én strukturert gjennomgang og skal\nleses som én analyses vurdering, ikke som validert konsensus. Skårene\ngir en systematisk referanseramme, men presise tall-forskjeller bør\nbehandles med forsiktighet. Substansielle forskjeller (mer enn 10\nprosentpoeng på domenenivå) er mer robuste indikasjoner enn marginale\ndifferanser.</p>\n<p><strong>Utkaststatus for Hdir-dokumentet.</strong> Høringsutkastet er\nunder høring til 4. mai 2026 og kan endres før endelig publisering.\nEnkelte items (særlig Item 13 om ekstern fagfellevurdering og Item 14 om\noppdateringsprosedyre) kan få annen skår ved endelig versjon.</p>\n<p><strong>Innsynsavhengige eller ikke offentlig publiserte\nmaterialer.</strong> Individuelle habilitetsskjemaer for de 21\narbeidsgruppemedlemmene i Hdir-prosessen er ikke konsultert.</p>\n<p><strong>Populasjonsforskjell.</strong> NG206 dekker ME/CFS.\nHdir-utkastet dekker «langvarig utmattelse, inkl. ME/CFS» — en bredere\npopulasjon. Dette er en strukturell forskjell som påvirker direkte\nsammenlignbarhet på flere items og behandles eksplisitt i D.2.3\nnedenfor.</p>\n<h3 id=\"d.2.3-populasjonsforskjellen-som-strukturell-sak\">D.2.3\nPopulasjonsforskjellen som strukturell sak</h3>\n<p>Dette er den mest konsekvensfulle strukturforskjellen mellom de to\nretningslinjene og fortjener eksplisitt behandling fordi den påvirker\ntolkningen av flere items.</p>\n<p><strong>Hva forskjellen består i.</strong> NG206 dekker ME/CFS som en\navgrenset tilstand. NICE har adoptert modifiserte Institute of Medicine\n2015-kriterier med fire obligatoriske nøkkelsymptomer: invalidiserende\nutmattelse, post-exertional malaise (PEM), ikke-oppfriskende søvn eller\nsøvnforstyrrelser, og kognitive vansker. PEM er obligatorisk. Dette gir\nen relativt skarpt avgrenset pasientpopulasjon.</p>\n<p>Høringsutkastet dekker «langvarig utmattelse, inkl. ME/CFS» — en\nbredere kategori der ME/CFS er én av flere tilstander innenfor rammen.\nTittelen signaliserer at anbefalinger skal gjelde for en populasjon som\ner større enn ME/CFS-populasjonen: post-viral utmattelse (inkludert\netter covid-19), annen langvarig utmattelse, og ME/CFS. Utkastet bruker\nCanadakriteriene for ME/CFS hos voksne, Jason pediatriske kriterier for\nbarn, og WHO-definisjon av PEM.</p>\n<p><strong>Hvorfor dette er en strukturell sak.</strong> Forskjellen\nskaper ulike metodologiske forpliktelser. Når populasjonen er bredere,\nblir evidensgrunnlaget mer heterogent. Effektstudier av intervensjoner\nmot «utmattelse» inkluderer ofte pasienter med ulike underliggende\ntilstander. En intervensjon som har effekt på postinfeksiøs utmattelse\ngenerelt, har ikke nødvendigvis effekt for en ME/CFS-pasient med PEM.\nUtkastet erkjenner denne problematikken eksplisitt i kap. 2:\n<em>«Forskningsgrunnlaget for effekten hos pasienter med PEM definert\netter Canadakriteriene eller WHO, er svakt. Det er få identifiserte\nstudier.»</em></p>\n<p>Dette stiller retningslinjen overfor et strukturelt valg: (a) gi\nanbefalinger basert på evidens fra den bredere populasjonen og anta at\nresultatene overføres til undergruppene, eller (b) differensiere\nanbefalingene per undergruppe. Det første er metodisk problematisk for\nME/CFS-pasienter med PEM, fordi inkluderte studier ofte har blandet\neller ikke-spesifisert populasjon. Det andre krever klare\npopulasjonsskiller i hver anbefaling. Utkastet differensierer delvis\n(f.eks. skilles Canadakriteriene for ME/CFS ut), men differensieringen\ner ikke konsekvent gjennomført i alle anbefalinger. NICE begrenser\nderfor scope til ME/CFS og inkluderer ikke bredere\nutmattelsespopulasjoner.</p>\n<p><strong>Konsekvens for AGREE II-skåring.</strong> Der NG206 og Hdir\nskårer ulikt på et item, kan differansen ha minst to forklaringer: enten\nreell forskjell i retningslinjekvalitet, eller forskjell som skyldes at\nen bredere populasjon er vanskeligere å dokumentere like stringent. For\nenkelte items kan begge være sanne samtidig. Populasjonsbredden er ikke\ni seg selv en svakhet ved utkastet; den reflekterer et valg om å favne\nflere. Poenget er at bredden <em>skaper metodiske forpliktelser</em> som\net strengt avgrensningsvalg ikke innebærer.</p>\n<h2 id=\"d.3-domeneskårer-detaljert-oversikt\">D.3 Domeneskårer —\ndetaljert oversikt</h2>\n<p>Tabellen viser sum av item-skårer per domene, normalisert som prosent\nav maksimum. NG206 skårer høyere på alle seks AGREE-domener. Forskjellen\ner moderat i Domain 4 og substansiell i Domain 5 og 6.</p>\n<table>\n<colgroup>\n<col style=\"width: 27%\" />\n<col style=\"width: 8%\" />\n<col style=\"width: 10%\" />\n<col style=\"width: 11%\" />\n<col style=\"width: 10%\" />\n<col styl
