e=\"width: 11%\" />\n<col style=\"width: 19%\" />\n</colgroup>\n<thead>\n<tr class=\"header\">\n<th><strong>Domene</strong></th>\n<th><strong>Items</strong></th>\n<th><strong>NG206 sum</strong></th>\n<th><strong>NG206 %</strong></th>\n<th><strong>Hdir sum</strong></th>\n<th><strong>Hdir %</strong></th>\n<th><strong>Forskjell (p.p.)</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>1. Scope and Purpose</td>\n<td>1–3</td>\n<td>19/21</td>\n<td>88,9</td>\n<td>15/21</td>\n<td>66,7</td>\n<td>−22,2</td>\n</tr>\n<tr class=\"even\">\n<td>2. Stakeholder Involvement</td>\n<td>4–6</td>\n<td>18/21</td>\n<td>83,3</td>\n<td>15/21</td>\n<td>66,7</td>\n<td>−16,7</td>\n</tr>\n<tr class=\"odd\">\n<td>3. Rigour of Development</td>\n<td>7–14</td>\n<td>47/56</td>\n<td>81,3</td>\n<td>36/56</td>\n<td>58,3</td>\n<td>−23,0</td>\n</tr>\n<tr class=\"even\">\n<td>4. Clarity of Presentation</td>\n<td>15–17</td>\n<td>17/21</td>\n<td>77,8</td>\n<td>16/21</td>\n<td>72,2</td>\n<td>−5,6</td>\n</tr>\n<tr class=\"odd\">\n<td>5. Applicability</td>\n<td>18–21</td>\n<td>21/28</td>\n<td>70,8</td>\n<td>13/28</td>\n<td>37,5</td>\n<td>−33,3</td>\n</tr>\n<tr class=\"even\">\n<td>6. Editorial Independence</td>\n<td>22–23</td>\n<td>11/14</td>\n<td>75,0</td>\n<td>6/14</td>\n<td>33,3</td>\n<td>−41,7</td>\n</tr>\n</tbody>\n</table>\n<p>Dette mønstret er empirisk forenlig med at NICE har et modent\nmetodologisk apparat (PMG20, separate Evidence Reviews, Register of\nInterests, Quality Standards) som er synlig i retningslinjedokumentet,\nmens Hdir-prosessen i mindre grad er formalisert i selve\nretningslinjeteksten.</p>\n<p><em>Merk: Tallene i hoveddokumentets seksjon 2.2 har samme presisjon\n(én desimal) som tabellen over; begge bygger på samme underliggende\nskårer fra AGREE II-skåringsarket.</em></p>\n<h2 id=\"d.4-vurdering-per-domene-og-item\">D.4 Vurdering per domene og\nitem</h2>\n<h3 id=\"d.4.1-domain-1-scope-and-purpose\">D.4.1 Domain 1 — Scope and\nPurpose</h3>\n<p><strong>Domeneskår: NG206 88,9 % | Hdir 66,7 %</strong></p>\n<p><strong>Item 1 — Overall objective described</strong></p>\n<p><em>NG206: skår 6.</em> Overview-seksjonen (s. 5) gir tydelig\nformålsformulering: <em>«This guideline covers diagnosing and managing\nmyalgic encephalomyelitis (or encephalopathy)/chronic fatigue syndrome\n(ME/CFS)… It aims to improve awareness and understanding about ME/CFS\nand when to suspect it, so that people are diagnosed earlier.»</em>\nFormålet er forankret i en substansiell Context-seksjon (s. 93) som gir\nepidemiologisk forankring (prevalens ca. 250 000 i England og Wales,\nkjønnsfordeling 2,4:1, 25 % med alvorlig sykdom, livskvalitet lavere enn\nved flere andre kroniske tilstander). Trekket fra skår 7 er at\nformulerte mål er kvalitative («improve awareness») snarere enn\nkvantifiserte utfallsmål.</p>\n<p><em>Hdir: skår 5.</em> Høringsbrevets Formål-seksjon formulerer to\nmål eksplisitt: (1) at pasienter får <em>«kunnskapsbasert, individuelt\ntilpasset helsehjelp som bidrar til økt livskvalitet, mestring og\nbedring»</em>, og (2) at helsepersonell <em>«opplever å ha tydelige\nråd»</em>. Strukturen er tydelig (kulepunkt-format). Trekket fra høyere\nskår er at epidemiologisk og kontekstuell forankring på Context-nivå\n(som NG206 har) ikke er like utbygget i det tilgjengelige materialet fra\nkap. 1.</p>\n<p><strong>Item 2 — Health question(s) specifically\ndescribed</strong></p>\n<p><em>NG206: skår 6.</em> Helsespørsmålene er operasjonalisert i åtte\nseparate Evidence Reviews (A–H) med eksplisitte review-spørsmål og\nPICO-strukturerte inklusjonskriterier. Retningslinjen selv refererer til\ndisse konsekvent (<em>«Full details of the evidence and the committee’s\ndiscussion are in evidence review…»</em>). Dette gir sporbar struktur\nfra overordnet formål til spesifikke besvarelsespørsmål.</p>\n<p><em>Hdir: skår 5.</em> Retningslinjen formulerer 12 anbefalinger\nfordelt på 4 kapitler. GRADE-vurderinger er gjennomført (kap. 2), men\neksplisitte PICO-formulerte helsespørsmål i selve\nretningslinjedokumentet er mindre synlige. Formålsformuleringen fra\nhøringsbrevet og strukturen i anbefalingene indikerer indirekte hvilke\nspørsmål som er dekket.</p>\n<p><strong>Item 3 — Target population specifically\ndescribed</strong></p>\n<p><em>NG206: skår 7.</em> Populasjonen er spesifikt beskrevet med\naldersgrupper (barn, unge og voksne), adopterte diagnostiske kriterier\n(Institute of Medicine 2015, adaptert med redusert varighet og\npresiserte symptomdefinisjoner), fire nøkkelsymptomer (invalidiserende\nutmattelse, post-exertional malaise, ikke-oppfriskende søvn, kognitive\nvansker), og eksplisitt stratifisering etter alvorlighetsgrad (Box 1 s.\n7, samt dedikert seksjon 1.17 for severe og very severe). Definisjoner i\nTerms used (s. 56+) gir presis begrepsavklaring.</p>\n<p><em>Hdir: skår 5.</em> Populasjonen er bredere («langvarig\nutmattelse, inkl. ME/CFS») og inkluderer flere tilstander. Diagnostiske\nkriterier er spesifisert (Canadakriteriene for voksne ME/CFS, Jason\npediatriske kriterier for barn, WHO-definisjon og Canadakriteriene for\nPEM). Men populasjonsbredden skaper en definitorisk utfordring: hvilke\ntilstander innenfor «langvarig utmattelse» gjelder hvilke anbefalinger?\nDifferensiering mellom ME/CFS, post-viral fatigue, long covid og andre\nutmattelsestilstander er ikke like strukturert synliggjort som NG206s\nME/CFS-spesifikke tilnærming. Kriteriesettene er definert, men\noperasjonaliseringen av hvilke undergrupper som omfattes av hvilken\nanbefaling er mindre eksplisitt.</p>\n<h3 id=\"d.4.2-domain-2-stakeholder-involvement\">D.4.2 Domain 2 —\nStakeholder Involvement</h3>\n<p><strong>Domeneskår: NG206 83,3 % | Hdir 66,7 %</strong></p>\n<p><strong>Item 4 — GDG includes all relevant professional\ngroups</strong></p>\n<p><em>NG206: skår 5.</em> NICEs Committee details-side (referert i\nretningslinjen, s. 95) er offentlig tilgjengelig og angir\nkomitesammensetningen. Retningslinjen er utviklet ved National Guideline\nCentre (Royal College of Physicians). NICE har etablert praksis for\ntverrfaglig komitesammensetning. Uten direkte verifisering av committee\ndetails-dokumentet kan skåren ikke heves til 6–7; 5 reflekterer at\nprosessen er dokumentert i separate kilder men ikke direkte listet i\nhovedretningslinjen.</p>\n<p><em>Hdir: skår 6.</em> Arbeidsgruppens sammensetning er eksplisitt\nlistet i kap. 1: 21 medlemmer med profesjonskategorier spesifisert — 2\nfastleger, 3 psykologspesialister, 2 fysioterapeuter, 2 ergoterapeuter,\n2 spesialister i barnemedisin, 2 spesialister i fysikalsk medisin og\nrehabilitering, 1 helsesykepleier, 1 spesialist i infeksjonsmedisin, 1\nNAV-rådgivende overlege, samt 5 brukerrepresentanter (Recovery Norge ×\n2, ME-foreningen × 1, ME-foreldrene × 1, Norsk Covidforening × 1). I\ntillegg prosjektgruppe på 5 seniorrådgivere fra Helsedirektoratet med\njuridisk og metodisk støtte. Transparens om sammensetning er bedre\ndokumentert direkte i retningslinjen enn i NG206. Trekket fra 7 er at\nenkelte kompetanseområder som kunne vært ventet i et bredt fagfelt\n(f.eks. nevrologi, immunologi) ikke er navngitt.</p>\n<p><strong>Item 5 — Views and preferences of target population\nsought</strong></p>\n<p><em>NG206: skår 6.</em> NICEs prosess for brukerinvolvering\ninkluderer pasient- og lekrepresentanter i komiteen, og kvalitativ\nevidens om pasienterfaring som del av Evidence Reviews. NG206 refererer\neksplisitt til evidens om pasienterfaring i flere rationale-seksjoner\n(<em>«The qualitative evidence showed that people with ME/CFS have found\nCBT useful when delivered by a therapist who understands ME/CFS, but\nalso that there is the potential for harm when it is inappropriately\ndelivered»</em>). Interessentkonsultasjon er en formalisert del av\nNICE-prosessen.</p>\n<p><em>Hdir: skår 3.</em> Dette er et komplekst item. Prosedyren\neksisterer: fem brukerrepresentanter i arbeidsgruppen, brukererfaring\neksplisitt del av kunnskapsgrunnlaget (<em>«forskningslitteratur,\nklinisk erfaring og brukererfaring på en systematisk måte vurderes opp\nmot ønskede og uønskede konsekvenser av et tiltak»</em>), og FHIs\nkvalitative systematiske oversikt (Hestevik, Langøien, Bergsund 2025) er\nanvendt. Men det empiriske utfallet av prosedyren er observerbart\nproblematisk: 3 av 5 brukerrepresentanter — alle representantene fra\nME-foreningen, ME-foreldrene og Norsk Covidforening — har tatt formell\ndissens på utkastet etter publisering. De to brukerrepresentantene fra\nRecovery Norge dissenterer ikke, konsistent med organisasjonens\nrehabiliteringsorienterte perspektiv. I tillegg har fire fagdissenser\nfra arbeidsgruppen (Nerli, Herner, Jøssang, Prydz) blitt levert før\npublisering. Samlet 7/21 dissensrate fordelt på to motsatt orienterte\nblokker: fagdissensene etterlyser sterkere rehabiliteringsoptimisme,\nbrukerdissensene etterlyser tydeligere PEM-differensiering. Skåren\ngjenspeiler diskrepansen mellom prosedyre og utfall, samt den todelte\nstrukturen i uenigheten.</p>\n<p><strong>Item 6 — Target users of the guideline clearly\ndefined</strong></p>\n<p><em>NG206: skår 7.</em> Eksplisitt «Who is it for?»-seksjon s. 5\nangir tre hovedgrupper: helse- og sosialfagpersonell (inkludert dem som\njobber i eller gir innspill til utdanning og bedriftshelse),\ncommissioners, og personer med mistenkt eller diagnostisert ME/CFS og\nderes familier/omsorgspersoner. Anbefalinger gjennom hele dokumentet er\nrettet mot spesifikke profesjonsgrupper.</p>\n<p><em>Hdir: skår 6.</em> Høringsbrevets Formål angir pasienter og\nhelsepersonell. Anbefalingene er rettet mot spesifikke roller: fastlege\n(2.1, 2.3, 4.1), virksomhetsleder (3.1), kommune (3.2), spesialist i\nbarne- og ungdomsmedisin (4.2). Målgruppeidentifikasjon er tydelig i\nhver anbefaling. Trekket fra 7 er at «commissioners» eller tilsvarende\nbestillerroller ikke er like eksplisitt adressert.</p>\n<h3 id=\"d.4.3-domain-3-rigour-of-development\">D.4.3 Domain 3 — Rigour of\nDevelopment</h3>\n<p><strong>Domeneskår: NG206 81,3 % | Hdir 58,3 %</strong></p>\n<p>Dette er domenet med den største item-skårforskjellen, drevet av mer\nformalisert metodedokumentasjon i NICE-strukturen.</p>\n<p><strong>Item 7 — Systematic methods for evidence search</strong></p>\n<p><em>NG206: skår 6.</em> Retningslinjen bygger på åtte separate\nEvidence Reviews (A–H) med systematiske søkestrategier. NICE Methods\nManual (PMG20) definerer metodikk. Søkestrategier er vedlegg til hver\nEvidence Review. Selve retningslinjen refererer til disse\nkonsekvent.</p>\n<p><em>Hdir: skår 5.</em> Sitat fra kap. 1: <em>«gjennomført\nsystematiske litteratursøk på aktivitetsbaserte intervensjoner og\nkognitiv atferdsterapi. Et stort antall systematiske oversikter ble\nidentifisert. De samme primærstudiene er inkludert i de fleste av de\nsystematiske oversiktene, derfor ble de nyeste systematiske oversiktene\nav god eller moderat kvalitet inkludert.»</em> Og: <em>«Oppdatert\nlitteratursøk vil gjennomføres før endelig publisering.»</em>\nSøkestrategi er indikert men ikke spesifisert i full detalj i selve\nretningslinjen. FHIs kunnskapsoppsummering (som ligger som vedlegg til\nprosessen) inneholder mer detaljert søkemetodikk, men denne er ikke\ndirekte integrert i retningslinjedokumentet.</p>\n<p><strong>Item 8 — Criteria for selecting evidence clearly\ndescribed</strong></p>\n<p><em>NG206: skår 6.</em> Hver Evidence Review har eksplisitt\nPICO-struktur, inklusjons- og eksklusjonskriterier, og begrunnet\nseleksjon av studier.</p>\n<p><em>Hdir: skår 4.</em> Det er angitt at nyeste systematiske\noversikter av god eller moderat kvalitet ble inkludert, men formelle\ninklusjons- og eksklusjonskriterier er ikke eksplisitt listet i\nretningslinjen. Prinsippet om å bruke nyeste SR-er er metodologisk\nlegitimt, men gir mindre transparens enn NICE-modellen.</p>\n<p><strong>Item 9 — Strengths and limitations of evidence clearly\ndescribed</strong></p>\n<p><em>NG206: skår 6.</em> GRADE anvendt i Evidence Reviews.\nRationale-seksjoner diskuterer evidensens karakter eksplisitt (<em>«the\nevidence for non-pharmacological and pharmacological interventions for\nME/CFS was heterogenous and inconclusive, with limited evidence for any\nsingle intervention»</em>).</p>\n<p><em>Hdir: skår 6.</em> Eksplisitt GRADE-anvendelse. Konkrete\neffektestimater med konfidensintervaller og tillit-nivåer rapporteres\n(Hedge’s g, SMD). Eksempler fra kap. 2: utmattelse etter CBT-behandling\ng = −0,52 (KI −0,69 til −0,35), lav tillit; fysisk funksjon etter\nCBT-behandling g = 0,29 (KI 0,11 til 0,47), svært lav tillit (risiko for\nskjevhet, heterogenitet I² = 76,6 %, mangel på presisjon);\nlangtidsoppfølging fysisk funksjon g = 0,15 (KI −0,18 til 0,47), svært\nlav tillit; gradert aktivitet fysisk funksjon etter oppfølging MD =\n19,56, svært lav tillit.</p>\n<p>Eksplisitt omtale av evidensgrunnlagets begrensninger for\nPEM-populasjonen: <em>«Forskningsgrunnlaget for effekten hos pasienter\nmed PEM definert etter Canadakriteriene eller WHO, er svakt. Det er få\nidentifiserte studier.»</em> Dette er ett av få items der Hdir og NG206\nskårer likt. Utkastet har solid GRADE-anvendelse og er transparent om\nevidensens svakhet for sentrale undergrupper.</p>\n<p><strong>Item 10 — Methods for formulating recommendations clearly\ndescribed</strong></p>\n<p><em>NG206: skår 5.</em> PMG20 definerer NICEs konsensusprosess (§\n3.9). Minutes er publisert. Hver anbefaling ledsages av «Why the\ncommittee made the recommendation»-seksjon som dokumenterer komitéens\nresonnement. Fire medlemmer trakk seg fra komiteen i juli 2021 før\npublisering; dette er dokumentert i minutes men ikke diskutert i\nhovedteksten.</p>\n<p><em>Hdir: skår 4.</em> Kunnskapsbasert tilnærming er beskrevet\ngenerelt: forskningslitteratur, klinisk erfaring og brukererfaring veies\nsammen. Vekting: <em>«På områder der det er funnet mindre\nforskningsbasert kunnskap og/eller overføringsverdien fra internasjonal\ntil norsk helsetjeneste er lav, blir klinisk kunnskap og brukerkunnskap\ntillagt større vekt.»</em> Dissens kan tas, og fire fagdissenser er\nlistet i kap. 1. Trekket fra høyere skår: konsensusmetode (f.eks.\nstemmegivning, Delphi, nominell gruppeteknikk) er ikke spesifisert.\nProsedyre for håndtering av etterhåndsdissens (som faktisk inntraff —\ntre brukerrepresentanter tok dissens 26.02–03.03.2026) er ikke\nbeskrevet.</p>\n<p><strong>Item 11 — Health benefits, side effects, risks\nconsidered</strong></p>\n<p><em>NG206: skår 6.</em> Rationale and impact-seksjoner og «How the\nrecommendation might affect practice»-avsnitt adresserer risiko\nsystematisk. Eksempel: eksplisitt diskusjon av <em>«controversy over\ngraded exercise therapy had resulted in confusion over what support\nshould be available»</em> og <em>«potential for harm when CBT is\ninappropriately delivered»</em>. Post-exertional malaise er et\ngjennomgående risikobasert prinsipp i anbefalingene.</p>\n<p><em>Hdir: skår 5.</em> Begrunnelsesseksjoner for hver anbefaling. PEM\ner nevnt som sentral konsekvens av aktivitet for pasienter med ME/CFS.\nMen systematisk diskusjon av nytte-risiko per anbefaling er mindre\nsynlig enn i NG206s Rationale and impact-struktur.</p>\n<p><strong>Item 12 — Explicit link between recommendations and\nsupporting evidence</strong></p>\n<p><em>NG206: skår 7.</em> Hver anbefaling kobler eksplisitt til\nspesifikk Evidence Review: <em>«Full details of the evidence and the\ncommittee’s discussion are in evidence review G: non-pharmacological\nmanagement of ME/CFS and evidence review H: appendices…»</em> Dette gir\ndirekte sporing mellom anbefaling og evidens.</p>\n<p><em>Hdir: skår 5.</em> Begrunnelser refererer til FHIs\nkunnskapsoppsummering og spesifikke studier (Casson et al. 2023, Maas et\nal. 2024, Kuut et al. 2023 og 2024, Nerli et al. 2024, Kong et al. 2023,\nSamper-Pedro et al. 2023, Zeraatkar et al. 2024). Men koblingen mellom\nspesifikke anbefalinger og spesifikke studier er mindre systematisk.\nPopulasjonsbredden skjerper denne utfordringen: når anbefalingen gjelder\nhele «langvarig utmattelse»-populasjonen, men den siterte evidensen er\nfra studier med ulike populasjoner (noen med PEM-krav, andre uten), blir\nmanglende eksplisitt kobling særlig betydningsfull.</p>\n<p><strong>Item 13 — Externally reviewed by experts prior to\npublication</strong></p>\n<p><em>NG206: skår 6.</em> NICEs formelle\ninteressentkonsultasjonsprosess. Consultation-dokumenter publisert.\nRespons på innspill dokumentert.</p>\n<p><em>Hdir: skår 4.</em> Høringen pågår på vurderingstidspunktet (frist\n4. mai 2026). Prosedyren er godt dokumentert: tre innsendingsperioder\n(frem til 2. mars, 2.–18. mars, 18. mars–8. april), alle høringsinnspill\ntilgjengelige i Excel/ZIP-format på høringssiden. Dette er positivt for\nprosessuell transparens. Trekket fra høyere skår: utfallet av høringen\nkan ikke vurderes før etter fristen. I tillegg er det en observerbar\nintern uenighet som kan karakteriseres som signal om utkastets kvalitet:\n7 arbeidsgruppemedlemmer har tatt formell dissens. Dette er ikke ekstern\nreview i egentlig forstand (de er arbeidsgruppemedlemmer), men det er en\nobserverbar indikator på at intern review ikke produserte konsensus.</p>\n<p><strong>Item 14 — Procedure for updating provided</strong></p>\n<p><em>NG206: skår 5.</em> NG206 erstattet CG53 (publisert august 2007),\nmed et oppdateringsintervall på ca. 14 år. NICE har standardisert\nprosedyre for surveillance review. I selve retningslinjen er prosedyre\nfor fremtidige oppdateringer implisitt gjennom NICE-strukturen, ikke\neksplisitt spesifisert.</p>\n<p><em>Hdir: skår 3.</em> Kap. 1 angir: <em>«Oppdatert litteratursøk vil\ngjennomføres før endelig publisering (etter ekstern høring), for å sikre\nat nyere forskning fanges opp.»</em> Dette gjelder denne revisjonens\nferdiggjøring, ikke fremtidige oppdateringer av endelig retningslinje.\nProsedyre for fremtidige oppdateringer (tidshorisont, ansvarlig,\nkriterier for oppdatering) er ikke identifisert. Utkaststatus gjør dette\nforståelig men ikke fraværet eksonert — mange retningslinjer inkluderer\noppdateringsplan allerede i utkastsform.</p>\n<h3 id=\"d.4.4-domain-4-clarity-of-presentation\">D.4.4 Domain 4 — Clarity\nof Presentation</h3>\n<p><strong>Domeneskår: NG206 77,8 % | Hdir 72,2 %</strong></p>\n<p>Dette er domenet med minst forskjell mellom retningslinjene. Begge\nhar etablerte og profesjonelle presentasjonsformater.</p>\n<p><strong>Item 15 — Recommendations specific and\nunambiguous</strong></p>\n<p><em>NG206: skår 6.</em> Anbefalingene er nummererte med hierarkisk\nstruktur (1.1.1, 1.11.3, 1.17.1). NICE bruker standardisert\nspråkmarkering for styrke: Making decisions using NICE guidelines\nforklarer hvordan ordvalg signaliserer styrke/certainty. Anbefalingene\ner presise og handlingsrettede.</p>\n<p><em>Hdir: skår 6.</em> 12 anbefalinger med tydelig styrkemarkering\ndefinert i kap. 1: «skal» (lovregulert eller så klart faglig forankret\nat det sjelden er forsvarlig å fravike), «bør»/«anbefaler» (sterk\nanbefaling), «kan»/«foreslår» (svak anbefaling). Eksempel: <em>«2.4 For\ndiagnostisering av ME/CFS hos voksne anbefales Canadakriteriene.»</em>\nHandlingsrettet og entydig. Standardisert struktur (Anbefaling →\nPraktisk informasjon → Begrunnelse) bidrar til tydelighet.</p>\n<p><strong>Item 16 — Different management options clearly\npresented</strong></p>\n<p><em>NG206: skår 5.</em> Flere områder diskuterer alternativer: energy\nmanagement-prinsipper med ulike komponenter, CBT som støttende\nintervensjon (ikke kur), alvorlighetsdifferensierte tiltak. For noen\nområder (f.eks. eksplisitt fjerning av GET som anbefaling) er det én\nanbefaling.</p>\n<p><em>Hdir: skår 4.</em> Anbefaling 2.5 «aktivitetsregulering» er\noverordnet; GRADE-vurderingene i kap. 2 omtaler både pacing og gradert\naktivitet som separate tilnærminger, men anbefalingen selv skiller ikke\neksplisitt mellom alternativene. Dette kan være bevisst (for å unngå\npreskriptiv detaljering), men gjør sammenligning av alternativer mindre\nsynlig for brukeren av retningslinjen.</p>\n<p><strong>Item 17 — Key recommendations easily\nidentifiable</strong></p>\n<p><em>NG206: skår 6.</em> Visuell struktur med bokser (Box 1 Severity,\nBox 5 CBT), dedikert Key recommendations for research-seksjon (s. 62),\nog klar numerisk hierarki. Anbefalinger for «Care for people with severe\nor very severe ME/CFS» plassert i egen seksjon <em>«to make sure they\ncould be easily found within the guideline»</em>.</p>\n<p><em>Hdir: skår 6.</em> 12 anbefalinger i standardisert layout.\nKapittelvis nummerering (2.1–2.6, 3.1–3.2, 4.1–4.4) gjør navigering\nenkel. Normeringsnivå markert i hver anbefaling.</p>\n<h3 id=\"d.4.5-domain-5-applicability\">D.4.5 Domain 5 —\nApplicability</h3>\n<p><strong>Domeneskår: NG206 70,8 % | Hdir 37,5 %</strong></p>\n<p>Dette er den nest største skårforskjellen. NICE-modellen er\nomfattende utviklet på implementeringssiden; utkastet er mindre utbygget\nher.</p>\n<p><strong>Item 18 — Facilitators and barriers described</strong></p>\n<p><em>NG206: skår 6.</em> How the recommendation might affect\npractice-seksjoner adresserer dette eksplisitt. Eksempler: <em>«Training\nand education in ME/CFS are not widespread and this will be a change in\npractice»</em>, <em>«current provision of ME/CFS specialist teams is\nvery uneven across the country and increased staffing may be needed in\nsome areas»</em>, <em>«Allocating a single point of contact to people\nwith ME/CFS is not routine practice across the NHS»</em>.</p>\n<p><em>Hdir: skår 4.</em> Implementeringsdiskusjon er mindre eksplisitt.\nHøringsbrevet ber om forslag til implementeringstiltak, som signaliserer\nat dette er et område der dokumentet ønsker innspill. Barrierer og\nfasiliteringer er adressert i begrunnelsesfeltene per anbefaling, men\nikke like systematisk.</p>\n<p><strong>Item 19 — Advice and/or tools for implementation</strong></p>\n<p><em>NG206: skår 6.</em> <em>«NICE has produced tools and resources to\nhelp you put this guideline into practice»</em> (s. 95). Omfattende\nverktøy-base på NICE-nettsted. Pasientinformasjon, beslutningsstøtte,\nauditverktøy.</p>\n<p><em>Hdir: skår 4.</em> Praktisk informasjon-seksjoner i hver\nanbefaling gir eksempler på gjennomføring. Struktur: <em>«Praktisk\ninformasjon beskriver hvordan anbefalingen kan gjennomføres i praksis\neller eksempler på mulig innhold.»</em> Men eksterne verktøy,\nsjekklister og beslutningsalgoritmer er ikke identifisert som vedlegg i\ntilgjengelig materiale.</p>\n<p><strong>Item 20 — Resource implications considered</strong></p>\n<p><em>NG206: skår 5.</em> Systematisk diskutert i How the\nrecommendations might affect practice-seksjoner. Eksempler: <em>«there\nwill be a resource impact from the cost of providing this\ntraining»</em>, <em>«There may be an increased number of home visits for\npeople with severe or very severe ME/CFS. However, this will provide\nequity of access to care for this group who are usually\nhousebound»</em>. Ikke kvantifiserte helseøkonomiske analyser i selve\nretningslinjen, men systematisk kvalitativ vurdering.</p>\n<p><em>Hdir: skår 3.</em> Ressursspørsmål er implisitte i flere\nbegrunnelser, men formelle ressursestimater eller systematisk kvalitativ\nressursvurdering er lite synlig.</p>\n<p><strong>Item 21 — Monitoring and/or auditing criteria\npresented</strong></p>\n<p><em>NG206: skår 4.</em> NICE publiserer Quality Standards separat som\nkoblet til retningslinjen (etablert NICE-modell). I selve retningslinjen\ner monitoring/audit-kriterier ikke eksplisitte.</p>\n<p><em>Hdir: skår 2.</em> Monitoring- eller auditkriterier er ikke\nidentifisert i det tilgjengelige materialet. Ingen eksplisitte\nkvalitetsindikatorer knyttet til anbefalinger.</p>\n<h3 id=\"d.4.6-domain-6-editorial-independence\">D.4.6 Domain 6 —\nEditorial Independence</h3>\n<p><strong>Domeneskår: NG206 75,0 % | Hdir 33,3 %</strong></p>\n<p>Den største domeneforskjellen. Domenet er substansielt påvirket av at\ninnsynsavhengige materialer ikke er tilgjengelige for\nHdir-vurderingen.</p>\n<p><strong>Item 22 — Views of funding body have not influenced\ncontent</strong></p>\n<p><em>NG206: skår 5.</em> NICE er et offentlig eksekutivt organ\n(executive non-departmental public body) med etablert metodologisk\nuavhengighet beskyttet i PMG20. Ingen eksplisitt erklæring om at\nfinansieringskildens synspunkter ikke har påvirket innhold er direkte\nsitert i retningslinjen, men NICE-strukturen er allment akseptert som\nmetodologisk uavhengig.</p>\n<p><em>Hdir: skår 3.</em> Helsedirektoratet er retningslinjens utgiver.\nOppdragsgiver er Helse- og omsorgsdepartementet. Oppdraget er\ndokumentert i departementets tildelingsbrev for 2026, side 30.\nDokumentet er offentlig tilgjengelig, men er ikke referert eller sitert\ni retningslinjen. Saksnummer 24/13487 som Helsedirektoratet har oppgitt\ni høringsinvitasjonen refererer til Hdirs interne høringssak, ikke til\noppdraget fra departementet.</p>\n<p><strong>Substansielt tittelavvik mellom oppdrag og\nleveranse.</strong> Tildelingsbrevet oppdrar <em>«Nasjonal faglig\nretningslinje for langvarig utmattelse av uklar årsak, inkludert\nCFS/ME»</em>. Høringsutkastet har tittelen <em>«Nasjonal faglig\nretningslinje for langvarig utmattelse, inkl. ME/CFS»</em> — uten\nkvalifikasjonen «av uklar årsak». Kvalifikasjonen er altså fjernet under\nutarbeidelsen. Dette er en redaksjonell endring som potensielt utvider\nscope fra medisinsk uforklart utmattelse til all langvarig utmattelse,\nog som ikke er forklart eller drøftet i retningslinjen.</p>\n<p><strong>Institusjonell kontekst fra oppdraget som ikke er omtalt i\nretningslinjen.</strong> Oppdragsteksten begrunner oppdraget eksplisitt\nmed tre formål: (1) <em>«faglig grunnlag for et ev. fremtidig nasjonalt\npasientforløp»</em>; (2) <em>«faglig grunnlag for virksomheten i en\nnasjonal kompetansetjeneste for utmattelsestilstander»</em> (ny bredere\ntjeneste); (3) <em>«pågående prosess for avvikling og omorganisering av\nden nasjonale kompetansetjenesten for CFS/ME»</em>. Disse\ninstitusjonelle koblingene — særlig avviklingen av\nCFS/ME-kompetansetjenesten og etableringen av en ny\nutmattelseskompetansetjeneste — er vesentlig kontekst for å forstå\nhvorfor populasjonen er utvidet. Retningslinjen omtaler ikke denne\nkoblingen.</p>\n<p>Ingen eksplisitt erklæring om metodologisk uavhengighet fra\ndepartementet er identifisert i retningslinjen. Skåren gjenspeiler at\nretningslinjens egen dokumentasjon av oppdragsforholdet er ufullstendig\n— det betyr ikke at den faglige uavhengigheten nødvendigvis er svekket.\nPoenget er at leseren av retningslinjen ikke kan vurdere oppdragets\ninnhold fra retningslinjen alene. Full oppdragstekst er gjengitt i\nVedlegg A.</p>\n<p><strong>Item 23 — Competing interests of GDG members recorded and\naddressed</strong></p>\n<p><em>NG206: skår 6.</em> NICE Register of Interests er publisert\n(datert 29.10.2021, 1,12 MB). NICE har formalisert policy for håndtering\nav interessekonflikter (PMG20). Individuelle interesser per komitemedlem\ner offentlig tilgjengelige i registeret.</p>\n<p><em>Hdir: skår 3.</em> Kap. 1 gir verbal beskrivelse:\n<em>«Arbeidsgruppemedlemmer har fylt ut Helsedirektoratets\nhabilitetsskjema. Intellektuelle eller finansielle interesser som\npotensielt kan påvirke arbeidet er lagt frem for de andre deltakerne i\narbeidsgruppen. Ingen interesser med konsekvenser for deltakelse i\narbeidet er identifisert. Medlemmer i arbeidsgruppa var ikke tilstede\nved diskusjoner om artikler der de selv er medforfattere.»</em>\nTilleggsnote: <em>«Det er sjelden deltakere ekskluderes fra\nHelsedirektoratets retningslinjeutvikling på grunn av inhabilitet.»</em>\nProsessen er beskrevet, men individuelle habilitetsskjemaer for de 21\nmedlemmene er ikke offentlig publisert. Forskjellen mot NICE Register of\nInterests er substansiell: NICE gir full transparens per medlem, Hdir\ngir en samlet verbal erklæring. For Item 23 er dette en strukturell\ndokumentasjonsforskjell.</p>\n<h2 id=\"d.5-samlet-vurdering-overall-assessment\">D.5 Samlet vurdering\n(Overall Assessment)</h2>\n<h3 id=\"d.5.1-oa1-rate-the-overall-quality-of-this-guideline\">D.5.1 OA1\n— Rate the overall quality of this guideline</h3>\n<p><strong>NG206: 6 (høy kvalitet).</strong> Velintegrert metodologisk\napparat (Evidence Reviews, PMG20, Register of Interests, Quality\nStandards), tydelig kobling mellom evidens og anbefalinger, eksplisitt\nrisikodiskusjon, god kontekstuell forankring. Trekket fra 7 er at\nenkelte områder (ressursvurdering, monitoring-kriterier) ikke er like\nformaliserte som hovedmetodologien.</p>\n<p><strong>Hdir: 4 (moderat kvalitet).</strong> Substansielle kvaliteter\npå enkelte punkter — eksplisitt GRADE-anvendelse, transparent\narbeidsgruppesammensetning, tydelig anbefalingsstruktur med etablert\nnormeringshierarki, norsk rettslig kontekstualisering. Men substansielle\nsvakheter på interessentprosessen (3 av 5 brukerrepresentanter har tatt\nformell dissens), Domain 5 Applicability (mangler verktøy, monitoring,\nressursestimater) og Domain 6 Editorial Independence (begrenset\noffentlig dokumentasjon av individuelle interesser og av\nrevisjonsoppdragets innhold). At dokumentet er et høringsutkast under\naktiv revisjon gjør noe av dette forståelig, men fraværet av\napplicability- og monitoring-elementer er substansielt.</p>\n<h3 id=\"d.5.2-oa2-would-recommend-this-guideline-for-use\">D.5.2 OA2 —\nWould recommend this guideline for use</h3>\n<p><strong>NG206: Yes.</strong> Retningslinjen er metodologisk solid,\ninternt konsistent og gir operasjonaliserbare anbefalinger. Den er bredt\nreferert i internasjonal metode- og klinisk litteratur.</p>\n<p><strong>Hdir: Yes, with modifications.</strong> Utkastet har\nsubstansielle kvaliteter og kan rimelig fungere som fagnorm etter\nmodifikasjoner. Følgende modifikasjoner ville heve skåren på flere\ndomener:</p>\n<ul>\n<li>Eksplisitt håndtering av etterhåndsdissensene fra\nbrukerrepresentantene i retningslinjens kap. 1, parallelt med hvordan\nfagdissensene er håndtert, med synliggjøring av at arbeidsgruppen har\ntodelt uenighet <em>(Item 5, 10, 11)</em></li>\n</ul>\n<ul>\n<li>Offentliggjøring av individuelle habilitetsskjemaer i tilsvarende\nformat som NICE Register of Interests <em>(Item 23)</em></li>\n</ul>\n<ul>\n<li>Publisering av dokumentasjon om revisjonsoppdraget, eller eksplisitt\nerklæring i retningslinjen om oppdragets innhold <em>(Item 22)</em></li>\n</ul>\n<ul>\n<li>Eksplisitt differensiering i hver anbefaling mellom hvilke\ndiagnostiske undergrupper anbefalingen hviler på solid evidens for, og\nhvilke den er ekstrapolert til <em>(Item 3, 12)</em></li>\n</ul>\n<ul>\n<li>Utvikling av oppdateringsprosedyre for fremtidige revisjoner\n<em>(Item 14)</em></li>\n</ul>\n<ul>\n<li>Utvikling av implementeringsverktøy, monitoring-kriterier og\nressursestimater <em>(Domain 5)</em></li>\n</ul>\n<p>Dette er ikke endringer i det faglige innholdet, men dokumentasjons-\nog prosessuelle endringer som vil styrke retningslinjens transparens og\nanvendbarhet. Disse er identiske med de syv innspillspunktene i\nhoveddokumentets seksjon 3.</p>\n<h2 id=\"d.6-begrensninger-ved-denne-analysen\">D.6 Begrensninger ved\ndenne analysen</h2>\n<p><strong>Enkeltanalytiker.</strong> Som nevnt i D.2.2: én strukturert\nlesning, ikke flere uavhengige vurderere. Observasjoner skal leses som\nveiledende.</p>\n<p><strong>AGREE II måler rapportering, ikke nødvendigvis underliggende\nkvalitet.</strong> Det er prinsipielt mulig for en retningslinje å være\nmetodologisk robust uten at det er fullstendig dokumentert i selve\nretningslinjeteksten. For Hdir-utkastet kan enkelte skåreforskjeller mot\nNG206 reflektere dette: prosessen kan være solid, selv om den ikke er\nbeskrevet i detalj i retningslinjedokumentet.</p>\n<p><strong>Populasjonsforskjell.</strong> Som beskrevet i D.2.3: NG206s\navgrensning til ME/CFS og Hdir-utkastets bredere scope skaper ulike\nmetodologiske forpliktelser. Direkte skåresammenligning må tolkes med\ndenne forskjellen i mente.</p>\n<p><strong>Utkaststatus.</strong> Observasjoner om Item 13 (ekstern\nfagfellevurdering) og Item 14 (oppdateringsprosedyre) kan endre seg\nmellom høringsutkast og endelig retningslinje.</p>\n<p><strong>Ikke-konsulterte kilder.</strong> Analysen forutsetter at\nenkelte innsynsavhengige dokumenter ikke er offentlig publisert — særlig\nindividuelle habilitetsskjemaer for de 21 arbeidsgruppemedlemmene.\nDersom disse senere publiseres, kan skår på Item 23 revurderes.</p>\n<p>─────────────────────────────────────────────────</p>\n<h1\nid=\"vedlegg-e-evolusjonsnotat-norsk-og-britisk-retningslinjetradisjon-20062026\">VEDLEGG\nE — Evolusjonsnotat: norsk og britisk retningslinjetradisjon\n2006–2026</h1>\n<h2 id=\"e.1-om-dette-vedlegget\">E.1 Om dette vedlegget</h2>\n<p>Dette vedlegget supplerer AGREE II-evalueringen (Vedlegg D) med\nhistorisk kontekst. Det er en kvalitativ parallellanalyse av hvordan\nNorge og Storbritannia har utviklet sin ME/CFS-retningslinjepraksis over\nen 20-års periode (2006–2026). Fem nasjonale dokumenter er sammenlignet\ndiakront: Kunnskapssenter-rapporten (2006), NICE CG53 (2007),\nHelsedirektoratets veileder IS-1944 (2014), NICE NG206 (2021) og\nHelsedirektoratets høringsutkast (2026).</p>\n<p>Formålet er å gi leseren kontekst for å forstå hvor dagens norske\nutkast plasserer seg i en lengre utviklingslinje — både i eget land og i\nsammenligning med britisk praksis. Flere observasjoner i hoveddokumentet\n(særlig om populasjonsvalg, dissenshåndtering og metodisk modenhet) får\nsin fulle betydning først når den diakrone konteksten trekkes inn.</p>\n<h2 id=\"e.2-metodologiske-forbehold\">E.2 Metodologiske forbehold</h2>\n<h3 id=\"e.2.1-hvorfor-parallell-ikke-sekvensiell\">E.2.1 Hvorfor\nparallell, ikke sekvensiell</h3>\n<p>Notatet er strukturert som parallellanalyse — norsk og britisk\nutvikling behandles ved siden av hverandre, ikke land for land\nsekvensielt. Begrunnelsen er at sammenligningen mellom to samtidige\nutviklingslinjer er hovedanalysen; hvert enkelt lands utvikling er\nbygget inn i den parallelle strukturen.</p>\n<p>Dette gir tre analytiske fordeler: <em>(i)</em>\n<strong>Kontrollgruppe-logikk</strong> — når to sammenlignbare\nhelsesystemer møter samme fagfelt over samme tid, tydeliggjør\nsammenligningen hva som er strukturelt (til stede i begge land) og hva\nsom er idiosynkratisk (bare i ett land). <em>(ii)</em>\n<strong>Tempo-observasjon</strong> — hvor raskt eller langsomt et land\nendrer standpunkt, får mening først i sammenligning med et annet land\nsom stilles overfor samme evidens. <em>(iii)</em>\n<strong>Divergens-identifikasjon</strong> — punkter der landene bryter\nmed hverandre får særlig analytisk vekt; de peker mot beslutninger som\nikke er tvunget av evidens alene, men av institusjonelle, kulturelle\neller strukturelle valg.</p>\n<h3 id=\"e.2.2-asymmetri-i-dokumentgenerasjoner\">E.2.2 Asymmetri i\ndokumentgenerasjoner</h3>\n<p>Norge har tre dokumenter i perioden (2006, 2014, 2026). UK har to\n(2007, 2021). Kunnskapssenter-rapporten (2006) og CG53 (2007) er nært\nsamtidige og sammenlignes direkte på utgangspunktet. 2014-veilederen er\nen norsk mellomgenerasjon uten UK-parallell. NG206 (2021) og\nHdir-utkastet (2026) er nåværende generasjon med fem års forsinkelse i\nNorge. Fraværet av UK-mellomgenerasjon er i seg selv en substansiell\nobservasjon: UK gikk fra 2007 til 2021 uten revisjon, mens Norge hadde\nén i mellom. Dette kan peke mot ulike institusjonelle tempo eller\nprioriteringer.</p>\n<h3 id=\"e.2.3-kategoriforskjeller\">E.2.3 Kategoriforskjeller</h3>\n<p>Dokumentene er ikke av samme type:</p>\n<table>\n<colgroup>\n<col style=\"width: 7%\" />\n<col style=\"width: 9%\" />\n<col style=\"width: 36%\" />\n<col style=\"width: 46%\" />\n</colgroup>\n<thead>\n<tr class=\"header\">\n<th><strong>År</strong></th>\n<th><strong>Land</strong></th>\n<th><strong>Dokument</strong></th>\n<th><strong>Kategori</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>2006</td>\n<td>Norge</td>\n<td>Kunnskapssenter-rapport nr 9</td>\n<td>Health Technology Assessment (kunnskapsoppsummering)</td>\n</tr>\n<tr class=\"even\">\n<td>2007</td>\n<td>UK</td>\n<td>NICE CG53</td>\n<td>Klinisk retningslinje</td>\n</tr>\n<tr class=\"odd\">\n<td>2014</td>\n<td>Norge</td>\n<td>Nasjonal veileder IS-1944</td>\n<td>Veileder</td>\n</tr>\n<tr class=\"even\">\n<td>2021</td>\n<td>UK</td>\n<td>NICE NG206</td>\n<td>Klinisk retningslinje</td>\n</tr>\n<tr class=\"odd\">\n<td>2026</td>\n<td>Norge</td>\n<td>Hdir høringsutkast</td>\n<td>Nasjonal faglig retningslinje (utkast)</td>\n</tr>\n</tbody>\n</table>\n<p>Kunnskapssenter-rapporten er strengt tatt ikke en retningslinje, men\nrapportens anbefalinger dannet grunnlag for faktisk klinisk praksis i\nNorge og ble tolket som normative av både forvaltning og domstoler. CG53\ner en fullverdig klinisk retningslinje fra begynnelsen. I praksis\nfungerte 2006-rapporten som de facto retningslinje for norsk klinisk\npraksis frem til 2014-veilederen. Analysen behandler derfor rapporten\nsom funksjonell ekvivalent til retningslinje, med den formelle\nkategoriforskjellen som eksplisitt forbehold.</p>\n<h3 id=\"e.2.4-metodiske-begrensninger\">E.2.4 Metodiske\nbegrensninger</h3>\n<p><strong>Enkeltanalytiker.</strong> Én strukturert lesning, ikke flere\nuavhengige vurderere. Observasjoner skal leses som veiledende.</p>\n<p><strong>Asymmetrisk kildebasis.</strong> For enkelte prosessuelle\nspørsmål (f.eks. interessentkonsultasjon, habilitetsregistre) er\ndokumentasjonen for norsk side (via offentlige publikasjoner og\ninnsynsdokumentasjon) bedre enn tilsvarende UK-prosessdokumentasjon.</p>\n<p><strong>Utkaststatus for 2026.</strong> Norsk 2026-dokument kan\nendres før endelig publisering.</p>\n<p><strong>Ikke AGREE II-skåring.</strong> Dette er bevisst — parallell\ndiakron analyse krever andre rammer enn synkron\nretningslinjeevaluering.</p>\n<h2 id=\"e.3-landenes-utgangspunkt-ca.-20062007\">E.3 Landenes\nutgangspunkt ca. 2006–2007</h2>\n<h3 id=\"e.3.1-norge-2006-kunnskapssenter-rapport-nr-9\">E.3.1 Norge 2006\n— Kunnskapssenter-rapport nr 9</h3>\n<p><strong>Mandat og oppdrag.</strong> Sosial- og helsedirektoratet ba\n23. august 2004 Nasjonalt kunnskapssenter om å <em>«foreta en\nkunnskapsgjennomgang (oppsummering) av det vitenskapelige grunnlaget for\ndiagnostikk og behandling av postviralt/kronisk\nutmattelsessyndrom.»</em> Oppdraget ble orientert om i Stortingets\nspørretime 13. desember 2004 — politisk forankret og offentlig\nannonsert.</p>\n<p><strong>Organisering.</strong> Utredningsgruppe på 10 medlemmer ledet\nav Vegard Bruun Wyller (Rikshospitalet-Radiumhospitalet), solid\nforankret i akademisk klinisk medisin. Separat brukergruppe med\nrepresentanter fra Norges ME-forening og MENiN.</p>\n<p><strong>Hovedkonklusjoner.</strong> Kognitiv atferdsterapi «syntes å\ngi bedre fysisk funksjon og livskvalitet, men det var usikkert om\nbehandlingen påvirket mental helse». Gradert treningsterapi «syntes å\nredusere utmattelse, men hadde ingen dokumentert effekt på depresjon\neller livskvalitet. Frafallet var stort». Utmattelse var ikke brukt som\nutfallsmål i CBT-studiene — dokumentert i rapportens egne\nGRADE-tabeller. Ingen studier undersøkte de aller sykeste. Norsk\nhelsetilbud beskrevet som utilstrekkelig.</p>\n<p><strong>Brukerdissens.</strong> Norges ME-forening trakk seg fra\nbrukergruppen i sluttfasen. MENiN leverte et 15-siders kritisk vedlegg\nsom ble integrert i rapporten 26. september 2006. Vedlegget kritiserte\nprimært CBT og GET som egnede behandlingsformer, og påpekte at\nrapportens tolkning var problematisk. Dette ble illustrert ved en\nTrygderetts-dom 26. juni 2006 — 17 dager etter lansering — som brukte\nrapporten til å avslå en søknad om ung ufør.</p>\n<h3 id=\"e.3.2-uk-2007-nice-cg53\">E.3.2 UK 2007 — NICE CG53</h3>\n<p><strong>Mandat og oppdrag.</strong> NICE utviklet CG53 gjennom sitt\nstandardiserte Guideline Development Group-format. Retningslinjen ble\nutviklet ved National Collaborating Centre for Primary Care og publisert\n22. august 2007.</p>\n<p><strong>Organisering.</strong> Guideline Development Group med\ntverrfaglig sammensetning, inkludert dedikerte helseøkonomer (Richard\nNorman frem til juli 2006, Stefanie Kuntze fra desember 2006). Dette\nviser at NICE hadde helseøkonomisk analyse som standard del av\nprosessen. Omfattende interessentkonsultasjon.</p>\n<p><strong>Hovedkonklusjoner — behandling.</strong> CG53s sentrale\nbehandlingsanbefaling (1.6.2.4) var bemerkelsesverdig tydelig formulert:\n<em>«Cognitive behavioural therapy (CBT) and/or graded exercise therapy\n(GET) should be offered to people with mild or moderate CFS/ME and\nprovided to those who choose these approaches, because currently these\nare the interventions for which there is the clearest research evidence\nof benefit.»</em></p>\n<p>Dette er en «should be offered»-anbefaling, som i NICE-terminologi\nsignaliserer en sterk anbefaling. Dette skiller CG53 fra\nKunnskapssenter-rapporten: mens den norske oppsummeringen var mer varsom\n(«syntes å gi», «usikkert om»), var NICE-retningslinjen mer normativ\n(«should be offered»). Det er en substansiell forskjell i hvordan samme\nevidensgrunnlag ble tolket.</p>\n<p><strong>Alvorlig syke.</strong> CG53 hadde egen seksjon 1.9 <em>Key\nprinciples of care for people with severe CFS/ME</em>. Sentralt og\nkontroversielt: anbefaling 1.9.3.1 sa at aktivitetsprogram for alvorlig\nsyke <em>«may incorporate the elements of recommendation 1.6.2.22 and\ndraw on the principles of CBT and GET»</em>. CG53 anbefalte altså\nCBT/GET-prinsipper også for alvorlig syke.</p>\n<p><strong>Research recommendations.</strong> CG53 erkjente eksplisitt\nkunnskapshull i seksjon 4.1: <em>«Are intervention strategies that have\nbeen shown to be effective in mildly to moderately affected adults also\neffective in children and in people (adults and children) with severe\nCFS/ME? […] Some patient experience suggests that some of these\ninterventions may be harmful and/or not effective.»</em> Formuleringen\ner et forvarsel om den kritikken som skulle vokse frem og som til slutt\nførte til NG206s brudd i 2021.</p>\n<h3 id=\"e.3.3-komparativ-observasjon-utgangspunktet\">E.3.3 Komparativ\nobservasjon — utgangspunktet</h3>\n<p><strong>Konvergens ved utgangspunktet.</strong> Begge land hvilte på\nomtrent samme evidensbase (RCT-er primært fra UK og Australia). Begge\nidentifiserte CBT og GET som de mest studerte intervensjonene. Begge\nerkjente kunnskapshull om alvorlig syke. Begge behandlet CFS/ME som\nspesifikk tilstand, ikke «langvarig utmattelse» bredt.</p>\n<p><strong>Divergens ved utgangspunktet.</strong> Tre viktige\nforskjeller: <em>(i)</em> <strong>Grad av normativ styrke</strong> —\nCG53 «should be offered» mot rapportens «syntes å gi». Samme evidens,\nulik institusjonell oversettelse. <em>(ii)</em> <strong>Formalisering av\nprosessen</strong> — NICE hadde etablert metodeapparat (Guideline\nDevelopment Group, egen helseøkonom, standardisert\ninteressentkonsultasjon). Kunnskapssenter-rapporten var et\nenkeltprosjekt uten tilsvarende infrastruktur. <em>(iii)</em>\n<strong>Håndtering av brukerdissens</strong> — 2006-rapporten integrerte\nMENiN-vedlegget fysisk i dokumentet. CG53s prosess hadde\ninteressentkonsultasjon, men ingen eksplisitt brukerdissens-vedlegg av\ntilsvarende type.</p>\n<p><strong>Observasjon om konsekvenser.</strong> CG53s sterkere\nanbefaling fikk større implementeringskonsekvenser i UK — CBT og GET ble\nstandardbehandling gjennom NHS. Dette skapte et større kontroversfelt\nenn i Norge, og dermed også et større trykk for revisjon frem mot\n2021.</p>\n<h2 id=\"e.4-norsk-mellomfase-2014-veilederen\">E.4 Norsk mellomfase —\n2014-veilederen</h2>\n<p>UK hadde ingen retningslinjerevisjon mellom 2007 og 2021. Dette er en\n14-års periode uten oppdatert offentlig anbefaling. Norge hadde én i\nmellom.</p>\n<p><strong>Hva 2014 videreførte fra 2006.</strong> Inkluderte ingen ny\nkunnskapsoppsummering, men pekte til 2011-sammenfatningen fra\nKunnskapssenteret. Beholdt pluralistisk tilnærming til diagnosekriterier\n(Fukuda, Canada, Jason pediatriske). Fortsatte å identifisere «Pasienter\nmed CFS/ME» som målgruppe (altså ME/CFS-spesifikk, ikke bredere\nutmattelse).</p>\n<p><strong>Hva 2014 brøt med.</strong> CBT-språket moderert fra «best\ndokumentert effekt» (2006) til «nyttig supplement for noen pasienter»\n(2014). Pacing/aktivitetsavpasning gitt mer plass, beskrevet som egen\ntilnærming, ikke bare som del av CBT/GET. Kapittel 3.9 introduserte ti\neksempler for alvorlig syke med spesifikke anbefalinger om skjerming for\nlyd, lys og berøring — omstridt da det kom, modifisert i 2015.</p>\n<p><strong>2015-revisjonen.</strong> Innspillsrunden høsten 2014 førte\ntil revisjon publisert mai 2015. Endringer ble markert i kursiv. Dette\ner et dokumentert eksempel på at Helsedirektoratet har fulgt opp kritikk\nmed faktisk revisjon, med ca. ett års syklus fra innspill til oppdatert\ndokument. Det er en responstid som er relevant å ta i betraktning når\n2026-prosessen vurderes.</p>\n<p><strong>Hvorfor Norge hadde mellomgenerasjon.</strong> Mulige\nfaktorer: etablering av Nasjonal kompetansetjeneste for CFS/ME ved OUS\n(2012) skapte behov for klinisk veiledning; SINTEFs statusgjennomgang\n(2010) dokumenterte utilstrekkelig tilbud; 2011-sammenfatningen fra\nKunnskapssenteret ga nytt kunnskapsgrunnlag; UK hadde allerede CG53 som\netablert rammeverk der endring ville krevd substansiell revisjon.</p>\n<h2 id=\"e.5-landenes-nåværende-generasjon-20212026\">E.5 Landenes\nnåværende generasjon — 2021/2026</h2>\n<h3 id=\"e.5.1-uk-2021-nice-ng206\">E.5.1 UK 2021 — NICE NG206</h3>\n<p><strong>Bruddet med CG53.</strong> NG206 (publisert 29. oktober 2021)\nrepresenterte et tydelig brudd med CG53: graded exercise therapy ble\nfjernet som anbefaling, og CBT ble omdefinert fra behandling til\nstøttende intervensjon. Institute of Medicine 2015-kriterier ble\nadoptert i adaptert form. En egen seksjon for severe og very severe\nME/CFS (1.17) ble etablert, med risikovurdering før hver klinisk\ninteraksjon.</p>\n<p><strong>Kontroverstrekk.</strong> Fire komitémedlemmer trakk seg fra\nkomiteen i juli 2021 før publisering. Publiseringen ble utsatt. NICE\nvalgte å dokumentere tilbaketrekkingen i Minutes, men ikke som formelle\ndissenser i retningslinjen. NG206 representerer derfor et dobbelt brudd:\nfaglig (med CG53-anbefalingene) og institusjonelt (med deler av\nkomiteen).</p>\n<p><strong>Metodisk infrastruktur.</strong> Åtte separate Evidence\nReviews (A–H) med eksplisitte søkestrategier og PICO-struktur. PMG20\n(Methods Manual) oppdatert. Register of Interests publisert for alle\nkomitemedlemmer (29.10.2021). Quality Standards publisert separat men\nkoblet til retningslinjen.</p>\n<h3 id=\"e.5.2-norge-2026-helsedirektoratets-høringsutkast\">E.5.2 Norge\n2026 — Helsedirektoratets høringsutkast</h3>\n<p><strong>Populasjonsutvidelse.</strong> Fra «Pasienter med CFS/ME»\n(2014) til «langvarig utmattelse, inkl. ME/CFS» (2026). Denne\nscope-endringen er den mest substansielle strukturforskjellen fra\n2014-veilederen, og også det punktet hvor norsk utvikling divergerer\nsterkest fra britisk.</p>\n<p><strong>Metodisk modenhet.</strong> Eksplisitt GRADE-anvendelse. FHIs\nkvalitative systematiske oversikt (Hestevik, Langøien, Bergsund 2025)\nintegrert. Standardisert anbefalingsstruktur med tre normeringsnivåer\n(skal, bør/anbefaler, kan/foreslår). 12 anbefalinger fordelt på fire\nkapitler.</p>\n<p><strong>Dissensmønster.</strong> Fire fagdissenser fra arbeidsgruppen\nlevert før publisering — integrert som inline PDF-vedlegg i\nretningslinjens kap. 1. Tre brukerdissenser fra arbeidsgruppens\nbrukerrepresentanter levert etter publisering — publisert av\nHelsedirektoratet i <em>Dissenser i PDF</em>-ZIP-filen for innkomne\nhøringsinnspill, ikke omtalt i selve retningslinjedokumentet. Se vedlegg\nB og C for fulltekster og sammendrag.</p>\n<h2 id=\"e.6-tematisk-parallellanalyse\">E.6 Tematisk\nparallellanalyse</h2>\n<h3 id=\"e.6.1-diagnostisk-utvikling\">E.6.1 Diagnostisk utvikling</h3>\n<p><strong>Norsk utvikling:</strong> 2006 primært CDC-1994 (Fukuda) som\nbasis for evidensgjennomgangen → 2014 Fukuda og Canada som gyldige\nalternativer, pragmatisk pluralisme → 2026 Canadakriteriene anbefalt som\nførstevalg for voksne.</p>\n<p><strong>Britisk utvikling:</strong> 2007 (CG53) egne NICE-kriterier\nbasert på fatigue + post-exertional malaise + én eller flere av\ntilleggssymptomer → 2021 (NG206) adapterte Institute of Medicine\n2015-kriterier med fire obligatoriske nøkkelsymptomer.</p>\n<p><strong>Komparativ observasjon.</strong> Begge land har beveget seg\nmot strengere og mer PEM-sentrert definisjon. UK gjorde et rent valg\n(IoM 2015 adaptert); Norge holder pluralistisk tilnærming (Canada +\nJason + WHO for PEM). Dette reflekterer ulik regulatorisk kultur: UK\nstandardiserer, Norge gir rom for pragmatisk klinisk vurdering.\nTidsmessig gjør begge land tilsvarende bevegelse i sin nåværende\ngenerasjon (2021/2026), med en naturlig forsinkelse på norsk side.</p>\n<h3 id=\"e.6.2-cbt-og-get-over-tid\">E.6.2 CBT og GET over tid</h3>\n<p>Dette er det tydeligste parallelle utviklingsbildet:</p>\n<table>\n<colgroup>\n<col style=\"width: 16%\" />\n<col style=\"width: 41%\" />\n<col style=\"width: 41%\" />\n</colgroup>\n<thead>\n<tr class=\"header\">\n<th><strong>Periode</strong></th>\n<th><strong>Norge</strong></th>\n<th><strong>UK</strong></th>\n</tr>\n</thead>\n<tbody>\n<tr class=\"odd\">\n<td>2006–2007</td>\n<td>CBT og GET «best dokumenterte» (2006-rapport)</td>\n<td>CBT/GET «should be offered» (CG53)</td>\n</tr>\n<tr class=\"even\">\n<td>2014</td>\n<td>CBT «nyttig supplement for noen»; pacing gitt egen plass</td>\n<td><em>Ingen revisjon — CG53 står fortsatt</em></td>\n</tr>\n<tr class=\"odd\">\n<td>2021–2026</td>\n<td>Aktivitetsregulering (pacing/gradert) med eksplisitt GRADE (2026);\nCBT ikke «behandling» men støtte ved PEM</td>\n<td>GET fjernet; CBT som supportive intervention (NG206)</td>\n</tr>\n</tbody>\n</table>\n<p><strong>Komparativ observasjon — tempo.</strong> UK satt på CG53 fra\n2007 til 2021 og gjorde så et dramatisk brudd. Norge gjorde gradvise\njusteringer i 2014 og deretter ytterligere justering i 2026. Den norske\nutviklingen har dermed vært mer kontinuerlig, men endepunktet ligger\nnærmere NG206 enn 2014 gjorde.</p>\n<p><strong>Komparativ observasjon — terminologi.</strong> UK bruker\neksplisitt Box 4 i NG206 for å definere hva GET er og ikke er. Norge har\nikke tilsvarende eksplisitt definisjon — «aktivitetsregulering» dekker\nbåde pacing og gradert aktivitet, og differansen mellom dem er ikke like\nskarpt markert. Dette er en strukturell forskjell som kan ha klinisk\nbetydning.</p>\n<p><strong>Komparativ observasjon — konsekvens.</strong> UK-bruddet i\n2021 har vært mer politisk og institusjonelt kostbart (medlemmer trakk\nseg, publisering utsatt, pågående debatt), men har ført til tydelig\nendring i UK klinisk praksis. Norsk gradvishet har vært mindre\nkonfliktfylt, men har etterlatt mer rom for klinisk heterogenitet.</p>\n<h3 id=\"e.6.3-alvorlig-syke-og-pem\">E.6.3 Alvorlig syke og PEM</h3>\n<p><strong>Norsk utvikling:</strong> 2006 eksplisitt at ingen studier\nhadde undersøkt effekt av behandling hos de aller sykeste → 2014 ti\nkonkrete eksempler på tilpasninger (kap. 3.9), omstridt, modifisert i\n2015 → 2026 PEM eksplisitt adressert via Canadakriteriene og WHO,\nerkjennelse av svakt evidensgrunnlag for PEM-populasjonen.</p>\n<p><strong>Britisk utvikling:</strong> 2007 (CG53) egen seksjon 1.9 «Key\nprinciples of care for people with severe CFS/ME», men anbefaling\n1.9.3.1 sa aktivitetsprogram for alvorlig syke skulle «draw on the\nprinciples of CBT and GET» — retrospektivt kontroversielt → 2021 (NG206)\ndedikert seksjon 1.17 for severe og very severe, med eksplisitt note om\nat hver anbefaling ble vurdert separat for denne gruppen.\nRisikovurdering før hver interaksjon. Hjemmebesøk som standard for\nhelhetsvurdering.</p>\n<p><strong>Komparativ observasjon.</strong> Begge land har i 2021/2026\nen mer differensiert tilnærming til alvorlig syke enn i første\ngenerasjon. UK har gått lengst: fra CG53s «principles of CBT and GET»\ntil NG206s egen seksjon med risikovurdering. Norge har også beveget seg,\nmen mindre dramatisk. NG206 har en eksplisitt severe/very\nsevere-differensiering som Norge ikke har i samme form.</p>\n<h3 id=\"e.6.4-brukerinvolvering-og-dissenshåndtering\">E.6.4\nBrukerinvolvering og dissenshåndtering</h3>\n<p><strong>Norsk utvikling:</strong> 2006 formell brukergruppe, Norges\nME-forening trakk seg, MENiN leverte 15-siders kritisk vedlegg integrert\ni rapporten → 2014 eget kapittel om brukermedvirkning, innspillsrunde\n2014 med dokumenterte revisjoner i 2015 → 2026 fem brukerrepresentanter\ni arbeidsgruppen, tre av fem har tatt formell dissens etter publisering,\ndissensene er ikke integrert i retningslinjedokumentet.</p>\n<p><strong>Britisk utvikling:</strong> 2007 (CG53)\ninteressentkonsultasjonsprosess som standard NICE-prosess, ikke\neksplisitt dokumenterte brukerdissenser av MENiN-type → 2021 (NG206)\nfire medlemmer trakk seg fra komiteen i juli 2021 før publisering,\npublisering utsatt, NICE valgte å dokumentere tilbaketrekkingen i\nMinutes men ikke som formelle dissenser i retningslinjen.</p>\n<p><strong>Komparativ observasjon — type uenighet.</strong>\nUK-uenigheten i 2021 var primært fra fagpersoner (leger, fysioterapeut,\npsykolog) som ikke kunne akseptere NG206s brudd med CBT/GET. Norsk\nuenighet i 2026 har to typer: fire fagpersoner som tok dissens før\npublisering (ligner UK-mønsteret), og tre brukerrepresentanter som tok\ndissens etter publisering (uten UK-parallell).</p>\n<p><strong>Komparativ observasjon — håndtering.</strong> Begge land har\nvalgt å ikke integrere sine substansielt argumenterende dissenser i\nselve retningslinjedokumentet. UK dokumenterte tilbaketrekkingene i\nMinutes. Norge har fire fagdissenser listet og lenket i kap. 1, mens\nbrukerdissensene er publisert av Helsedirektoratet i en separat ZIP-fil\nunder innkomne høringsinnspill og ikke omtalt i retningslinjedokumentet.\nDette er strukturelt beslektet mønster: substansielle dissenser holdes\nutenfor det formelle retningslinjedokumentet selv når de er publisert\ntilgjengelig andre steder. Den substansielle forskjellen er at Norge har\nnavngitte dissenser i kap. 1 (de fire fagdissensene) som UK ikke\nhar.</p>\n<p><strong>Historisk observasjon.</strong> Kunnskapssenter-rapporten\n2006 integrerte MENiN-vedlegget fysisk i dokumentet. Dette er den mest\ntransparente håndteringen av brukerdissens i noen av de fem dokumentene.\n2026-utkastet fører brukerdissensene tilbake til en mer perifer\nplassering i dokumentinfrastrukturen. Den samlede utviklingen — over 20\når og to land — viser en tendens mot at substansielle brukerdissenser\nholdes utenfor det formelle retningslinjedokumentet, ikke integreres i\ndet.</p>\n<h3 id=\"e.6.5-evidensgrunnlaget\">E.6.5 Evidensgrunnlaget</h3>\n<p><strong>Norsk utvikling:</strong> 2006 <em>«hypotesene peker i mange\nulike retninger, studiegruppene er heterogent sammensatte og ikke\ndirekte sammenlignbare, og mange av studiene har begrenset vitenskapelig\nkvalitet»</em> → 2014 ingen ny kunnskapsoppsummering i selve veilederen,\npekte til 2011-sammenfatningen → 2026 <em>«Forskningsgrunnlaget for\neffekten hos pasienter med PEM definert etter Canadakriteriene eller\nWHO, er svakt. Det er få identifiserte studier»</em> — eksplisitt GRADE\nmed konkrete effektestimater og tillit-nivåer.</p>\n<p><strong>Britisk utvikling:</strong> 2007 (CG53) anbefalte CBT og GET\nsom <em>«interventions for which there is the clearest research evidence\nof benefit»</em> — men research recommendations erkjente kunnskapshull\nfor alvorlig syke og barn → 2021 (NG206) åtte Evidence Reviews (A–H) med\nsystematiske søkestrategier, GRADE, eksplisitt rapportering av at\nevidensen er <em>«heterogenous and inconclusive, with limited evidence\nfor any single intervention»</em>.</p>\n<p><strong>Komparativ observasjon.</strong> Begge land har gjennom\nperioden beveget seg mot mer formalisert evidensvurdering. UK hadde\nallerede i 2007 en mer formalisert evidensprosess; Norge har nå i 2026\nnådd tilsvarende formaliseringsnivå via GRADE og FHIs kvalitative\nsystematiske oversikter. Men både UK og Norge beskriver i 2021/2026\nevidensen fundamentalt på samme måte som i 2006/2007: som heterogen,\nutilstrekkelig, og med begrensninger for sentrale undergrupper.</p>\n<p><strong>Substansiell observasjon.</strong> Dette tyder på at\nbevegelsen i behandlingsanbefalinger (særlig UK-bruddet i 2021) ikke\nprimært skyldes ny positiv evidens som støtter andre tilnærminger, men\nen revurdering av hvordan eksisterende evidens skal tolkes og anvendes —\nsærlig for pasienter med PEM og for alvorlig syke. Dette er en viktig\nobservasjon fordi det skiller faglig revurdering fra forskningsbasert ny\nkonsensus.</p>\n<h3 id=\"e.6.6-populasjonsavgrensning-divergens-punktet\">E.6.6\nPopulasjonsavgrensning — divergens-punktet</h3>\n<p>Dette er området hvor landene har divergert mest dramatisk.</p>\n<p><strong>Norsk utvikling:</strong> 2006 CFS/ME som spesifikk tilstand\n→ 2014 «Pasienter med CFS/ME», fortsatt spesifikk tilstand → 2026\n<strong>«langvarig utmattelse, inkl. ME/CFS»</strong> — utvidet\npopulasjon.</p>\n<p><strong>Britisk utvikling:</strong> 2007 (CG53) CFS/ME som spesifikk\ntilstand → 2021 (NG206) ME/CFS som spesifikk tilstand — avgrensningen\nuendret.</p>\n<p><strong>Komparativ observasjon.</strong> UK har holdt fast ved samme\npopulasjonsavgrensning over 14 år. Norge har utvidet i 2026. Dette er et\nsubstansielt divergerende valg som gjør retningslinjene mindre\nsammenlignbare nå enn de var i utgangspunktet.</p>\n<p><strong>Konsekvens.</strong> Pasienter med ME/CFS i UK har én\nretningslinje rettet spesifikt mot dem (NG206). Pasienter med ME/CFS i\nNorge vil fra 2026 ha en retningslinje som inkluderer dem i en bredere\npopulasjon med andre typer utmattelse. Dette har ikke bare formelle, men\npotensielt også kliniske konsekvenser — særlig for pasienter med PEM,\nhvor evidensgrunnlaget er svakere og blandet populasjonsdata kan gi\nutilstrekkelig sensitive anbefalinger.</p>\n<h3 id=\"e.6.7-institusjonell-modenhet-og-metodisk-infrastruktur\">E.6.7\nInstitusjonell modenhet og metodisk infrastruktur</h3>\n<p><strong>Norsk utvikling:</strong> 2006 enkeltprosjekt ved\nKunnskapssenteret uten standardisert retningslinjeapparat → 2014\nHdir-veileder innenfor Avdeling rehabilitering og sjeldne tilstander →\n2026 Hdir-retningslinje innenfor standardisert retningslinjeformat, med\neksplisitt GRADE, FHI-kunnskapsoppsummering, standardisert\nstyrkemarkering.</p>\n<p><strong>Britisk utvikling:</strong> 2007 (CG53) NICE-prosess med\nGuideline Development Group, National Collaborating Centre, dedikerte\nhelseøkonomer, interessentkonsultasjon → 2021 (NG206) samme\nNICE-rammeverk, men nå med PMG20 (Methods Manual) oppdatert, åtte\nseparate Evidence Reviews, Register of Interests publisert, Quality\nStandards.</p>\n<p><strong>Komparativ observasjon.</strong> UK har hatt et modent\nretningslinjeapparat gjennom hele perioden. Norge har bygget tilsvarende\napparat gradvis. I 2026 er den norske metodiske infrastrukturen\nvesentlig nærmere NICE enn den var i 2006. Men det er fortsatt gap: NICE\nhar individuelle habilitetsregistre publisert (Register of Interests),\nHdir har verbal erklæring i kap. 1; NICE har separate Evidence Reviews\nsom publiserte dokumenter, Hdir har kunnskapsgrunnlag som vedlegg til\nprosessen; NICE har Quality Standards separat men koblet til\nretningslinjen, Hdir har ikke tilsvarende kvalitetsindikatorer. Dette er\ngap som kan lukkes — de er metodologiske valg, ikke\nsystemforskjeller.</p>\n<h2 id=\"e.7-samlede-observasjoner-om-parallell-utvikling\">E.7 Samlede\nobservasjoner om parallell utvikling</h2>\n<p>Basert på analysen trer syv hovedobservasjoner frem:</p>\n<ol type=\"1\">\n<li><p><strong>Brukerdissens er strukturelt i begge land, men med ulik\nkarakter.</strong> Begge land har hatt formaliserte uenigheter — Norge\nkonsistent over 20 år, UK særlig i 2021. Typen uenighet er forskjellig:\nnorsk brukerdissens er pasient- og organisasjonsdrevet, mens\nUK-uenighetene i 2021 var fagpersondrevet. 2026-situasjonen i Norge er\nspesiell ved at den har begge typer samtidig (4 fagdissenser + 3\nbrukerdissenser).</p></li>\n</ol>\n<ol type=\"1\">\n<li><p><strong>Formelle dissenser er gradvis blitt holdt utenfor det\nformelle retningslinjedokumentet.</strong> 2006-rapporten integrerte\nMENiN-vedlegget. Fra 2007 og fremover er dissens håndtert gjennom\ndokumentasjon av tilbaketrekkinger (UK) eller som separate publiseringer\n(Norge 2026). Dette er en observerbar institusjonell utvikling bort fra\ndokumentarisk transparens om uenighet.</p></li>\n</ol>\n<ol type=\"1\">\n<li><p><strong>Behandlingsanbefalinger har konvergert over tid.</strong>\nNorge har gradvis beveget seg i samme retning som UK. Men UK har gjort\net tydelig brudd, Norge har gjort gradvise justeringer. Dette er\nforskjellige institusjonelle strategier for å håndtere samme faglige\nutvikling.</p></li>\n</ol>\n<ol type=\"1\">\n<li><p><strong>Populasjonsavgrensning er det mest markante\ndivergens-punktet.</strong> UK har holdt fast ved ME/CFS som spesifikk\ntilstand. Norge har utvidet i 2026. Dette er et aktivt divergerende valg\nsom ikke følger av evidens, men av institusjonelle\nprioriteringer.</p></li>\n</ol>\n<ol type=\"1\">\n<li><p><strong>Metodisk infrastruktur konvergerer — Norge tar\nigjen.</strong> Formaliseringen av norsk retningslinjeprosess i 2026\n(GRADE, FHI-kunnskapsoppsummering, standardisert format) gjør avstanden\ntil NICE mindre enn den var i 2006.</p></li>\n</ol>\n<ol type=\"1\">\n<li><p><strong>Evidensgrunnlaget beskrives bemerkelsesverdig stabilt\nover 20 år.</strong> Bevegelsen ligger i tolkning, ikke primært i\ngrunnlag. Både Norge og UK beskriver evidensen fundamentalt likt\n(heterogen, utilstrekkelig, svak for sentrale undergrupper) i 2006/2007\nog 2021/2026. Endringer i anbefalinger skyldes derfor institusjonell\nrevurdering snarere enn ny evidens.</p></li>\n</ol>\n<ol type=\"1\">\n<li><p><strong>Transparens om oppdragsgrunnlag går i motsatt retning av\nforventning i Norge.</strong> 2006-mandatet (Stortinget), 2014-mandatet\n(sitert i veilederen), 2024-oppdraget (dokumentert i tildelingsbrev 2026\nmen ikke referert i retningslinjen). UK-siden har gjennom hele perioden\nhatt eksplisitt NICE-struktur som er offentlig dokumentert. Dette er et\nområde der norsk utvikling går i motsatt retning av hva\nparallellanalysen ville forvente.</p></li>\n</ol>\n<h2 id=\"e.8-begrensninger\">E.8 Begrensninger</h2>\n<p><strong>Enkeltanalytiker og én strukturert lesning.</strong>\nObservasjoner er veiledende.</p>\n<p><strong>Ikke uttømmende detaljkunnskap om CG53-prosessen.</strong>\nAnalysen av CG53 bygger på sentrale kjerneelementer, men ikke på en\nsystematisk gjennomgang av alle 54 sider eller tilhørende\nNICE-dokumentasjon.</p>\n<p><strong>Asymmetri i kildebasis.</strong> Norsk prosessdokumentasjon\ner bedre dokumentert for denne analysen (via publiserte dissenser,\npressemeldinger, seminar-referater) enn tilsvarende\nUK-prosessdokumentasjon.</p>\n<p><strong>Kategoriforskjeller.</strong> Kunnskapssenter-rapporten 2006\ner HTA, ikke retningslinje. Sammenligninger på 2006–2007-stadiet har\ndette forbeholdet.</p>\n<p><strong>Utkaststatus for 2026-dokumentet.</strong> Observasjoner som\nrefererer til 2026-utkastet kan bli utdaterte.</p>\n<p><strong>Ikke-behandlede perspektiver.</strong> Skottland og Wales har\negen helseforvaltning innenfor UK — NG206 er NICE (England &amp; Wales);\nskotsk og nordirsk praksis er ikke dekket. USAs og Europas parallelle\nutvikling er ikke analysert. Ikke-anglofone retningslinjer (Sverige,\nDanmark nevnt i 2026-utkastet) er ikke sammenlignet. Covid-19 som\nkontekstendring fra ca. 2020 og framover er ikke systematisk\nbehandlet.</p>\n<h2 id=\"e.9-forholdet-til-den-komparative-agree-ii-analysen\">E.9\nForholdet til den komparative AGREE II-analysen</h2>\n<p>Dette vedlegget supplerer Vedlegg D (synkron AGREE II-sammenligning)\nved å legge diakron parallell kontekst til den synkrone\nevalueringen.</p>\n<p><strong>Item 5 (Stakeholder Involvement).</strong> Parallellanalysen\nviser at brukerdissens har vært til stede i flere av\ndokumentgenerasjonene, men at 2006-rapportens integrering av\nMENiN-vedlegget representerer den mest transparente håndteringen.\nHøringsutkastets omtale-fravær av brukerdissensene i selve\nretningslinjedokumentet — selv om dokumentene er tilgjengelige på\nhøringssiden — er en observerbar tilbakegang fra egen norsk tradisjon og\ntydelig kontrast til 2026-utkastets egen håndtering av fagdissensene som\ner integrert i kap. 1.</p>\n<p><strong>Item 10 (Methods for recommendations).</strong> Begge landene\nhar beveget seg gradvis mot mer formaliserte metodiske rammer.\nHøringsutkastet 2026 er metodisk mer modent enn 2014-veilederen, men\nligger fortsatt et stykke bak NICE-modellen.</p>\n<p><strong>Item 14 (Updating procedure).</strong> Norge har hatt én\nmellomgenerasjon (2014) som UK ikke har hatt. Dette er både en styrke\n(oftere revisjon) og en svakhet (lengre avstand mellom dokumenter gir\nmulighet for dramatisk brudd som NG206).</p>\n<p><strong>Item 22 (Editorial independence).</strong> 2014-mandatet er\nsitert i veilederen; 2024-oppdraget er ikke. NICE har gjennom hele\nperioden hatt eksplisitt struktur for metodisk uavhengighet.</p>\n<p><strong>Item 23 (Competing interests).</strong> NICE Register of\nInterests har ikke norsk parallell verken i 2014 eller 2026. Dette er en\nkonsistent britisk-norsk forskjell på denne dimensjonen.</p>\n<p><strong>Populasjonsavgrensning.</strong> Parallellanalysen gjør\nsærlig tydelig at norsk populasjonsutvidelse i 2026 er et aktivt\ndivergerende valg fra det britiske sporet, ikke en evidensdrevet\nbeslutning.</p>\n<p>Hovedanalysen står fortsatt som synkron evaluering. Dette vedlegget\ntilfører diakron kontekst, men erstatter ikke den synkrone AGREE\nII-rammen.</p>\n<p>─────────────────────────────────────────────────</p>\n<h1 id=\"vedlegg-f-primærkildeoversikt\">VEDLEGG F —\nPrimærkildeoversikt</h1>\n<h2 id=\"f.1-retningslinjer-vurdert\">F.1 Retningslinjer vurdert</h2>\n<ul>\n<li><strong>NICE (2021).</strong> <em>Myalgic encephalomyelitis (or\nencephalopathy)/chronic fatigue syndrome: diagnosis and management.</em>\nNG206. Publisert 29. oktober 2021. 96 sider. ISBN\n978-1-4731-4221-3.</li>\n</ul>\n<ul>\n<li><strong>Helsedirektoratet (2026).</strong> <em>Nasjonal faglig\nretningslinje for langvarig utmattelse, inkl. ME/CFS —\nhøringsutkast.</em> Publisert 4. februar 2026. Høringsfrist 4. mai 2026.\nSaksnummer høringssak 24/13487.</li>\n</ul>\n<h2 id=\"f.2-oppdragsdokumentasjon\">F.2 Oppdragsdokumentasjon</h2>\n<ul>\n<li><strong>Helse- og omsorgsdepartementet (2026).</strong>\n<em>Tildelingsbrev 2026 — Helsedirektoratet.</em> Side 30. Ordrett\ngjengitt i Vedlegg A.</li>\n</ul>\n<h2 id=\"f.3-dissensdokumentasjon\">F.3 Dissensdokumentasjon</h2>\n<p><strong>Fagdissenser</strong> (inline PDF-vedlegg i retningslinjens\nkap. 1):</p>\n<ul>\n<li>Nerli, T.F. (26.01.2026). Dissens fra Tom Farmen Nerli. Larvik. 1\nside. Fulltekst gjengitt i Vedlegg B.</li>\n</ul>\n<ul>\n<li>Herner, L.B. (27.01.2026). Dissensbrev fra Oslo universitetssykehus,\nBarne- og ungdomsklinikken, S-BUP. Oslo. 1 side. Fulltekst gjengitt i\nVedlegg B.</li>\n</ul>\n<ul>\n<li>Jøssang, I.H. (26.01.2026). Formell dissens i offentlig arbeid —\nDissens fra Ingjerd Helene Jøssang. Stavanger. 1 side. Fulltekst\ngjengitt i Vedlegg B.</li>\n</ul>\n<ul>\n<li>Prydz, P. (27.01.2026). Formell dissens i offentlig arbeid — Dissens\nfra Peter Prydz. Hammerfest. 1 side. Fulltekst gjengitt i Vedlegg\nB.</li>\n</ul>\n<p><strong>Brukerdissenser</strong> (publisert av Helsedirektoratet i\n<em>Dissenser i PDF</em>-ZIP-fil under innkomne høringsinnspill, og\nselvpublisert av foreningene):</p>\n<ul>\n<li>Schei, T. (26.02.2026). <em>ME-foreningens brukerrepresentant tar\ndissens på høringsutkast.</em> me-foreningen.no. 2 sider. Utvidet\nsammendrag med sitater i Vedlegg C.</li>\n</ul>\n<ul>\n<li>Thorsen, T. / ME-foreldrene (26.02.2026). <em>ME-foreldrenes\nrepresentant tar dissens.</em> me-foreldrene.no. 2 sider. Utvidet\nsammendrag med sitater i Vedlegg C.</li>\n</ul>\n<ul>\n<li>Mørch-Storstein, C. / Norsk Covidforening (03.03.2026). <em>Dissens\ntil Helsedirektoratets høringsutkast: Utmattelse — langvarig utmattelse,\ninkl. ME/CFS.</em> 3 sider. Utvidet sammendrag med sitater i Vedlegg\nC.</li>\n</ul>\n<ul>\n<li>Norsk Covidforening, ME-foreningen, ME-foreldrene (13.03.2026).\nFelles pressemelding: <em>Norge må følge internasjonale anbefalinger for\nME og long covid.</em> 2 sider. Omtalt i Vedlegg C.</li>\n</ul>\n<h2 id=\"f.4-metoderamme\">F.4 Metoderamme</h2>\n<ul>\n<li><strong>AGREE Research Trust (2017).</strong> <em>Appraisal of\nGuidelines for Research and Evaluation II — User’s Manual.</em>\nagreetrust.org.</li>\n</ul>\n<h2 id=\"f.5-historisk-tilleggsdokumentasjon\">F.5 Historisk\ntilleggsdokumentasjon</h2>\n<p>Disse kildene er brukt til å etablere den historiske konteksten for\nutviklingen av norske og britiske retningslinjer på fagfeltet.</p>\n<ul>\n<li>Kunnskapssenteret (2006). <em>Rapport nr 9-2006: Diagnostisering og\nbehandling av CFS/ME.</em> ISBN 82-8121-097-4.</li>\n</ul>\n<ul>\n<li>NICE (2007). <em>Chronic fatigue syndrome/myalgic encephalomyelitis:\ndiagnosis and management.</em> CG53.</li>\n</ul>\n<ul>\n<li>Helsedirektoratet (2014, oppdatert 2015). <em>Nasjonal veileder\nIS-1944 — Pasienter med CFS/ME.</em> ISBN 978-82-8081-239-1.</li>\n</ul>\n<p>─────────────────────────────────────────────────</p>\n<p><em>Høringsinnspill v4 — retningslinje for langvarig utmattelse,\ninkl. ME/CFS. Utarbeidet på grunnlag av AGREE II-basert komparativ\nanalyse. Avgrenset til prosessuelle, metodiske og dokumentasjonsmessige\nforhold; inneholder ikke fagvurderinger av de enkelte anbefalingers\nkliniske substans.</em></p>\n";
